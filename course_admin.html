<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>課程管理</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f2eb;color:#2a2620;min-height:100vh}
.hd{background:#2d5a3d;color:#fff;padding:18px 18px 14px}
.hd small{display:block;color:#c8ddc2;font-size:11px;letter-spacing:.12em;margin-bottom:4px}
.hd h1{font-size:20px;font-weight:900}
.wrap{padding:16px;max-width:760px;margin:0 auto}
.card{background:#fff;border:1px solid rgba(45,90,61,.12);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.card h2{font-size:16px;color:#2d5a3d;margin-bottom:12px}
.field{margin-bottom:11px}
label{display:block;font-size:12px;color:#6f6a60;margin-bottom:4px}
input,select,textarea{
  width:100%;border:1px solid #ddd;border-radius:10px;padding:11px 12px;
  font-family:'Noto Sans TC',sans-serif;font-size:15px;background:#fff;outline:none
}
textarea{min-height:80px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;border:none;border-radius:11px;padding:12px;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:800;cursor:pointer}
.btn-main{background:#2d5a3d;color:#fff}
.btn-sub{background:#e8f0ea;color:#2d5a3d}
.btn-warn{background:#fef6e4;color:#7a4f0f}
.msg{padding:12px;border-radius:10px;margin-bottom:12px;font-size:14px;line-height:1.6;display:none}
.msg.on{display:block}
.msg.ok{background:#edf7ee;color:#1f4d2c;border:1px solid #a8d5a2}
.msg.err{background:#fdf0f0;color:#7a2020;border:1px solid #d4a0a0}
.msg.info{background:#f6f3ea;color:#6a5a30;border:1px solid #e2d7b4}
.course{border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px;background:#fafafa}
.course b{display:block;color:#2d5a3d;margin-bottom:4px}
.course div{font-size:12px;color:#777;line-height:1.6}
.hide{display:none!important}
.loading{padding:40px;text-align:center;color:#777;font-size:14px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e8f0ea;color:#2d5a3d;font-size:11px;margin-left:4px}
</style>
</head>
<body>

<div class="hd">
  <small>CYP135 課程系統</small>
  <h1 id="page-title">課程管理</h1>
</div>

<div class="wrap">
  <div id="msg" class="msg"></div>
  <div id="app" class="loading">載入中...</div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzlEBM9PCjfGW-QC3w0ILIaQ9-yjvPPLnLxzT_5QD-zjsjSbnpEQcgDg6uyNvjd1vIt/exec';
const LIFF_ID = '2010580892-WjWtHyOn';

let userId = '';
let displayName = '';
let initData = null;
let currentCourse = null;
let selectedFlock = '';

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.className = 'msg on ' + (type || 'info');
  el.innerHTML = text;
}

function clearMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
  el.innerHTML = '';
}

function val(id) {
  return (document.getElementById(id) || {value:''}).value.trim();
}

function post(action, payload) {
  payload = payload || {};
  payload.action = action;

  return fetch(GAS, {
    method: 'post',
    body: JSON.stringify(payload)
  }).then(async r => {
    const text = await r.text();
    try {
      return JSON.parse(text);
    } catch (e) {
      // 後端回的不是 JSON（通常是授權頁 / 錯誤頁 / 沒部署新版）
      throw new Error('後端回傳非 JSON，前 200 字：' + text.slice(0, 200));
    }
  });
}

function getParam(name) {
  const qs = new URLSearchParams(location.search);
  if (qs.get(name)) return qs.get(name);

  const state = qs.get('liff.state');
  if (state) {
    const decoded = decodeURIComponent(state);
    const q = decoded.indexOf('?') >= 0 ? decoded.split('?')[1] : decoded;
    const sp = new URLSearchParams(q);
    if (sp.get(name)) return sp.get(name);
  }

  return '';
}

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise(function(_, reject) {
      setTimeout(function() {
        reject(new Error(label + ' 超過 ' + (ms / 1000) + ' 秒沒有回應'));
      }, ms);
    })
  ]);
}

async function initLiff() {
  const app = document.getElementById('app');

  try {
    app.innerHTML = 'JavaScript 已啟動，準備初始化 LIFF...';

    if (!LIFF_ID || LIFF_ID.indexOf('貼上') !== -1) {
      throw new Error('LIFF_ID 尚未設定');
    }

    if (typeof liff === 'undefined') {
      throw new Error('LIFF SDK 沒有載入，可能是網路或 LINE WebView 阻擋 static.line-scdn.net');
    }

    app.innerHTML = 'LIFF 初始化中...';
    await withTimeout(liff.init({ liffId: LIFF_ID }), 8000, 'liff.init');

    app.innerHTML = 'LIFF 初始化完成，確認登入狀態...';

    if (!liff.isLoggedIn()) {
      app.innerHTML = '尚未登入 LINE，準備跳轉登入...';
      liff.login();
      return 'login';
    }

    app.innerHTML = '取得 LINE 個人資料中...';
    const profile = await withTimeout(liff.getProfile(), 8000, 'liff.getProfile');

    userId = profile.userId || '';
    displayName = profile.displayName || '';

    app.innerHTML = 'LINE 身分確認完成，載入資料中...';
    return 'ok';

  } catch(e) {
    console.error('LIFF 初始化失敗：', e);

    app.innerHTML =
      '<div class="card"><h2>LIFF 初始化失敗</h2>' +
      '<p style="font-size:14px;line-height:1.8;color:#777">' +
      '目前頁面已經載入，但 LIFF 初始化沒有完成。<br><br>' +
      '請優先檢查：<br>' +
      '1. LINE Developers 的 LIFF ID 是否為：<br><b>' + LIFF_ID + '</b><br>' +
      '2. LIFF Endpoint URL 是否為：<br><b>' + GAS + '?page=courseAdmin</b><br>' +
      '3. 是否真的用 <b>https://liff.line.me/' + LIFF_ID + '</b> 開啟<br>' +
      '4. Apps Script 是否已重新部署「新增版本」<br><br>' +
      '錯誤訊息：<br><b>' + (e.message || e) + '</b>' +
      '</p></div>';

    return 'error';
  }
}

window.addEventListener('DOMContentLoaded', async function() {
  const app = document.getElementById('app');
  app.innerHTML = 'DOM 已載入，啟動程式中...';

  const liffStatus = await initLiff();

  if (liffStatus === 'login' || liffStatus === 'error') {
    return;
  }

  const mode = getParam('mode') || 'admin';

  if (mode === 'register') {
    document.getElementById('page-title').textContent = '課程報名';
    renderRegisterPage();
  } else {
    document.getElementById('page-title').textContent = '課程管理';
    renderAdminPage();
  }
});

// ─────────────────────────────
// 管理頁
// ─────────────────────────────
async function renderAdminPage() {
  const app = document.getElementById('app');
  app.innerHTML = '載入管理資料中...';

  let data;
  try {
    data = await post('getCourseAdminInit', { userId });
  } catch (err) {
    app.innerHTML =
      '<div class="card"><h2>載入失敗</h2>' +
      '<p style="font-size:14px;line-height:1.8;color:#777">' +
      'LIFF 已開啟，但無法呼叫 Apps Script API。<br><br>' +
      '請檢查：<br>' +
      '1. Apps Script 是否重新部署新版<br>' +
      '2. doPost 是否有 getCourseAdminInit<br>' +
      '3. course_manager.gs 是否有語法錯誤<br><br>' +
      '錯誤訊息：' + (err.message || err) +
      '</p></div>';
    return;
  }

  initData = data;

  if (!data.allowed) {
    app.innerHTML =
      '<div class="card"><h2>沒有權限</h2><p style="font-size:14px;line-height:1.8;color:#777">此頁面限會長或管理員使用。<br>請確認你的 LINE UID 已經在 LINE權限表，且角色為「會長」或「管理員」。</p></div>';
    return;
  }

  app.innerHTML = `
    <div class="card">
      <h2>新增課程</h2>

      <div class="row">
        <div class="field">
          <label>活動代碼</label>
          <input id="c-code" placeholder="例如 A1">
        </div>
        <div class="field">
          <label>上限人數</label>
          <input id="c-max" type="number" placeholder="例如 80">
        </div>
      </div>

      <div class="field">
        <label>活動名稱</label>
        <input id="c-name" placeholder="例如 7/20 牙技行銷課">
      </div>

      <div class="field">
        <label>日期時間</label>
        <input id="c-date" placeholder="例如 2026/07/20 14:00">
      </div>

      <div class="row">
        <div class="field">
          <label>場次</label>
          <input id="c-session" placeholder="下午場">
        </div>
        <div class="field">
          <label>票種</label>
          <input id="c-ticket" placeholder="一般票">
        </div>
      </div>

      <div class="field">
        <label>收費模式</label>
        <select id="c-mode" onchange="togglePricingMode()">
          <option value="白金制">白金制</option>
          <option value="類別制">類別制</option>
        </select>
      </div>

      <div id="price-normal">
        <div class="row">
          <div class="field">
            <label>白金價</label>
            <input id="c-plat" type="number" placeholder="例如 0">
          </div>
          <div class="field">
            <label>非白金價</label>
            <input id="c-nonplat" type="number" placeholder="例如 300">
          </div>
        </div>
      </div>

      <div id="price-category" class="hide">
        <div class="field">
          <label>類別名稱，用逗號分隔</label>
          <input id="c-catnames" placeholder="早鳥,一般,複訓">
        </div>
        <div class="field">
          <label>類別價格，用逗號分隔</label>
          <input id="c-catprices" placeholder="500,800,300">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>是否開放報名</label>
          <select id="c-open">
            <option value="是">是</option>
            <option value="否">否</option>
          </select>
        </div>
        <div class="field">
          <label>是否啟用 QR</label>
          <select id="c-qr">
            <option value="是">是</option>
            <option value="否">否</option>
          </select>
        </div>
      </div>

      <button class="btn btn-main" onclick="submitCreateCourse()">建立課程</button>
    </div>

    <div class="card">
      <h2>課程列表</h2>
      <div id="course-list"></div>
    </div>
  `;

  renderCourseList(data.courses || []);
}

function togglePricingMode() {
  const mode = val('c-mode');
  document.getElementById('price-normal').classList.toggle('hide', mode === '類別制');
  document.getElementById('price-category').classList.toggle('hide', mode !== '類別制');
}

function renderCourseList(courses) {
  const el = document.getElementById('course-list');

  if (!courses.length) {
    el.innerHTML = '<div style="font-size:13px;color:#777">目前尚未建立課程。</div>';
    return;
  }

  el.innerHTML = courses.map(c => `
    <div class="course">
      <b>${c.eventCode}｜${c.eventName}
        <span class="badge">${c.statusText || c.openFlag}</span>
      </b>
      <div>日期：${c.dateTime || '—'}</div>
      <div>場次：${c.session || '—'}　票種：${c.ticketType || '—'}</div>
      <div>上限：${c.maxCount || '不限'}</div>
      <div style="word-break:break-all">報名連結：${c.registrationLink || '—'}</div>
    </div>
  `).join('');
}

async function submitCreateCourse() {
  clearMsg();

  const payload = {
    userId,
    eventCode: val('c-code'),
    eventName: val('c-name'),
    dateTime: val('c-date'),
    session: val('c-session'),
    ticketType: val('c-ticket'),
    maxCount: val('c-max'),
    pricingMode: val('c-mode'),
    platinumPrice: val('c-plat'),
    nonPlatinumPrice: val('c-nonplat'),
    categoryNames: val('c-catnames'),
    categoryPrices: val('c-catprices'),
    openFlag: val('c-open'),
    qrFlag: val('c-qr')
  };

  if (!payload.eventName) {
    showMsg('請填活動名稱', 'err');
    return;
  }

  showMsg('建立中...', 'info');

  const res = await post('createCourse', payload);

  if (res.status === 'ok') {
    showMsg('✅ 課程建立完成<br>活動代碼：' + res.eventCode, 'ok');
    renderAdminPage();
  } else {
    showMsg('⚠️ ' + (res.message || '建立失敗'), 'err');
  }
}

// ─────────────────────────────
// 報名頁
// ─────────────────────────────
async function renderRegisterPage() {
  const app = document.getElementById('app');
  try {
    const courseCode = getParam('course');

    if (!courseCode) {
      app.innerHTML = '<div class="card"><h2>缺少課程代碼</h2><p>請從 LINE 課程連結進入。</p></div>';
      return;
    }

    app.innerHTML = '載入課程資料中...';

    const data = await post('getRegistrationInit', { eventCode: courseCode });

    if (data.status !== 'ok') {
      app.innerHTML = '<div class="card"><h2>找不到課程</h2><p>' + (data.message || '') + '</p></div>';
      return;
    }

    currentCourse = data.course;
    initData = data;

    app.innerHTML = `
      <div class="card">
        <h2>${currentCourse.eventName}</h2>
        <div style="font-size:13px;color:#777;line-height:1.8">
          日期：${currentCourse.dateTime || '—'}<br>
          場次：${currentCourse.session || '—'}<br>
          票種：${currentCourse.ticketType || '—'}<br>
          狀態：${currentCourse.openFlag === '是' ? '開放報名中' : '未開放'}
        </div>
      </div>

      <div class="card">
        <h2>填寫報名資料</h2>
        <div class="field">
          <label>姓名</label>
          <input id="r-name" placeholder="請輸入中文姓名">
        </div>
        <button class="btn btn-sub" onclick="doLookupMember()">查詢所屬雁群</button>
        <div id="lookup-box" style="margin-top:12px"></div>
        <div class="field" style="margin-top:12px">
          <label>上課類別，可空白</label>
          <input id="r-class" placeholder="例如 一般 / 早鳥 / 複訓">
        </div>
        <div class="field">
          <label>備註，可空白</label>
          <textarea id="r-remark" placeholder="有特殊需求可填寫"></textarea>
        </div>
        <button class="btn btn-main" onclick="submitRegister()">送出報名</button>
      </div>
    `;
  } catch (err) {
    app.innerHTML =
      '<div class="card"><h2>報名頁載入失敗</h2>' +
      '<p style="font-size:13px;line-height:1.8;color:#777">錯誤訊息：' +
      (err && err.message ? err.message : err) + '</p></div>';
  }
}

async function doLookupMember() {
  clearMsg();
  selectedFlock = '';

  const name = val('r-name');
  if (!name) {
    showMsg('請先輸入姓名', 'err');
    return;
  }

  const box = document.getElementById('lookup-box');
  box.innerHTML = '<div class="msg on info">查詢中...</div>';

  const res = await post('lookupMember', { name });

  if (res.status === 'found') {
    selectedFlock = res.member.flock;
    box.innerHTML = `
      <div class="msg on ok">
        ✅ 找到名冊資料<br>
        姓名：${res.member.name}<br>
        所屬雁群：${res.member.flock}<br>
        身分：${res.member.memberStatus || '非白金'}
      </div>
    `;
  } else if (res.status === 'multiple') {
    box.innerHTML = `
      <div class="msg on info">
        找到多筆同名資料，請選擇雁群。
      </div>
      ${renderFlockSelect()}
    `;
  } else {
    box.innerHTML = `
      <div class="msg on err">
        查無名冊資料。請選擇所屬雁群，送出後系統會自動新增到雁群總名冊。
      </div>
      ${renderFlockSelect()}
    `;
  }
}

function renderFlockSelect() {
  const flocks = initData.flocks || [];
  const options = flocks.map(f => `<option value="${f}">${f}</option>`).join('');

  return `
    <div class="field">
      <label>所屬雁群</label>
      <select id="r-flock">
        <option value="">請選擇</option>
        ${options}
      </select>
    </div>
    <div class="field">
      <label>如果上面沒有，請手動輸入新雁群</label>
      <input id="r-flock-new" placeholder="例如 新增雁群">
    </div>
  `;
}

async function submitRegister() {
  clearMsg();

  const name = val('r-name');
  if (!name) {
    showMsg('請輸入姓名', 'err');
    return;
  }

  let flock = selectedFlock;

  const flockSelect = document.getElementById('r-flock');
  const flockNew = document.getElementById('r-flock-new');

  if (!flock && flockSelect) flock = flockSelect.value.trim();
  if (!flock && flockNew) flock = flockNew.value.trim();

  showMsg('送出中...', 'info');

  const res = await post('submitRegistration', {
    userId,
    displayName,
    eventCode: currentCourse.eventCode,
    name,
    flock,
    classType: val('r-class'),
    remark: val('r-remark')
  });

  if (res.status === 'ok') {
    showMsg(
      '✅ 報名完成<br>' +
      '課程：' + res.eventName + '<br>' +
      '姓名：' + res.name + '<br>' +
      '雁群：' + res.flock,
      'ok'
    );
    document.getElementById('app').innerHTML = '';
  } else if (res.status === 'need_flock') {
    showMsg('請選擇所屬雁群後再送出。', 'err');
    doLookupMember();
  } else if (res.status === 'duplicate') {
    showMsg('⚠️ ' + res.message, 'err');
  } else if (res.status === 'full') {
    showMsg('⚠️ ' + res.message, 'err');
  } else {
    showMsg('⚠️ ' + (res.message || '報名失敗'), 'err');
  }
}
</script>
</body>
</html>
