function cleanNameLocal(input) {
  const m = String(input || '').match(/[\u4e00-\u9fa5]/g);
  return m ? m.join('') : String(input || '').trim();
}

function buildMemberIndex(list) {
  const map = {};
  (list || []).forEach(item => {
    const key = item.cleanName || cleanNameLocal(item.name);
    if (!key) return;
    if (!map[key]) map[key] = [];
    map[key].push(item);
  });
  return map;
}

function buildRegistrationIndex(list) {
  const map = {};
  (list || []).forEach(item => {
    const key = item.cleanName || cleanNameLocal(item.name);
    if (!key) return;
    map[key] = item;
  });
  return map;
}

function getExistingRegistration(cleanName) {
  return registrationIndex[cleanName] || null;
}

function setRegisterButtonDisabled(disabled, text) {
  const btn = document.getElementById('submit-register-btn');
  if (!btn) return;
  btn.disabled = !!disabled;
  btn.textContent = text || '送出報名';
}

function duplicateNoticeHtml() {
  return `
    <div class="msg on err">
      ⚠️ 此姓名已報名過本課程<br><br>
      如有疑問，請洽票務調整。
    </div>
  `;
}

function autoLookupMemberDebounced() {
  clearTimeout(lookupTimer);
  selectedLeader = '';
  isCurrentNameDuplicate = false;
  clearRegisterMsg();
  resetPlatinumClassAutoSelection();

  const box = document.getElementById('lookup-box');
  const name = val('r-name');
  const clean = cleanNameLocal(name);

  if (!clean) {
    if (box) box.innerHTML = '';
    setRegisterButtonDisabled(false, '送出報名');
    return;
  }

  const duplicate = getExistingRegistration(clean);
  if (duplicate) {
    isCurrentNameDuplicate = true;
    setRegisterButtonDisabled(true, '已重複報名');
    if (box) {
      box.innerHTML = `
        <div class="msg on err">
          ⚠️ 此姓名已報名過本課程<br><br>
          如有疑問，請洽票務調整。
        </div>
      `;
    }
    return;
  }

  setRegisterButtonDisabled(false, '送出報名');
  if (box) box.innerHTML = '<div class="msg on info">查詢名冊中...</div>';
  lookupTimer = setTimeout(() => autoLookupMemberRemote(clean, name), 180);
}


function renderLookupResult(res, clean, name) {
  const box = document.getElementById('lookup-box');
  if (!box) return;

  if (res.status === 'duplicate') {
    registrationIndex[clean] = {
      name: (res.registration && res.registration.name) || name,
      cleanName: clean,
      leader: (res.registration && res.registration.leader) || ''
    };
    isCurrentNameDuplicate = true;
    selectedLeader = '';
    setRegisterButtonDisabled(true, '已重複報名');
    box.innerHTML = duplicateNoticeHtml();
    return;
  }

  if (res.status === 'found') {
    selectedLeader = (res.member && (res.member.leader || res.member.flock || res.member.uplinePlatinum)) || '';
    const autoClassType = applyPlatinumClassAutoSelection(res.member);
    box.innerHTML = `
      <div class="msg on ok">
        ✅ 已找到名冊資料<br>
        姓名：${esc((res.member && res.member.name) || name)}<br>
        上手白金/雁群組長：${esc(selectedLeader || '—')}
        ${autoClassType ? `<br>自動判斷類別：${esc(autoClassType)}${lockedClassType ? '（依名冊鎖定）' : ''}` : ''}
      </div>
      <input id="r-leader" type="hidden" value="${esc(selectedLeader)}">
    `;
  } else if (res.status === 'multiple') {
    selectedLeader = '';
    const choices = [...new Set((res.members || []).map(x => x.leader || x.flock || x.uplinePlatinum).filter(Boolean))];
    box.innerHTML = `
      <div class="msg on info">找到多筆同名資料，請選擇上手白金/雁群組長</div>
      ${renderLeaderSelect(choices.length ? choices : getLeaderOptionsForForm())}
    `;
  } else {
    selectedLeader = '';
    const autoClassType = applyPlatinumClassAutoSelection(null);
    box.innerHTML = `
      <div class="msg on err">查無名冊資料，請選擇上手白金/雁群組長<br>建立資料${autoClassType ? '<br>自動判斷類別：' + esc(autoClassType) : ''}</div>
      ${renderLeaderSelect(getLeaderOptionsForForm())}
    `;
  }
}

async function autoLookupMemberRemote(clean, name) {
  const box = document.getElementById('lookup-box');
  if (!box || clean !== cleanNameLocal(val('r-name'))) return;

  // 再檢查一次重複，避免等待名冊查詢時已經變更輸入。
  const duplicate = getExistingRegistration(clean);
  if (duplicate) {
    isCurrentNameDuplicate = true;
    setRegisterButtonDisabled(true, '已重複報名');
    box.innerHTML = duplicateNoticeHtml();
    return;
  }

  try {
    if (lookupCache[clean]) {
      renderLookupResult(lookupCache[clean], clean, name);
      return;
    }

    const seq = ++lastLookupSeq;
    const res = await post('lookupMember', { name }, 7000);
    if (seq !== lastLookupSeq || clean !== cleanNameLocal(val('r-name'))) return;
    lookupCache[clean] = res;

    renderLookupResult(res, clean, name);
  } catch (err) {
    selectedLeader = '';
    box.innerHTML = `
      <div class="msg on err">名冊查詢較慢或失敗，請手動選擇上手白金/雁群組長</div>
      ${renderLeaderSelect(getLeaderOptionsForForm())}
    `;
  }
}

function autoLookupMemberLocal() {
  // 舊函式名稱保留相容。
  autoLookupMemberDebounced();
}

function getLeaderOptionsForForm() {
  return (initData && (initData.leaders || initData.platinumNames)) || [];
}

function renderLeaderSelect(options) {
  return `
    <div class="field">
      <label>上手白金/雁群組長</label>
      <select id="r-leader" onchange="handleLeaderSelectChange(this)">
        ${optionHtml(options, '', '請選擇上手白金/雁群組長')}
      </select>
    </div>
  `;
}

function handleLeaderSelectChange(selectEl) {
  selectedLeader = (selectEl && selectEl.value ? selectEl.value : '').trim();
  const clean = cleanNameLocal(val('r-name'));
  const cached = lookupCache[clean];
  if (!cached || cached.status !== 'multiple') return;

  const member = findLookupMemberByLeader(cached.members || [], selectedLeader);
  applyPlatinumClassAutoSelection(member);
}

function findLookupMemberByLeader(members, leader) {
  const target = String(leader || '').trim();
  if (!target) return null;
  return (members || []).find(item => String(item.leader || item.flock || item.uplinePlatinum || '').trim() === target) || null;
}

function hasPlatinumClassPair() {
  const mode = String((currentCourse && currentCourse.pricingMode) || '').trim();
  if (mode === '類別制') return false;

  const details = (initData && initData.classDetails) || [];
  let hasPlatinum = false;
  let hasNonPlatinum = false;
  details.forEach(item => {
    const name = String(item.name || '').trim();
    if (name === '白金') hasPlatinum = true;
    if (name === '非白金') hasNonPlatinum = true;
  });
  return hasPlatinum && hasNonPlatinum;
}

function inferPlatinumClassType(member) {
  if (!hasPlatinumClassPair()) return '';
  const status = String((member && member.memberStatus) || '').trim();
  if (status.includes('非白金')) return '非白金';
  if (status.includes('白金')) return '白金';
  return '非白金';
}

function applyPlatinumClassAutoSelection(member) {
  const classType = inferPlatinumClassType(member);
  if (!classType) return '';
  lockedClassType = classType;
  selectRegistrationClass(classType, { force: true });
  return classType;
}

function resetPlatinumClassAutoSelection() {
  if (!hasPlatinumClassPair()) return;
  selectedClassType = '';
  lockedClassType = '';
  syncClassChoiceButtons();
  updateRegistrationPrice();
}


function renderClassChoiceButtons(details) {
  details = details || [];
  if (!details.length) {
    return '<div class="msg on err">此課程尚未設定上課類別，請洽票務。</div>';
  }
  return '<div class="class-choice-grid">' + details.map(item => {
    const name = String(item.name || '').trim();
    const price = Number(item.price || 0);
    const on = name === selectedClassType ? ' on' : '';
    const locked = lockedClassType && name !== lockedClassType;
    const lockedAttrs = locked ? ' disabled aria-disabled="true"' : '';
    return `<button type="button" class="class-choice registration-class-choice${on}${locked ? ' locked' : ''}" data-class="${esc(name)}" onclick="selectRegistrationClass(this.dataset.class)"${lockedAttrs}>
      <div class="class-choice-name">${esc(name)}</div>
      <div class="class-choice-price">$${esc(price)}</div>
    </button>`;
  }).join('') + '</div>';
}

function getPriceByClassType(classType) {
  const details = (initData && initData.classDetails) || [];
  const item = details.find(x => String(x.name || '') === String(classType || ''));
  return item ? Number(item.price || 0) : 0;
}

function syncClassChoiceButtons() {
  document.querySelectorAll('.registration-class-choice').forEach(btn => {
    const isSelected = btn.dataset.class === selectedClassType;
    const isLockedOut = !!lockedClassType && btn.dataset.class !== lockedClassType;
    btn.classList.toggle('on', isSelected);
    btn.classList.toggle('locked', isLockedOut);
    btn.disabled = isLockedOut;
    btn.setAttribute('aria-disabled', isLockedOut ? 'true' : 'false');
  });
}

function selectRegistrationClass(classType, options) {
  const nextType = String(classType || '').trim();
  if (lockedClassType && nextType !== lockedClassType && !(options && options.force)) {
    syncClassChoiceButtons();
    return;
  }
  selectedClassType = nextType;
  syncClassChoiceButtons();
  updateRegistrationPrice();
}

function getSelectedClassPrice() {
  const classType = selectedClassType || val('r-class');
  const details = (initData && initData.classDetails) || [];
  const item = details.find(x => String(x.name || '') === String(classType || ''));
  return { classType, price: item ? Number(item.price || 0) : null };
}

function updateRegistrationPrice() {
  const box = document.getElementById('price-box');
  const info = getSelectedClassPrice();
  if (!box) return;
  if (!info.classType || info.price === null) {
    box.innerHTML = '請先選類別';
    return;
  }
  box.innerHTML = `本次票價：$${esc(info.price)}`;
}

async function submitRegister() {
  clearMsg();
  clearRegisterMsg();

  if (isSubmittingRegistration) return;

  const name = val('r-name');
  const clean = cleanNameLocal(name);
  if (!name) return showRegisterMsg('請輸入姓名', 'err');

  if (getExistingRegistration(clean) || isCurrentNameDuplicate) {
    isCurrentNameDuplicate = true;
    setRegisterButtonDisabled(true, '已重複報名');
    const box = document.getElementById('lookup-box');
    if (box) box.innerHTML = duplicateNoticeHtml();
    return showRegisterMsg('此姓名已報名過本課程<br><br>如有疑問，請洽票務調整。', 'err');
  }

  let leader = selectedLeader;
  const leaderField = document.getElementById('r-leader');
  if (!leader && leaderField) leader = leaderField.value.trim();

  if (!leader) return showRegisterMsg('查無名冊資料，請選擇上手白金/雁群組長', 'err');

  const priceInfo = getSelectedClassPrice();
  if (!priceInfo.classType) return showRegisterMsg('請選擇上課類別', 'err');

  isSubmittingRegistration = true;
  setRegisterButtonDisabled(true, '送出中...');
  showRegisterMsg('送出中...', 'info');

  try {
    const res = await post('submitRegistration', {
      userId,
      displayName,
      eventCode: currentCourse.eventCode,
      name,
      leader,
      flock: leader,
      uplinePlatinum: leader,
      classType: priceInfo.classType,
      remark: val('r-remark')
    });

    if (res.status === 'ok') {
      const newRegistrant = {
        name: res.name || name,
        cleanName: clean,
        leader: res.leader || res.flock || leader,
        classType: res.classType || priceInfo.classType
      };
      registrationIndex[clean] = newRegistrant;
      if (initData && Array.isArray(initData.existingRegistrants)) initData.existingRegistrants.push(newRegistrant);
      const cacheCode = normalizeCode(currentCourse && currentCourse.eventCode);
      if (cacheCode && appState.registrationInitByCode[cacheCode] && Array.isArray(appState.registrationInitByCode[cacheCode].existingRegistrants)) {
        appState.registrationInitByCode[cacheCode].existingRegistrants.push(newRegistrant);
      }

      if (currentCourse) {
        currentCourse.currentCount = res.currentCount !== undefined ? res.currentCount : Number(currentCourse.currentCount || 0) + 1;
        if (res.remainingCount !== undefined) currentCourse.remainingCount = res.remainingCount;
        if (res.statusBadge) currentCourse.statusBadge = res.statusBadge;
        mergeCourseToState(currentCourse);
      }

      showRegisterMsg(`
        ✅ 報名成功：${esc(res.name || clean)}<br>
        上手白金/雁群組長：${esc(res.leader || res.flock || leader || '—')}<br>
        上課類別：${esc(res.classType || priceInfo.classType || '—')}<br>
        本次票價：$${esc(res.price || priceInfo.price || 0)}<br><br>
        請繼續輸入下一位。
      `, 'ok');

      const nameInput = document.getElementById('r-name');
      const remarkInput = document.getElementById('r-remark');
      const lookupBox = document.getElementById('lookup-box');
      selectedLeader = '';
      isCurrentNameDuplicate = false;
      if (nameInput) nameInput.value = '';
      if (remarkInput) remarkInput.value = '';
      if (lookupBox) lookupBox.innerHTML = '';
      resetPlatinumClassAutoSelection();
      setRegisterButtonDisabled(false, '送出報名');
      setTimeout(() => { if (nameInput) nameInput.focus(); }, 60);

    } else if (res.status === 'need_profile') {
      showRegisterMsg('查無名冊資料，請選擇上手白金/雁群組長', 'err');
      autoLookupMemberLocal();
    } else if (res.status === 'duplicate') {
      registrationIndex[clean] = { name, cleanName: clean, leader };
      isCurrentNameDuplicate = true;
      setRegisterButtonDisabled(true, '已重複報名');
      const box = document.getElementById('lookup-box');
      if (box) box.innerHTML = duplicateNoticeHtml();
      showRegisterMsg('此姓名已報名過本課程<br><br>如有疑問，請洽票務調整。', 'err');
    } else {
      showRegisterMsg('⚠️ ' + esc(res.message || '報名失敗'), 'err');
    }
  } catch (err) {
    showRegisterMsg('⚠️ ' + esc(err.message || err), 'err');
  } finally {
    isSubmittingRegistration = false;
    if (!isCurrentNameDuplicate) setRegisterButtonDisabled(false, '送出報名');
  }
}

function loadScriptOnce(url, id) {
  if (window[id]) return Promise.resolve();
  const existing = document.querySelector('script[data-lib="' + id + '"]');
  if (existing) {
    return new Promise((resolve, reject) => {
      existing.addEventListener('load', resolve);
      existing.addEventListener('error', reject);
    });
  }
  return new Promise((resolve, reject) => {
    const sc = document.createElement('script');
    sc.src = url;
    sc.async = true;
    sc.dataset.lib = id;
    sc.onload = resolve;
    sc.onerror = () => reject(new Error('載入工具失敗：' + id));
    document.head.appendChild(sc);
  });
}

function ensureTicketScripts() {
  if (!ticketScriptsLoading) {
    ticketScriptsLoading = Promise.all([
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js', 'JSZip'),
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js', 'QRCode')
    ]);
  }
  return ticketScriptsLoading;
}

function handleTicketBgUpload(input) {
  const file = input && input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      ticketState.bgImage = img;
      ticketState.bgName = file.name;
      const el = document.getElementById('ticket-summary');
      if (el) el.innerHTML = `已選票券底圖：${esc(file.name)}<br>` + (ticketState.stats ? buildTicketSummaryHtml(ticketState.stats) : '尚未同步名單。');
      if (ticketState.members.length) renderTicketPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function buildTicketSummaryHtml(stats) {
  stats = stats || {};
  return `
    <div class="ticket-stat-grid">
      <div class="ticket-stat"><strong>${Number(stats.total || 0)}</strong><span>可產生</span></div>
      <div class="ticket-stat"><strong>${Number(stats.existingCode || 0)}</strong><span>保留 CODE</span></div>
      <div class="ticket-stat"><strong>${Number(stats.newCode || 0)}</strong><span>新產生</span></div>
    </div>
    排除取消：${Number(stats.cancelled || 0)} 人<br>
    CODE 規則：不同活動不同 CODE；同活動已存在者保留舊 CODE，新人才補新 CODE。
  `;
}

async function syncTicketMembers() {
  const code = normalizeCode(val('ticket-course-select'));
  if (!code) return showBoxMsg('ticket-msg', '請先選擇活動。', 'err');
  clearBoxMsg('ticket-msg');
  showBoxMsg('ticket-msg', '同步中，請稍候...', 'info');
  try {
    const data = await post('syncTicketQrFromRegistrations', { userId, eventCode: code }, 30000);
    if (!data || data.status !== 'ok') throw new Error((data && data.message) || '同步失敗');
    ticketState.course = data.course || null;
    ticketState.members = data.members || [];
    ticketState.stats = data.stats || {};
    mergeCourseToState(data.course);
    clearBoxMsg('ticket-msg');
    document.getElementById('ticket-summary').innerHTML = buildTicketSummaryHtml(ticketState.stats);
    await renderTicketPreview();
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '同步失敗', 'err');
  }
}

function ticketSafeName(text) {
  return String(text || '')
    .replace(/[\\/:*?"<>|]/g, '')
    .replace(/\s+/g, '')
    .trim() || '未命名';
}

function ticketInfo() {
  const c = ticketState.course || {};
  return {
    eventName: c.eventName || '活動名稱',
    session: c.session || '',
    ticketType: c.ticketType || '',
    displayDate: c.dateTime || c.displayDate || ''
  };
}

function drawTicketBuiltinBg(ctx, W, topH) {
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(0, 0, W, topH);
  ctx.save();
  ctx.globalAlpha = .07;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(W*.1, topH*.35, 160, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W*.75, topH*1.15, 210, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = .04;
  for (let i=0; i<14; i++) ctx.fillRect(W*.28+i*28, -20, 14, topH+40);
  ctx.restore();
}

function ticketRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function ticketWrapText(ctx, text, x, y, maxW, lh, maxLines) {
  const chars = String(text || '').split('');
  let line = '', lines = [];
  chars.forEach(c => {
    const t = line + c;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = c; }
    else line = t;
  });
  if (line) lines.push(line);
  lines.slice(0, maxLines || 2).forEach((l,i) => ctx.fillText(l, x, y+i*lh));
}

function ticketQrImage(code) {
  return new Promise(resolve => {
    const container = document.createElement('div');
    container.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(container);
    try {
      new QRCode(container, { text: String(code || ''), width: 260, height: 260, colorDark:'#000000', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.M });
      const el = container.querySelector('canvas') || container.querySelector('img');
      if (!el) { document.body.removeChild(container); resolve(null); return; }
      if (el.tagName === 'CANVAS') {
        const img = new Image();
        img.onload = () => { document.body.removeChild(container); resolve(img); };
        img.src = el.toDataURL();
      } else {
        if (el.complete) { document.body.removeChild(container); resolve(el); }
        else { el.onload = () => { document.body.removeChild(container); resolve(el); }; el.onerror = () => { document.body.removeChild(container); resolve(null); }; }
      }
    } catch(e) { document.body.removeChild(container); resolve(null); }
  });
}

async function drawTicketCanvas(canvas, person, info) {
  await ensureTicketScripts();
  const W = 560, H = 1240, topH = 420, px = 40;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0d1f33';
  ctx.fillRect(0, 0, W, topH);
  if (ticketState.bgImage) {
    const img = ticketState.bgImage;
    const scale = Math.min(W / img.width, topH / img.height);
    const dw = img.width * scale, dh = img.height * scale;
    ctx.drawImage(img, 0, 0, img.width, img.height, (W-dw)/2, (topH-dh)/2, dw, dh);
  } else {
    drawTicketBuiltinBg(ctx, W, topH);
  }

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, topH, W, H-topH);
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(px, topH + 24, W - px*2, 3);

  ctx.textAlign = 'center';
  ctx.font = '900 34px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ticketWrapText(ctx, info.eventName, px, topH + 72, W - px*2, 42, 2);

  const sub = [info.displayDate, info.session, info.ticketType].filter(Boolean).join('  ·  ');
  if (sub) {
    ctx.font = '600 18px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#4f5964';
    ctx.fillText(sub, W/2, topH + 140);
  }

  const qrSize = Math.round(W * 0.70);
  const qrX = Math.round((W - qrSize) / 2);
  const qrY = topH + 168;
  ctx.fillStyle = '#f7f7f7';
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.fill();
  ctx.strokeStyle = '#ebebeb'; ctx.lineWidth = 1;
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.stroke();
  const qrImg = await ticketQrImage(person.code);
  if (qrImg) ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

  const codeBaseY = qrY + qrSize + 28;
  ctx.font = '700 36px "Courier New", monospace';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.fillText(String(person.code || '').toUpperCase(), W/2, codeBaseY + 32);

  ctx.strokeStyle = '#eeeeee'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px*2, codeBaseY + 50); ctx.lineTo(W - px*2, codeBaseY + 50); ctx.stroke();

  const nameY = codeBaseY + 100;
  ctx.font = '900 46px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText(person.name || '', W/2, nameY);

  const flockLabel = '小組：' + (person.flock || '—');
  ctx.font = '700 20px "Noto Sans TC", sans-serif';
  const fpw = ctx.measureText(flockLabel).width + 48, fph = 42, fpx = (W - fpw) / 2, fpy = nameY + 20;
  ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)'; ctx.lineWidth = 1.5;
  ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.fill(); ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.stroke();
  ctx.fillStyle = '#1a3a5c';
  ctx.fillText(flockLabel, W/2, fpy + 28);

  if (person.group) {
    const groupLabel = String(person.group || '').trim();
    ctx.font = '700 20px "Noto Sans TC", sans-serif';
    const gpw = ctx.measureText(groupLabel).width + 48, gph = 42, gpx = (W - gpw) / 2, gpy = fpy + fph + 16;
    ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)';
    ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.fill(); ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.stroke();
    ctx.fillStyle = '#1a3a5c';
    ctx.fillText(groupLabel, W/2, gpy + 28);
  }
}

async function renderTicketPreview() {
  if (!ticketState.members.length) {
    return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  }
  await ensureTicketScripts();
  const holder = document.getElementById('ticket-preview-list');
  const card = document.getElementById('ticket-preview-card');
  if (!holder || !card) return;
  holder.innerHTML = '';
  card.style.display = 'block';
  const info = ticketInfo();
  const sample = ticketState.members.slice(0,2);
  for (const m of sample) {
    const wrap = document.createElement('div');
    wrap.className = 'ticket-preview-card';
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    holder.appendChild(wrap);
    await drawTicketCanvas(canvas, m, info);
  }
}

async function downloadTicketZip() {
  if (!ticketState.members.length) return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  await ensureTicketScripts();
  const progress = document.getElementById('ticket-progress');
  const fill = document.getElementById('ticket-progress-fill');
  progress.classList.add('on'); fill.style.width = '0%';
  clearBoxMsg('ticket-msg');
  showBoxMsg('ticket-msg', '正在產生票券...', 'info');

  try {
    const zip = new JSZip();
    const canvas = document.createElement('canvas');
    const info = ticketInfo();
    const used = {};

    for (let i = 0; i < ticketState.members.length; i++) {
      const m = ticketState.members[i];
      await drawTicketCanvas(canvas, m, info);
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      let base = ticketSafeName(m.flock || '雁群') + '_' + ticketSafeName(m.name || '姓名');
      let fname = base + '.png';
      if (used[fname]) {
        used[fname]++;
        fname = base + '_' + used[fname] + '.png';
      } else {
        used[fname] = 1;
      }
      zip.file(fname, blob);
      fill.style.width = Math.round((i+1)/ticketState.members.length*100) + '%';
      await new Promise(r => setTimeout(r, 8));
    }

    const content = await zip.generateAsync({ type: 'blob' });
    const zipName = '雁群票券_' + ticketSafeName(info.eventName) + (info.session ? '_' + ticketSafeName(info.session) : '') + '.zip';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = zipName;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    showBoxMsg('ticket-msg', '票券 ZIP 已產生。', 'ok');
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '產生失敗', 'err');
  } finally {
    progress.classList.remove('on');
    fill.style.width = '0%';
  }
}
