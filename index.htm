// V5.5 票券產生：報名總表 → QR管理 → PNG ZIP
// ─────────────────────────────────────────────
function loadScriptOnce(url, id) {
  if (window[id]) return Promise.resolve();
  const existing = document.querySelector('script[data-lib="' + id + '"]');
  if (existing) {
    return new Promise((resolve, reject) => {
      existing.addEventListener('load', resolve);
      existing.addEventListener('error', reject);
    });
  }
  return new Promise((resolve, reject) => {
    const sc = document.createElement('script');
    sc.src = url;
    sc.async = true;
    sc.dataset.lib = id;
    sc.onload = resolve;
    sc.onerror = () => reject(new Error('載入工具失敗：' + id));
    document.head.appendChild(sc);
  });
}

function ensureTicketScripts() {
  if (!ticketScriptsLoading) {
    ticketScriptsLoading = Promise.all([
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js', 'JSZip'),
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js', 'QRCode')
    ]);
  }
  return ticketScriptsLoading;
}

async function renderTicketGeneratorPage() {
  currentView = 'ticket';
  setWideLayout(false);
  clearMsg();
  setTitle('票券產生');
  const app = document.getElementById('app');

  app.innerHTML = `<div class="loading">載入票券產生工具中...</div>`;
  const allowed = await ensureAdminAccess();
  if (!allowed) return;

  try { await ensurePublicData(false); } catch(e) {}

  const courses = (appState.courses || []).filter(c => c && c.eventName);
  const options = courses.map(c => `<option value="${esc(normalizeCode(c.eventCode))}">${esc(c.eventName)}${c.dateTime ? '｜' + esc(c.dateTime) : ''}</option>`).join('');

  app.innerHTML = `
    <div class="top-actions">
      <button class="btn btn-sub" onclick="renderHomePage({skipRefresh:true})">報名課程</button>
      <button class="btn btn-main" onclick="renderTicketGeneratorPage()">票券產生</button>
    </div>

    <div class="card">
      <h2>票券產生</h2>
      <p class="muted">選活動後，系統會從報名總表同步名單到 QR管理，保留同活動舊 CODE，只幫新報名者補新 CODE。</p>
      <div id="ticket-msg" class="msg"></div>
      <div class="field">
        <label>選擇活動</label>
        <select id="ticket-course-select">
          <option value="">請選擇活動</option>
          ${options}
        </select>
      </div>
      <div class="form-grid">
        <div class="field full">
          <label>票券底圖，上半部圖片，可選</label>
          <input type="file" id="ticket-bg-file" accept="image/*" onchange="handleTicketBgUpload(this)">
          <div class="ticket-small">不選底圖會使用內建深色設計。第一階段先下載 ZIP，不存 Google Drive。</div>
        </div>
      </div>
      <div class="ticket-toolbar">
        <button class="btn btn-main" onclick="syncTicketMembers()">同步報名名單 / 補 CODE</button>
        <button class="btn btn-sub" onclick="renderTicketPreview()">預覽前兩張</button>
      </div>
      <button class="btn btn-main" style="width:100%" onclick="downloadTicketZip()">下載全部票券 ZIP</button>
      <div class="ticket-progress" id="ticket-progress"><div id="ticket-progress-fill"></div></div>
      <div class="ticket-member-note" id="ticket-summary">尚未同步名單。</div>
    </div>

    <div class="card" id="ticket-preview-card" style="display:none">
      <h2>票券預覽</h2>
      <div class="ticket-preview-wrap" id="ticket-preview-list"></div>
    </div>
  `;
}

function handleTicketBgUpload(input) {
  const file = input && input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      ticketState.bgImage = img;
      ticketState.bgName = file.name;
      const el = document.getElementById('ticket-summary');
      if (el) el.innerHTML = `已選票券底圖：${esc(file.name)}<br>` + (ticketState.stats ? buildTicketSummaryHtml(ticketState.stats) : '尚未同步名單。');
      if (ticketState.members.length) renderTicketPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function buildTicketSummaryHtml(stats) {
  stats = stats || {};
  return `
    <div class="ticket-stat-grid">
      <div class="ticket-stat"><strong>${Number(stats.total || 0)}</strong><span>可產生</span></div>
      <div class="ticket-stat"><strong>${Number(stats.existingCode || 0)}</strong><span>保留 CODE</span></div>
      <div class="ticket-stat"><strong>${Number(stats.newCode || 0)}</strong><span>新產生</span></div>
    </div>
    排除取消：${Number(stats.cancelled || 0)} 人<br>
    CODE 規則：不同活動不同 CODE；同活動已存在者保留舊 CODE，新人才補新 CODE。
  `;
}

async function syncTicketMembers() {
  const code = normalizeCode(val('ticket-course-select'));
  if (!code) return showBoxMsg('ticket-msg', '請先選擇活動。', 'err');
  clearBoxMsg('ticket-msg');
  showBoxMsg('ticket-msg', '同步中，請稍候...', 'info');
  try {
    const data = await post('syncTicketQrFromRegistrations', { userId, eventCode: code }, 30000);
    if (!data || data.status !== 'ok') throw new Error((data && data.message) || '同步失敗');
    ticketState.course = data.course || null;
    ticketState.members = data.members || [];
    ticketState.stats = data.stats || {};
    mergeCourseToState(data.course);
    clearBoxMsg('ticket-msg');
    document.getElementById('ticket-summary').innerHTML = buildTicketSummaryHtml(ticketState.stats);
    await renderTicketPreview();
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '同步失敗', 'err');
  }
}

function ticketSafeName(text) {
  return String(text || '')
    .replace(/[\\/:*?"<>|]/g, '')
    .replace(/\s+/g, '')
    .trim() || '未命名';
}

function ticketInfo() {
  const c = ticketState.course || {};
  return {
    eventName: c.eventName || '活動名稱',
    session: c.session || '',
    ticketType: c.ticketType || '',
    displayDate: c.dateTime || c.displayDate || ''
  };
}

function drawTicketBuiltinBg(ctx, W, topH) {
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(0, 0, W, topH);
  ctx.save();
  ctx.globalAlpha = .07;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(W*.1, topH*.35, 160, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W*.75, topH*1.15, 210, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = .04;
  for (let i=0; i<14; i++) ctx.fillRect(W*.28+i*28, -20, 14, topH+40);
  ctx.restore();
}

function ticketRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function ticketWrapText(ctx, text, x, y, maxW, lh, maxLines) {
  const chars = String(text || '').split('');
  let line = '', lines = [];
  chars.forEach(c => {
    const t = line + c;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = c; }
    else line = t;
  });
  if (line) lines.push(line);
  lines.slice(0, maxLines || 2).forEach((l,i) => ctx.fillText(l, x, y+i*lh));
}

function ticketQrImage(code) {
  return new Promise(resolve => {
    const container = document.createElement('div');
    container.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(container);
    try {
      new QRCode(container, { text: String(code || ''), width: 260, height: 260, colorDark:'#000000', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.M });
      const el = container.querySelector('canvas') || container.querySelector('img');
      if (!el) { document.body.removeChild(container); resolve(null); return; }
      if (el.tagName === 'CANVAS') {
        const img = new Image();
        img.onload = () => { document.body.removeChild(container); resolve(img); };
        img.src = el.toDataURL();
      } else {
        if (el.complete) { document.body.removeChild(container); resolve(el); }
        else { el.onload = () => { document.body.removeChild(container); resolve(el); }; el.onerror = () => { document.body.removeChild(container); resolve(null); }; }
      }
    } catch(e) { document.body.removeChild(container); resolve(null); }
  });
}

async function drawTicketCanvas(canvas, person, info) {
  await ensureTicketScripts();
  const W = 560, H = 1240, topH = 420, px = 40;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0d1f33';
  ctx.fillRect(0, 0, W, topH);
  if (ticketState.bgImage) {
    const img = ticketState.bgImage;
    const scale = Math.min(W / img.width, topH / img.height);
    const dw = img.width * scale, dh = img.height * scale;
    ctx.drawImage(img, 0, 0, img.width, img.height, (W-dw)/2, (topH-dh)/2, dw, dh);
  } else {
    drawTicketBuiltinBg(ctx, W, topH);
  }

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, topH, W, H-topH);
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(px, topH + 24, W - px*2, 3);

  ctx.textAlign = 'center';
  ctx.font = '900 34px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ticketWrapText(ctx, info.eventName, px, topH + 72, W - px*2, 42, 2);

  const sub = [info.displayDate, info.session, info.ticketType].filter(Boolean).join('  ·  ');
  if (sub) {
    ctx.font = '600 18px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#4f5964';
    ctx.fillText(sub, W/2, topH + 140);
  }

  const qrSize = Math.round(W * 0.70);
  const qrX = Math.round((W - qrSize) / 2);
  const qrY = topH + 168;
  ctx.fillStyle = '#f7f7f7';
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.fill();
  ctx.strokeStyle = '#ebebeb'; ctx.lineWidth = 1;
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.stroke();
  const qrImg = await ticketQrImage(person.code);
  if (qrImg) ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

  const codeBaseY = qrY + qrSize + 28;
  ctx.font = '700 36px "Courier New", monospace';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.fillText(String(person.code || '').toUpperCase(), W/2, codeBaseY + 32);

  ctx.strokeStyle = '#eeeeee'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px*2, codeBaseY + 50); ctx.lineTo(W - px*2, codeBaseY + 50); ctx.stroke();

  const nameY = codeBaseY + 100;
  ctx.font = '900 46px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText(person.name || '', W/2, nameY);

  const flockLabel = '小組：' + (person.flock || '—');
  ctx.font = '700 20px "Noto Sans TC", sans-serif';
  const fpw = ctx.measureText(flockLabel).width + 48, fph = 42, fpx = (W - fpw) / 2, fpy = nameY + 20;
  ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)'; ctx.lineWidth = 1.5;
  ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.fill(); ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.stroke();
  ctx.fillStyle = '#1a3a5c';
  ctx.fillText(flockLabel, W/2, fpy + 28);

  if (person.group) {
    const groupLabel = String(person.group || '').trim();
    ctx.font = '700 20px "Noto Sans TC", sans-serif';
    const gpw = ctx.measureText(groupLabel).width + 48, gph = 42, gpx = (W - gpw) / 2, gpy = fpy + fph + 16;
    ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)';
    ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.fill(); ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.stroke();
    ctx.fillStyle = '#1a3a5c';
    ctx.fillText(groupLabel, W/2, gpy + 28);
  }
}

async function renderTicketPreview() {
  if (!ticketState.members.length) {
    return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  }
  await ensureTicketScripts();
  const holder = document.getElementById('ticket-preview-list');
  const card = document.getElementById('ticket-preview-card');
  if (!holder || !card) return;
  holder.innerHTML = '';
  card.style.display = 'block';
  const info = ticketInfo();
  const sample = ticketState.members.slice(0,2);
  for (const m of sample) {
    const wrap = document.createElement('div');
    wrap.className = 'ticket-preview-card';
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    holder.appendChild(wrap);
    await drawTicketCanvas(canvas, m, info);
  }
}

async function downloadTicketZip() {
  if (!ticketState.members.length) return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  await ensureTicketScripts();
  const progress = document.getElementById('ticket-progress');
  const fill = document.getElementById('ticket-progress-fill');
  progress.classList.add('on'); fill.style.width = '0%';
  clearBoxMsg('ticket-msg');
  showBoxMsg('ticket-msg', '正在產生票券...', 'info');

  try {
    const zip = new JSZip();
    const canvas = document.createElement('canvas');
    const info = ticketInfo();
    const used = {};

    for (let i = 0; i < ticketState.members.length; i++) {
      const m = ticketState.members[i];
      await drawTicketCanvas(canvas, m, info);
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      let base = ticketSafeName(m.flock || '雁群') + '_' + ticketSafeName(m.name || '姓名');
      let fname = base + '.png';
      if (used[fname]) {
        used[fname]++;
        fname = base + '_' + used[fname] + '.png';
      } else {
        used[fname] = 1;
      }
      zip.file(fname, blob);
      fill.style.width = Math.round((i+1)/ticketState.members.length*100) + '%';
      await new Promise(r => setTimeout(r, 8));
    }

    const content = await zip.generateAsync({ type: 'blob' });
    const zipName = '雁群票券_' + ticketSafeName(info.eventName) + (info.session ? '_' + ticketSafeName(info.session) : '') + '.zip';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = zipName;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    showBoxMsg('ticket-msg', '票券 ZIP 已產生。', 'ok');
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '產生失敗', 'err');
  } finally {
    progress.classList.remove('on');
    fill.style.width = '0%';
  }
}

@media(max-width:420px){.menu-btn{right:16px;width:58px;height:58px}.side-menu{top:82px}.top-actions{gap:6px}.top-actions .btn{padding:9px 5px;font-size:12px}.course-grid{grid-template-columns:1fr}.course-actions{grid-template-columns:1fr}.row{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr 1fr}.date-time-clock{grid-template-columns:1fr}.course-img.placeholder{height:156px}.category-row{grid-template-columns:minmax(0,1fr) 86px 36px}.icon-btn{width:100%}input,select,textarea{padding:11px 10px;font-size:14px}.card{padding:14px}.quick-form-grid{grid-template-columns:1fr 1fr}.field{margin-bottom:10px}}

</head>
<body>

<div class="hd">
  <div class="hd-home" role="button" tabindex="0" onclick="goHomeFromHeader()" onkeydown="handleHeaderHomeKey(event)" aria-label="返回報名課程首頁">
    <small>CYP135 課程系統 V5.13</small>
    <h1 id="page-title">課程報名</h1>
  </div>
  <button class="menu-btn" onclick="toggleMenu(true)" aria-label="開啟選單">☰</button>
</div>
<div id="menu-backdrop" class="menu-backdrop" onclick="toggleMenu(false)"></div>
<div id="side-menu" class="side-menu"></div>
<div id="clock-backdrop" class="clock-backdrop" onclick="closeClockPicker(event)">
  <div id="clock-panel" class="clock-panel" onclick="event.stopPropagation()"></div>
</div>

<div class="wrap">
  <div id="msg" class="msg"></div>
  <div id="app" class="loading">載入中...</div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzlEBM9PCjfGW-QC3w0ILIaQ9-yjvPPLnLxzT_5QD-zjsjSbnpEQcgDg6uyNvjd1vIt/exec';
const LIFF_ID = '2010580892-WjWtHyOn';

let userId = '';
let displayName = '';
let initData = null;
let currentCourse = null;
let selectedLeader = '';
let memberIndex = {};
let registrationIndex = {};
let isCurrentNameDuplicate = false;
let isSubmittingRegistration = false;
let editingCourseCode = '';
let currentCourseData = null;
let lookupTimer = null;
let publicData = null;
let adminCourseData = [];
let isAdminUser = false;
let selectedClassType = '';
let lockedClassType = '';
let lookupCache = {};
let lastLookupSeq = 0;
let activeClockTarget = '';
let activeClockHour = 9;
let activeClockMinute = 0;
let selectedEdmFile = null;
let uploadedEdmUrl = '';
let uploadedEdmFileName = '';
let externalImportState = { step: 1, rows: [], preview: null, fileName: '', eventCode: '', meta: null, grid: null, columns: null };
let excelParserLoading = null;
let coursePrefillFromImport = null;
let rosterState = { course: null, rows: [], groups: [], stats: null, view: 'grouped', query: '', classDetails: [], leaders: [], canManage: false, add: null };

let ticketState = { course: null, members: [], stats: null, bgImage: null, bgName: '' };
let ticketScriptsLoading = null;

const PUBLIC_CACHE_KEY = 'cyp135_public_courses_v510';
let currentView = '';
let appState = {
  courses: [],
  courseMap: {},
  publicLoaded: false,
  publicLoading: null,
  registrationInitByCode: {},
  lastPublicRefresh: 0
};

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.className = 'msg on ' + (type || 'info');
  el.innerHTML = text;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
  el.innerHTML = '';
}

function showBoxMsg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return showMsg(text, type);
  el.className = 'msg on ' + (type || 'info');
  el.innerHTML = text;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function clearBoxMsg(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'msg';
  el.innerHTML = '';
}

function showFormMsg(text, type) {
  showBoxMsg('course-form-msg', text, type);
}

function clearFormMsg() {
  clearBoxMsg('course-form-msg');
}

function showRegisterMsg(text, type) {
  showBoxMsg('registration-result', text, type);
}

function clearRegisterMsg() {
  clearBoxMsg('registration-result');
}

function val(id) {
  return (document.getElementById(id) || {value:''}).value.trim();
}

function esc(input) {
  return (input === undefined || input === null ? '' : String(input))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function post(action, payload, timeoutMs) {
  payload = payload || {};
  payload.action = action;
  timeoutMs = timeoutMs || 18000;

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);

  return fetch(GAS, {
    method: 'post',
    body: JSON.stringify(payload),
    signal: controller.signal
  }).then(async r => {
    clearTimeout(timer);
    const text = await r.text();
    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error('後端回傳非 JSON，前 200 字：' + text.slice(0, 200));
    }
  }).catch(err => {
    clearTimeout(timer);
    if (err && err.name === 'AbortError') {
      throw new Error('讀取時間過久，請重新開啟頁面或稍後再試。');
    }
    throw err;
  });
}



function normalizeCode(code) {
  return String(code || '').trim().toUpperCase();
}

function rebuildCourseMap() {
  appState.courseMap = {};
  (appState.courses || []).forEach(c => {
    const code = normalizeCode(c.eventCode);
    if (code) appState.courseMap[code] = c;
  });
}

function setPublicData(data, fromCache) {
  if (!data || data.status !== 'ok') return;
  publicData = data;
  appState.courses = data.courses || [];
  appState.publicLoaded = true;
  appState.lastPublicRefresh = Date.now();
  rebuildCourseMap();
  if (typeof data.isAdmin !== 'undefined') isAdminUser = !!data.isAdmin;
  renderMenu();

  if (!fromCache) {
    try {
      localStorage.setItem(PUBLIC_CACHE_KEY, JSON.stringify({
        savedAt: Date.now(),
        isAdmin: !!data.isAdmin,
        role: data.role || '',
        courses: data.courses || []
      }));
    } catch (e) {}
  }
}

function loadPublicCache() {
  try {
    const text = localStorage.getItem(PUBLIC_CACHE_KEY);
    if (!text) return false;
    const cached = JSON.parse(text);
    if (!cached || !Array.isArray(cached.courses) || !cached.courses.length) return false;
    setPublicData({
      status: 'ok',
      cached: true,
      isAdmin: !!cached.isAdmin,
      role: cached.role || '',
      courses: cached.courses || []
    }, true);
    return true;
  } catch (e) {
    return false;
  }
}

function getCourseFromState(courseCode) {
  return appState.courseMap[normalizeCode(courseCode)] || null;
}

function mergeCourseToState(course) {
  if (!course || !course.eventCode) return;
  const code = normalizeCode(course.eventCode);
  const existsIndex = (appState.courses || []).findIndex(c => normalizeCode(c.eventCode) === code);
  if (existsIndex >= 0) appState.courses[existsIndex] = Object.assign({}, appState.courses[existsIndex], course);
  else appState.courses.unshift(course);
  rebuildCourseMap();
}

function ensurePublicData(force) {
  if (!force && appState.courses.length) return Promise.resolve(publicData || { status:'ok', courses: appState.courses, isAdmin: isAdminUser });
  if (appState.publicLoading) return appState.publicLoading;

  appState.publicLoading = post('getPublicInitFast', { userId }, 9000)
    .then(data => {
      appState.publicLoading = null;
      if (data && data.status === 'ok') setPublicData(data, false);
      return data;
    })
    .catch(err => {
      appState.publicLoading = null;
      throw err;
    });

  return appState.publicLoading;
}

function refreshPublicInBackground() {
  // 避免短時間內切來切去一直打 GAS。
  if (Date.now() - (appState.lastPublicRefresh || 0) < 30000 && appState.courses.length) return;
  ensurePublicData(true).then(() => {
    if (currentView === 'home') renderHomePage({ skipRefresh: true, keepScroll: true });
  }).catch(() => {});
}

function ensureRegistrationData(courseCode, force) {
  const code = normalizeCode(courseCode);
  if (!force && appState.registrationInitByCode[code]) {
    initData = appState.registrationInitByCode[code];
    currentCourse = initData.course;
    return Promise.resolve(initData);
  }

  return post('getRegistrationInit', { eventCode: code, userId }, 12000).then(data => {
    if (data && data.status === 'ok') {
      appState.registrationInitByCode[code] = data;
      initData = data;
      currentCourse = data.course;
      mergeCourseToState(data.course);
      if (typeof data.isAdmin !== 'undefined') isAdminUser = !!data.isAdmin;
      renderMenu();
    }
    return data;
  });
}

function getParam(name) {
  const qs = new URLSearchParams(location.search);
  if (qs.get(name)) return qs.get(name);

  const state = qs.get('liff.state');
  if (state) {
    const decoded = decodeURIComponent(state);
    const q = decoded.indexOf('?') >= 0 ? decoded.split('?')[1] : decoded;
    const sp = new URLSearchParams(q);
    if (sp.get(name)) return sp.get(name);
  }

  return '';
}

function setTitle(text) {
  document.getElementById('page-title').textContent = text;
}

function goHomeFromHeader() {
  toggleMenu(false);
  const clock = document.getElementById('clock-backdrop');
  if (clock) clock.classList.remove('on');
  renderHomePage({ skipRefresh: true });
}

function handleHeaderHomeKey(event) {
  if (!event || (event.key !== 'Enter' && event.key !== ' ')) return;
  event.preventDefault();
  goHomeFromHeader();
}

function setWideLayout(wide) {
  const wrap = document.querySelector('.wrap');
  if (wrap) wrap.classList.toggle('wide', !!wide);
}

function renderMenu() {
  const menu = document.getElementById('side-menu');
  if (!menu) return;

  const adminBtns = isAdminUser
    ? `
      <button class="menu-item" onclick="toggleMenu(false);renderCreateCoursePage()">建立課程</button>
      <button class="menu-item" onclick="toggleMenu(false);renderExternalImportPage()">外部名單匯入</button>
      <button class="menu-item" onclick="toggleMenu(false);renderTicketGeneratorPage()">票券產生</button>
    `
    : '';

  menu.innerHTML = `
    <div class="menu-head">CYP135 課程系統</div>
    <div class="menu-list">
      <button class="menu-item" onclick="toggleMenu(false);renderHomePage({skipRefresh:true})">報名課程</button>
      ${adminBtns}
      <button class="menu-item" onclick="toggleMenu(false)">關閉選單</button>
    </div>
    <div class="menu-note">首頁顯示所有課程；會長可直接從課程卡片編輯。</div>
  `;
}

function toggleMenu(open) {
  renderMenu();
  const backdrop = document.getElementById('menu-backdrop');
  const menu = document.getElementById('side-menu');
  if (!backdrop || !menu) return;
  backdrop.classList.toggle('on', !!open);
  menu.classList.toggle('on', !!open);
}

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return 'login';
    }

    const profile = await liff.getProfile();
    userId = profile.userId || '';
    displayName = profile.displayName || '';
    return 'ok';

  } catch(e) {
    console.error('LIFF 初始化失敗：', e);
    document.getElementById('app').innerHTML =
      '<div class="card"><h2>LIFF 初始化失敗</h2>' +
      '<p class="meta">請確認 LIFF_ID、LINE Developers Endpoint URL，以及是否從 LINE LIFF 連結開啟。<br><br>錯誤訊息：' + esc(e.message || e) + '</p></div>';
    return 'error';
  }
}

window.addEventListener('DOMContentLoaded', async function() {
  const liffStatus = await initLiff();
  if (liffStatus === 'login' || liffStatus === 'error') return;

  loadPublicCache();
  renderMenu();

  const mode = getParam('mode');
  const courseCode = getParam('course');

  if ((mode === 'detail' || mode === 'register') && courseCode) {
    renderCourseDetailPage(courseCode, mode === 'register');
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'admin' || mode === 'settings' || mode === 'create') {
    renderCreateCoursePage();
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'courses' || mode === 'manage') {
    renderHomePage();
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'import') {
    renderExternalImportPage(courseCode);
    ensurePublicData(true).catch(() => {});
  } else {
    renderHomePage();
  }
});

// ─────────────────────────────
// 首頁：報名課程列表
// ─────────────────────────────
function renderHomePage(options) {
  options = options || {};
  currentView = 'home';
  setWideLayout(true);
  clearMsg();
  setTitle('課程報名');
  const app = document.getElementById('app');

  const courses = (publicData && publicData.courses) || appState.courses || [];
  if (courses.length) {
    renderHomeShell(courses);
    if (!options.skipRefresh) refreshPublicInBackground();
    return;
  }

  app.innerHTML = '<div class="loading">載入課程中...</div>';
  ensurePublicData(true)
    .then(data => {
      if (!data || data.status !== 'ok') {
        app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc((data && data.message) || '') + '</p></div>';
        return;
      }
      renderHomeShell(data.courses || []);
    })
    .catch(err => {
      app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
    });
}

function renderHomeShell(courses) {
  const app = document.getElementById('app');
  const adminTools = isAdminUser
    ? `<div class="top-actions single">
        <button class="btn btn-sub" onclick="renderCreateCoursePage()">建立課程</button>
      </div>`
    : '';

  app.innerHTML = `
    ${adminTools}
    <div class="searchbar">
      <input id="course-search" placeholder="搜尋活動名稱 / 日期 / 場次" oninput="filterPublicCourses()">
    </div>
    <div id="course-list"></div>
  `;

  renderPublicCourseList(courses || []);
}

function filterPublicCourses() {
  const q = val('course-search').toLowerCase();
  const courses = ((publicData && publicData.courses && publicData.courses.length) ? publicData.courses : appState.courses) || [];
  if (!q) return renderPublicCourseList(courses);
  renderPublicCourseList(courses.filter(c => {
    return [c.eventName, c.eventCode, c.dateTime, c.session, c.ticketType, c.statusBadge]
      .join(' ').toLowerCase().includes(q);
  }));
}

function renderPublicCourseList(courses) {
  const el = document.getElementById('course-list');

  if (!courses.length) {
    el.innerHTML = '<div class="card"><h2>目前沒有活動</h2><p class="meta">有新課程開放時會顯示在這裡。</p></div>';
    return;
  }

  el.innerHTML = '<div class="course-grid">' + courses.map(courseCardHtml).join('') + '</div>';
}

function courseCardHtml(c) {
  const full = c.statusBadge === '已額滿';
  const closed = c.statusBadge === '尚未開放';
  const canRegister = canCourseRegister(c);
  const badgeClass = full ? 'red' : (closed || !canRegister ? 'gray' : '');
  const registerButton = canRegister
    ? `<button class="btn btn-main" onclick="renderCourseDetailPage('${esc(c.eventCode)}', true)">立即報名</button>`
    : '<button class="btn btn-warn" disabled>目前無法報名</button>';
  const img = c.dmUrl
    ? `<img class="course-img" loading="lazy" src="${esc(c.dmUrl)}" onerror="this.style.display='none'">`
    : `<div class="course-img placeholder"></div>`;

  return `
    <div class="course-card">
      ${img}
      <div class="course-body">
        <div class="course-title">${esc(c.eventName || '未命名活動')}</div>
        <div class="badges">
          <span class="badge ${badgeClass}">${esc(c.statusBadge || c.statusText || '活動')}</span>
          <span class="badge">${esc(c.session || '場次未設定')}</span>
        </div>
        <div class="meta">
          日期時間：<b>${esc(c.dateTime || '尚未設定')}</b><br>
          票種：${esc(c.ticketType || '—')}<br>
          金額：${esc(c.priceSummary || '—')}<br>
          名額：${getCountText(c)}
        </div>
        <div class="course-actions ${isAdminUser ? 'admin' : ''}">
          <button class="btn btn-sub" onclick="renderCourseDetailPage('${esc(c.eventCode)}')">查看詳情</button>
          ${registerButton}
          ${isAdminUser ? `<button class="btn btn-ghost" onclick="renderCourseRosterPage('${esc(c.eventCode)}')">名單</button><button class="btn btn-ghost" onclick="renderEditCoursePageByCode('${esc(c.eventCode)}')">編輯</button>` : ''}
        </div>
      </div>
    </div>
  `;
}

// ─────────────────────────────
// 活動詳情頁
// ─────────────────────────────
async function renderCourseDetailPage(courseCode, openRegisterNow) {
  currentView = openRegisterNow ? 'register' : 'detail';
  setWideLayout(false);
  clearMsg();
  setTitle(openRegisterNow ? '填寫報名' : '活動詳情');

  const localCourse = getCourseFromState(courseCode);
  if (localCourse && !openRegisterNow) {
    currentCourse = localCourse;
    renderMenu();
    renderCourseDetailContent(localCourse);
    return;
  }

  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">載入活動資料中...</div>';

  try {
    const data = await ensureRegistrationData(courseCode);
    if (!data || data.status !== 'ok') {
      app.innerHTML = '<div class="card"><h2>找不到課程</h2><p class="meta">' + esc((data && data.message) || '') + '</p><button class="btn btn-sub" onclick="renderHomePage()">返回課程列表</button></div>';
      return;
    }

    currentCourse = data.course;
    mergeCourseToState(data.course);

    if (openRegisterNow && canCourseRegister(data.course)) {
      renderRegisterForm();
    } else {
      renderCourseDetailContent(data.course);
    }
  } catch (err) {
    app.innerHTML = '<div class="card"><h2>活動載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
  }
}

function canCourseRegister(c) {
  if (!c) return false;
  return c.openFlag === '是' && (c.statusBadge || '報名中') === '報名中';
}

function renderCourseDetailContent(c) {
  currentView = 'detail';
  setTitle('活動詳情');
  currentCourse = c;
  renderMenu();

  const app = document.getElementById('app');
  const canRegister = canCourseRegister(c);
  const img = c.dmUrl ? `<img class="detail-hero" loading="lazy" src="${esc(c.dmUrl)}" onerror="this.style.display='none'">` : '';
  const countText = getCountText(c);

  app.innerHTML = `
    <button class="btn btn-ghost" onclick="renderHomePage({skipRefresh:true})">← 返回報名課程</button>
    <div class="card" style="margin-top:12px">
      ${img}
      <h2>${esc(c.eventName)}</h2>
      <div class="badges">
        <span class="badge ${c.statusBadge === '已額滿' ? 'red' : ''}">${esc(c.statusBadge || '活動')}</span>
        <span class="badge">${esc(c.session || '場次未設定')}</span>
      </div>
      <div class="meta">
        日期時間：<b>${esc(c.dateTime || '尚未設定')}</b><br>
        票種：${esc(c.ticketType || '—')}<br>
        金額：${esc(c.priceSummary || '—')}<br>
        報名時間：${esc(c.applyStart || '—')} ～ ${esc(c.applyEnd || '—')}<br>
        名額：${countText}
      </div>
      ${c.description ? '<div class="divider"></div><div class="desc">' + esc(c.description) + '</div>' : ''}
      <div class="divider"></div>
      <div class="compact-actions">
        ${canRegister ? '<button class="btn btn-main" onclick="renderRegisterForm()">我要報名</button>' : '<button class="btn btn-warn" disabled>目前無法報名</button>'}
        ${isAdminUser ? `<button class="btn btn-sub" onclick="renderCourseRosterPage('${esc(c.eventCode)}')">名單管理</button>` : '<button class="btn btn-ghost" onclick="renderHomePage({skipRefresh:true})">返回課程首頁</button>'}
      </div>
      ${isAdminUser ? '<button class="btn btn-ghost" style="margin-top:8px" onclick="renderHomePage({skipRefresh:true})">返回課程首頁</button>' : ''}
    </div>
  `;
}

function getCountText(c) {
  if (!c) return '—';
  const hasCount = c.currentCount !== undefined && c.currentCount !== null && c.currentCount !== '';
  if (hasCount && c.maxCount) return esc(String(c.currentCount || 0) + ' / ' + c.maxCount);
  if (hasCount) return esc(String(c.currentCount || 0));
  return c.maxCount ? '上限 ' + esc(c.maxCount) : '不限';
}

// ─────────────────────────────
// 名單管理
// ─────────────────────────────
async function renderCourseRosterPage(courseCode) {
  currentView = 'roster';
  setWideLayout(true);
  clearMsg();
  setTitle('名單管理');
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">載入名單中...</div>';

  const allowed = await ensureAdminAccess();
  if (!allowed) return;

  try {
    const data = await post('getCourseRoster', { userId, eventCode: courseCode }, 18000);
    if (!data || data.status !== 'ok') {
      app.innerHTML = '<div class="card"><h2>名單載入失敗</h2><p class="meta">' + esc((data && data.message) || '') + '</p></div>';
      return;
    }
    applyRosterData(data);
    renderRosterContent();
  } catch (err) {
    app.innerHTML = '<div class="card"><h2>名單載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
  }
}

function applyRosterData(data) {
  const oldCode = rosterState.course && rosterState.course.eventCode;
  rosterState.course = data.course || rosterState.course;
  const newCode = rosterState.course && rosterState.course.eventCode;
  if (oldCode !== newCode) rosterState.add = null;
  rosterState.rows = data.rows || [];
  rosterState.groups = data.groups || [];
  rosterState.stats = data.stats || {};
  rosterState.classDetails = data.classDetails || [];
  rosterState.leaders = data.leaders || [];
  if (typeof data.canManage !== 'undefined') rosterState.canManage = !!data.canManage;
  if (rosterState.course) {
    currentCourse = rosterState.course;
    mergeCourseToState(rosterState.course);
  }
}

function renderRosterContent() {
  const c = rosterState.course || {};
  const stats = rosterState.stats || {};
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="top-actions">
      <button class="btn btn-sub" onclick="renderHomePage({skipRefresh:true})">課程首頁</button>
      <button class="btn btn-sub" onclick="renderCourseDetailPage('${esc(c.eventCode)}')">活動詳情</button>
      <button class="btn btn-main" onclick="refreshRoster()">重新整理</button>
    </div>
    <div class="card compact-card">
      <h2>${esc(c.eventName || '課程名單')}</h2>
      <div class="meta">${esc(c.dateTime || '')}｜${esc(c.session || '')}<br>名額：${esc(stats.active || 0)} / ${esc(stats.maxCount || '不限')}</div>
      <div class="roster-summary">
        <div class="roster-stat"><strong>${esc(stats.active || 0)}</strong><span>有效報名</span></div>
        <div class="roster-stat"><strong>${esc(stats.added || 0)}</strong><span>加報</span></div>
        <div class="roster-stat"><strong>${esc(stats.cancelled || 0)}</strong><span>取消</span></div>
        <div class="roster-stat"><strong>${stats.remaining === '' ? '不限' : esc(stats.remaining)}</strong><span>剩餘名額</span></div>
      </div>
      <div id="roster-msg" class="msg"></div>
      ${renderRosterAddForm()}
      ${renderRosterFillAction()}
      <div class="divider"></div>
      <div class="searchbar"><input id="roster-search" placeholder="搜尋姓名 / 雁群 / 類別 / 狀態" value="${esc(rosterState.query || '')}" oninput="filterRosterList()"></div>
      <div class="roster-tabs">
        <button class="btn btn-sub ${rosterState.view === 'grouped' ? 'on' : ''}" onclick="setRosterView('grouped')">依雁群</button>
        <button class="btn btn-sub ${rosterState.view === 'all' ? 'on' : ''}" onclick="setRosterView('all')">全部名單</button>
        <button class="btn btn-sub ${rosterState.view === 'cancelled' ? 'on' : ''}" onclick="setRosterView('cancelled')">取消名單</button>
      </div>
      <div id="roster-list"></div>
    </div>
  `;
  renderRosterList();
}

function renderRosterAddForm() {
  if (!rosterState.canManage) {
    return '<div class="readonly-box">目前是名單查看模式；需 LINE權限表 E 欄包含「管理權限」才可加報、取消或恢復。</div>';
  }
  const c = rosterState.course || {};
  const classDetails = rosterState.classDetails || [];
  const needsClass = classDetails.length > 1;
  if (!rosterState.add) resetRosterAddState();
  const leaderOptions = (rosterState.leaders || []).map(x => `<option value="${esc(x)}"></option>`).join('');

  return `
    <details class="fold">
      <summary>管理加報</summary>
      <div class="fold-content">
        <div class="form-grid">
          <div class="field">
            <label>姓名</label>
            <input id="roster-add-name" placeholder="輸入加報姓名" oninput="handleRosterAddNameInput()">
          </div>
          <div class="field">
            <label>上手白金/雁群組長</label>
            <input id="roster-add-leader" list="roster-leader-options" placeholder="查無名冊時必填" value="${esc(rosterState.add.selectedLeader || '')}" onchange="handleRosterAddLeaderChange()">
            <datalist id="roster-leader-options">${leaderOptions}</datalist>
          </div>
          <div id="roster-add-lookup" class="full"></div>
          ${needsClass ? `<div class="field full"><label>上課類別</label>${renderRosterAddClassChoices(classDetails)}</div>` : ''}
          <div class="field ${needsClass ? '' : 'full'}">
            <label>備註</label>
            <input id="roster-add-remark" placeholder="可空白">
          </div>
        </div>
        <button class="btn btn-main" onclick="submitAdminAddRegistration()">送出加報</button>
        <p class="muted" style="margin-top:8px">加報會寫入報名總表 F 欄「加報」，並納入有效名額統計。</p>
      </div>
    </details>
  `;
}

function resetRosterAddState() {
  rosterState.add = {
    name: '',
    selectedLeader: '',
    selectedClassType: '',
    lockedClassType: '',
    lookupMembers: [],
    lookupTimer: null,
    lastSeq: 0,
    duplicate: false
  };
}

function renderRosterAddClassChoices(details) {
  const add = rosterState.add || {};
  details = details || [];
  return '<div class="class-choice-grid">' + details.map(item => {
    const name = String(item.name || '').trim();
    const price = Number(item.price || 0);
    const on = name === add.selectedClassType ? ' on' : '';
    const locked = add.lockedClassType && name !== add.lockedClassType;
    const lockedAttrs = locked ? ' disabled aria-disabled="true"' : '';
    return `<button type="button" class="class-choice roster-add-class-choice${on}${locked ? ' locked' : ''}" data-class="${esc(name)}" onclick="selectRosterAddClass(this.dataset.class)"${lockedAttrs}>
      <div class="class-choice-name">${esc(name)}</div>
      <div class="class-choice-price">$${esc(price)}</div>
    </button>`;
  }).join('') + '</div><div id="roster-add-price" class="readonly-box" style="margin-top:8px">' + rosterAddPriceText() + '</div>';
}

function rosterAddPriceText() {
  const add = rosterState.add || {};
  const detail = (rosterState.classDetails || []).find(item => String(item.name || '').trim() === String(add.selectedClassType || '').trim());
  if (!detail) return '請先選類別';
  return `本次票價：$${esc(Number(detail.price || 0))}`;
}

function syncRosterAddClassChoices() {
  const add = rosterState.add || {};
  document.querySelectorAll('.roster-add-class-choice').forEach(btn => {
    const isSelected = btn.dataset.class === add.selectedClassType;
    const isLockedOut = !!add.lockedClassType && btn.dataset.class !== add.lockedClassType;
    btn.classList.toggle('on', isSelected);
    btn.classList.toggle('locked', isLockedOut);
    btn.disabled = isLockedOut;
    btn.setAttribute('aria-disabled', isLockedOut ? 'true' : 'false');
  });
  const price = document.getElementById('roster-add-price');
  if (price) price.innerHTML = rosterAddPriceText();
}

function selectRosterAddClass(classType, options) {
  const add = rosterState.add || (rosterState.add = {});
  const nextType = String(classType || '').trim();
  if (add.lockedClassType && nextType !== add.lockedClassType && !(options && options.force)) {
    syncRosterAddClassChoices();
    return;
  }
  add.selectedClassType = nextType;
  syncRosterAddClassChoices();
}

function hasRosterAddPlatinumClassPair() {
  const mode = String((rosterState.course && rosterState.course.pricingMode) || '').trim();
  if (mode === '類別制') return false;
  const details = rosterState.classDetails || [];
  return details.some(item => String(item.name || '').trim() === '白金')
    && details.some(item => String(item.name || '').trim() === '非白金');
}

function inferRosterAddClassType(member) {
  if (!hasRosterAddPlatinumClassPair()) return '';
  const status = String((member && member.memberStatus) || '').trim();
  if (status.includes('非白金')) return '非白金';
  if (status.includes('白金')) return '白金';
  return '非白金';
}

function applyRosterAddClassAutoSelection(member) {
  const classType = inferRosterAddClassType(member);
  if (!classType) return '';
  const add = rosterState.add || (rosterState.add = {});
  add.lockedClassType = classType;
  selectRosterAddClass(classType, { force: true });
  return classType;
}

function handleRosterAddNameInput() {
  const add = rosterState.add || (rosterState.add = {});
  const name = val('roster-add-name');
  add.name = name;
  add.duplicate = false;
  add.selectedLeader = '';
  add.lookupMembers = [];
  add.selectedClassType = hasRosterAddPlatinumClassPair() ? '' : add.selectedClassType;
  add.lockedClassType = '';
  syncRosterAddClassChoices();

  const box = document.getElementById('roster-add-lookup');
  if (box) box.innerHTML = '';
  if (add.lookupTimer) clearTimeout(add.lookupTimer);
  const clean = cleanNameLocal(name);
  if (!clean) return;
  add.lookupTimer = setTimeout(() => lookupRosterAddName(clean, name), 350);
}

async function lookupRosterAddName(clean, name) {
  const add = rosterState.add || (rosterState.add = {});
  const box = document.getElementById('roster-add-lookup');
  const leaderInput = document.getElementById('roster-add-leader');
  if (!box || clean !== cleanNameLocal(val('roster-add-name'))) return;
  const duplicate = (rosterState.rows || []).find(row => row.rawStatus !== '取消' && cleanNameLocal(row.name || row.cleanName) === clean);
  if (duplicate) {
    add.duplicate = true;
    box.innerHTML = '<div class="msg on err">此姓名已有有效報名，無法重複加報。</div>';
    return;
  }

  try {
    const seq = ++add.lastSeq;
    box.innerHTML = '<div class="msg on info">查詢名冊中...</div>';
    const res = await post('lookupMember', { name }, 7000);
    if (seq !== add.lastSeq || clean !== cleanNameLocal(val('roster-add-name'))) return;

    if (res && res.status === 'found') {
      const member = res.member || {};
      add.lookupMembers = [member];
      add.selectedLeader = member.leader || member.flock || member.uplinePlatinum || '';
      if (leaderInput) leaderInput.value = add.selectedLeader;
      const autoClassType = applyRosterAddClassAutoSelection(member);
      box.innerHTML = `
        <div class="msg on ok">
          ✅ 已找到名冊資料<br>
          姓名：${esc(member.name || name)}<br>
          上手白金/雁群組長：${esc(add.selectedLeader || '—')}
          ${autoClassType ? `<br>自動判斷類別：${esc(autoClassType)}（依名冊鎖定）` : ''}
        </div>
      `;
    } else if (res && res.status === 'multiple') {
      add.lookupMembers = res.members || [];
      const choices = [...new Set((res.members || []).map(x => x.leader || x.flock || x.uplinePlatinum).filter(Boolean))];
      box.innerHTML = '<div class="msg on info">找到多筆同名資料，請在右側選擇上手白金/雁群組長後再加報。</div>';
      if (leaderInput && choices.length) leaderInput.setAttribute('list', 'roster-leader-options');
    } else {
      add.selectedLeader = '';
      if (leaderInput) leaderInput.value = '';
      const autoClassType = applyRosterAddClassAutoSelection(null);
      box.innerHTML = `
        <div class="msg on err">
          查無名冊資料，請選擇上手白金/雁群組長<br>
          建立資料
          ${autoClassType ? `<br>自動判斷類別：${esc(autoClassType)}` : ''}
        </div>
      `;
    }
  } catch (err) {
    box.innerHTML = '<div class="msg on err">名冊查詢較慢或失敗，請手動選擇上手白金/雁群組長。</div>';
  }
}

function handleRosterAddLeaderChange() {
  const add = rosterState.add || (rosterState.add = {});
  const leader = val('roster-add-leader').trim();
  add.selectedLeader = leader;
  if (!leader || !Array.isArray(add.lookupMembers) || !add.lookupMembers.length) return;
  const member = add.lookupMembers.find(item => String(item.leader || item.flock || item.uplinePlatinum || '').trim() === leader);
  if (member) applyRosterAddClassAutoSelection(member);
}

function renderRosterFillAction() {
  if (!rosterState.canManage) return '';
  const needsFill = (rosterState.rows || []).some(row => row.rawStatus !== '取消' && row.needsFill);
  if (!needsFill) return '';
  return `
    <div class="readonly-box" style="margin-top:10px">
      有部分名單缺少上課類別或金額，畫面已先依課程管理與名冊資料推算。
      <button class="btn btn-sub" style="margin-top:10px" onclick="fillRosterDerivedData()">補齊本課名單資料</button>
    </div>
  `;
}

function filterRosterList() {
  rosterState.query = val('roster-search');
  renderRosterList();
}

function setRosterView(view) {
  rosterState.view = view;
  renderRosterContent();
}

function getFilteredRosterRows() {
  const q = String(rosterState.query || '').trim().toLowerCase();
  let rows = (rosterState.rows || []).slice();
  if (rosterState.view === 'cancelled') rows = rows.filter(row => row.rawStatus === '取消');
  if (q) {
    rows = rows.filter(row => [row.name, row.cleanName, row.leader, row.flock, row.classType, row.displayClassType, row.status, row.source]
      .join(' ').toLowerCase().includes(q));
  }
  return rows;
}

function renderRosterList() {
  const box = document.getElementById('roster-list');
  if (!box) return;
  const rows = getFilteredRosterRows();
  if (!rows.length) {
    box.innerHTML = '<div class="readonly-box">目前沒有符合條件的名單。</div>';
    return;
  }

  if (rosterState.view === 'grouped') {
    const groups = groupRosterRowsClient(rows);
    box.innerHTML = groups.map(group => `
      <div class="roster-group">
        <div class="roster-group-head">${esc(group.flock)}｜有效 ${esc(group.active)} 人${group.added ? '｜加報 ' + esc(group.added) : ''}${group.cancelled ? '｜取消 ' + esc(group.cancelled) : ''}</div>
        ${group.rows.map(renderRosterRow).join('')}
      </div>
    `).join('');
    return;
  }

  box.innerHTML = '<div class="roster-group">' + rows.map(renderRosterRow).join('') + '</div>';
}

function groupRosterRowsClient(rows) {
  const map = {};
  rows.forEach(row => {
    const key = row.flock || row.leader || '未分組';
    if (!map[key]) map[key] = { flock: key, active: 0, cancelled: 0, added: 0, rows: [] };
    map[key].rows.push(row);
    if (row.rawStatus === '取消') map[key].cancelled += 1;
    else {
      map[key].active += 1;
      if (row.rawStatus === '加報') map[key].added += 1;
    }
  });
  return Object.keys(map).sort().map(key => map[key]);
}

function renderRosterRow(row) {
  const cancelled = row.rawStatus === '取消';
  const statusClass = cancelled ? 'gray' : (row.rawStatus === '加報' ? 'yellow' : '');
  const action = !rosterState.canManage
    ? ''
    : cancelled
    ? `<button class="btn btn-sub" onclick="updateRosterStatus(${Number(row.rowNumber)}, '')">恢復</button>`
    : `<button class="btn btn-warn" onclick="updateRosterStatus(${Number(row.rowNumber)}, '取消')">取消報名</button>`;
  const classText = row.displayClassType || row.classType || '—';
  const priceValue = row.displayPrice !== undefined && row.displayPrice !== '' ? row.displayPrice : row.price;
  const priceText = priceValue === '' ? '—' : priceValue;
  const inferredText = row.classTypeInferred || row.priceInferred ? '<span class="badge yellow">推算</span>' : '';
  const registeredBy = row.createdBy || row.source || '—';
  const cancelLine = cancelled
    ? `<br><span class="muted">取消：${esc(row.cancelledBy || row.statusUpdatedBy || '—')}｜${esc(row.cancelledAt || row.statusUpdatedAt || '—')}</span>`
    : '';
  return `
    <div class="roster-row ${cancelled ? 'cancelled' : ''}">
      <div>
        <div class="roster-name">${esc(row.name || row.cleanName || '未命名')}</div>
        <div class="roster-meta">${esc(row.flock || row.leader || '未分組')}｜${esc(classText)}｜$${esc(priceText)} ${inferredText}</div>
      </div>
      <div class="roster-meta">
        <span class="badge ${statusClass}">${esc(row.status || '正常')}</span><br>
        報名：${esc(registeredBy)}｜${esc(row.registeredAt || '—')}${cancelLine}
      </div>
      <div class="roster-actions">${action}</div>
    </div>
  `;
}

async function refreshRoster() {

async function updateRosterStatus(rowNumber, status) {
  if (!rosterState.course) return;
  const label = status === '取消' ? '取消這筆報名' : '恢復這筆報名';
  if (!confirm('確認要' + label + '？')) return;
  showBoxMsg('roster-msg', '更新中...', 'info');
  try {
    const res = await post('updateRegistrationStatus', {
      userId,
      displayName,
      eventCode: rosterState.course.eventCode,
      rowNumber,
      status
    }, 18000);
    if (!res || res.status !== 'ok') return showBoxMsg('roster-msg', esc((res && res.message) || '更新失敗'), 'err');
    applyRosterData(res);
    renderRosterContent();
    showBoxMsg('roster-msg', esc(res.message || '已更新'), 'ok');
  } catch (err) {
    showBoxMsg('roster-msg', esc(err.message || err), 'err');
  }
}

async function submitAdminAddRegistration() {
  if (!rosterState.course) return;
  const name = val('roster-add-name');
  if (!name) return showBoxMsg('roster-msg', '請輸入加報姓名。', 'err');
  const add = rosterState.add || {};
  if (add.duplicate) return showBoxMsg('roster-msg', '此姓名已有有效報名，無法重複加報。', 'err');
  const classType = add.selectedClassType || val('roster-add-class');
  const leader = (add.selectedLeader || val('roster-add-leader') || '').trim();

      userId,

      eventCode: rosterState.course.eventCode,

    }, 20000);

function handleEdmFileChange(event) {
  const file = event.target.files && event.target.files[0];
  const box = document.getElementById('edm-preview-box');
  const hidden = document.getElementById('c-dm');

  selectedEdmFile = null;
  uploadedEdmUrl = '';
  uploadedEdmFileName = '';
  if (hidden && !currentCourseData) hidden.value = '';

  if (!file) {
    if (box && !(currentCourseData && currentCourseData.dmUrl)) {
      box.classList.add('hide');
      box.innerHTML = '';
    }
    return;
  }

  if (!file.type || file.type.indexOf('image/') !== 0) {
    showFormMsg('請選擇圖片檔。', 'err');
    event.target.value = '';
    return;
  }

  selectedEdmFile = file;
  const previewUrl = URL.createObjectURL(file);
  const predictedName = buildPreviewEdmFileName(file);

  if (box) {
    box.classList.remove('hide');
    box.innerHTML = `
      <img src="${previewUrl}" alt="EDM 預覽">
      <div class="edm-info">
        已選擇：${esc(file.name)}<br>
        上傳後檔名：${esc(predictedName)}<br>
        狀態：尚未上傳，按「${editingCourseCode ? '更新課程' : '建立課程'}」時會自動上傳。
      </div>
    `;
  }
}

function buildPreviewEdmFileName(file) {
  const date = val('c-date') || '日期';
  const cleanDate = date.replace(/[^0-9]/g, '') || '日期';
  const name = (val('c-name') || '活動名稱')
    .replace(/[\\\/:*?"<>|#%&{}$!'@+=`]/g, '_')
    .replace(/\s+/g, '_')
    .replace(/_+/g, '_')
    .slice(0, 80);
  const ext = getExtFromMime(file && file.type ? file.type : 'image/jpeg');
  return `${cleanDate}_${name}.${ext}`;
}

function getExtFromMime(mime) {
  const m = (mime || '').toLowerCase();
  if (m.includes('png')) return 'png';
  if (m.includes('webp')) return 'webp';
  if (m.includes('gif')) return 'gif';
  return 'jpg';
}

async function uploadEdmIfNeeded(eventName, eventDate) {
  if (!selectedEdmFile) return val('c-dm');
  if (uploadedEdmUrl) return uploadedEdmUrl;

  const dataUrl = await compressImageToDataUrl(selectedEdmFile, 1600, 0.86);
  const res = await post('uploadEdmImage', {
    userId,
    eventName,
    eventDate,
    fileName: selectedEdmFile.name,
    mimeType: 'image/jpeg',
    dataUrl
  });

  if (res.status !== 'ok') throw new Error(res.message || 'EDM 圖片上傳失敗');

  uploadedEdmUrl = res.url || '';
  uploadedEdmFileName = res.fileName || '';
  const hidden = document.getElementById('c-dm');
  if (hidden) hidden.value = uploadedEdmUrl;

  const box = document.getElementById('edm-preview-box');
  if (box) {
    box.classList.remove('hide');
    box.innerHTML = `
      <img src="${esc(uploadedEdmUrl)}" alt="EDM 預覽">
      <div class="edm-info">✅ 已上傳到 Google Drive<br>檔名：${esc(uploadedEdmFileName || '—')}</div>
    `;
  }

  return uploadedEdmUrl;
}

function compressImageToDataUrl(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('圖片讀取失敗'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('圖片載入失敗'));
      img.onload = () => {
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderTimePicker(prefix, selected) {
  selected = selected || {};
  const value = selected.time || to24Hour(selected.hour, selected.minute, selected.ampm) || '';
  return renderClockTimePicker(`${prefix}-time`, value);
}

function renderClockTimePicker(id, value, dataAttrs) {
  const safeValue = normalizeClockValue(value);
  const attrs = dataAttrs || '';
  return `
    <div class="time-clock-grid">
      <input id="${esc(id)}" type="hidden" value="${esc(safeValue)}"${attrs}>
      <button id="${esc(id)}-display" type="button" class="clock-display ${safeValue ? '' : 'empty'}" onclick="openClockPicker('${esc(id)}')">${esc(formatClockDisplay(safeValue))}</button>
    </div>
  `;
}

function renderDateTimeClockPicker(id, text) {
  const local = toDatetimeLocalValue(text);
  const parts = local ? local.split('T') : ['', ''];
  const date = parts[0] || '';
  const time = normalizeClockValue(parts[1] || '');
  return `
    <div class="date-time-clock">
      <input id="${esc(id)}" type="hidden" value="${esc(date && time ? date + 'T' + time : '')}">
      <input id="${esc(id)}-date" type="date" value="${esc(date)}" onchange="syncDateTimeClock('${esc(id)}')">
      ${renderClockTimePicker(`${id}-time`, time, ` data-datetime-base="${esc(id)}"`)}
    </div>
  `;
}

function syncDateTimeClock(id) {
  const date = val(`${id}-date`);
  const time = val(`${id}-time`);
  const target = document.getElementById(id);
  if (!target) return;
  target.value = date && time ? `${date}T${time}` : '';
}

function normalizeClockValue(value) {
  const m = String(value || '').match(/^(\d{1,2}):(\d{2})/);
  if (!m) return '';
  const h = Math.max(0, Math.min(23, Number(m[1]) || 0));
  const min = Math.max(0, Math.min(59, Number(m[2]) || 0));
  return String(h).padStart(2, '0') + ':' + String(min).padStart(2, '0');
}

function formatClockDisplay(value) {
  const normalized = normalizeClockValue(value);
  return normalized || '選擇時間';
}

function openClockPicker(targetId) {
  const target = document.getElementById(targetId);
  if (!target) return;
  activeClockTarget = targetId;
  const parsed = normalizeClockValue(target.value);
  const now = new Date();
  activeClockHour = parsed ? Number(parsed.slice(0, 2)) : now.getHours();
  activeClockMinute = parsed ? Number(parsed.slice(3, 5)) : 0;
  renderClockPanel();
  document.getElementById('clock-backdrop').classList.add('on');
}

function closeClockPicker(event) {
  if (event && event.target && event.target.id !== 'clock-backdrop') return;
  document.getElementById('clock-backdrop').classList.remove('on');
}

function getClockPeriod() {
  return activeClockHour >= 12 ? 'PM' : 'AM';
}

function getClockHour12() {
  const hour = activeClockHour % 12;
  return hour || 12;
}

function setClockPeriod(period) {
  const hour12 = getClockHour12();
  activeClockHour = period === 'PM' ? (hour12 % 12) + 12 : (hour12 % 12);
  renderClockPanel();
}

function setClockHour(hour12) {
  const period = getClockPeriod();
  activeClockHour = period === 'PM' ? (hour12 % 12) + 12 : (hour12 % 12);
  renderClockPanel();
}

function setClockMinute(minute) {
  activeClockMinute = Math.max(0, Math.min(59, Number(minute) || 0));
  renderClockPanel();
}

function adjustClockMinute(delta) {
  activeClockMinute = (activeClockMinute + delta + 60) % 60;
  renderClockPanel();
}

function saveClockPicker() {
  const target = document.getElementById(activeClockTarget);
  if (!target) return;
  const value = String(activeClockHour).padStart(2, '0') + ':' + String(activeClockMinute).padStart(2, '0');
  target.value = value;
  updateClockDisplay(activeClockTarget);
  if (target.dataset.datetimeBase) syncDateTimeClock(target.dataset.datetimeBase);
  document.getElementById('clock-backdrop').classList.remove('on');
}

function clearClockPicker() {
  const target = document.getElementById(activeClockTarget);
  if (!target) return;
  target.value = '';
  updateClockDisplay(activeClockTarget);
  if (target.dataset.datetimeBase) syncDateTimeClock(target.dataset.datetimeBase);
  document.getElementById('clock-backdrop').classList.remove('on');
}

function updateClockDisplay(targetId) {
  const target = document.getElementById(targetId);
  const display = document.getElementById(`${targetId}-display`);
  if (!target || !display) return;
  const text = formatClockDisplay(target.value);
  display.textContent = text;
  display.classList.toggle('empty', !target.value);
}

function renderClockPanel() {
  const panel = document.getElementById('clock-panel');
  if (!panel) return;
  const period = getClockPeriod();
  const hour12 = getClockHour12();
  const minuteChoices = ['00','05','10','15','20','25','30','35','40','45','50','55'];
  const hours = Array.from({ length: 12 }, (_, i) => i + 1);
  panel.innerHTML = `
    <div class="clock-title">選擇時間</div>
    <div class="clock-value">${String(activeClockHour).padStart(2, '0')}:${String(activeClockMinute).padStart(2, '0')}</div>
    <div class="clock-period">
      <button type="button" class="${period === 'AM' ? 'on' : ''}" onclick="setClockPeriod('AM')">上午</button>
      <button type="button" class="${period === 'PM' ? 'on' : ''}" onclick="setClockPeriod('PM')">下午</button>
    </div>
    <div class="clock-face">
      ${hours.map(hour => {
        const angle = (hour % 12) * 30 - 90;
        const rad = angle * Math.PI / 180;
        const x = 110 + Math.cos(rad) * 82;
        const y = 110 + Math.sin(rad) * 82;
        return `<button type="button" class="clock-hour ${hour12 === hour ? 'on' : ''}" style="left:${x}px;top:${y}px" onclick="setClockHour(${hour})">${hour}</button>`;
      }).join('')}
    </div>
    <div class="clock-minute">
      ${minuteChoices.map(min => `<button type="button" class="${activeClockMinute === Number(min) ? 'on' : ''}" onclick="setClockMinute(${Number(min)})">${min}</button>`).join('')}
    </div>
    <div class="clock-actions">
      <button type="button" class="ghost" onclick="adjustClockMinute(-1)">-1 分</button>
      <button type="button" class="ghost" onclick="adjustClockMinute(1)">+1 分</button>
      <button type="button" onclick="saveClockPicker()">完成</button>
      <button type="button" class="ghost" onclick="clearClockPicker()">清除</button>
      <button type="button" class="ghost" onclick="document.getElementById('clock-backdrop').classList.remove('on')">取消</button>
    </div>
  `;
}

function optionHtml(arr, selected, placeholder) {

function validateCategoryItems(items) {
  const filled = (items || []).filter(item => item.name);
  if (!filled.length) return '請至少新增一個課程類別與價格';

  for (const item of filled) {
    if (item.price === '') return `請填寫「${item.name}」的價格`;
    const price = Number(item.price);
    if (!Number.isFinite(price) || price < 0) return `「${item.name}」的價格格式不正確`;
  }

  const names = filled.map(x => x.name).join(',');
  const prices = filled.map(x => String(Number(x.price))).join(',');
  return { items: filled, names, prices };
}

function ensureExcelParser() {
  if (window.XLSX) return Promise.resolve();
  if (excelParserLoading) return excelParserLoading;

  excelParserLoading = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    script.onload = () => window.XLSX ? resolve() : reject(new Error('Excel 解析工具載入失敗'));
    script.onerror = () => reject(new Error('Excel 解析工具載入失敗，請確認網路後重試。'));
    document.head.appendChild(script);
  });

  return excelParserLoading;
}

async function handleExternalExcelFile(input) {
  const file = input && input.files && input.files[0];
  const eventCode = normalizeCode(val('external-course-select'));
  const preview = document.getElementById('external-import-preview');
  if (preview) preview.innerHTML = '';

  if (!file) return;

  try {
    showBoxMsg('external-import-msg', '讀取 Excel 中...', 'info');
    await ensureExcelParser();
    const parsed = await parseExternalExcelFile(file);
    const rows = parsed.rows || [];
    if (!rows.length) {
      externalImportState = {
        step: 2,
        rows: [],
        preview: null,
        fileName: file.name,
        eventCode,
        meta: parsed.meta || null,
        grid: parsed.grid || null,
        columns: parsed.columns || null
      };
      return showBoxMsg('external-import-msg', 'Excel 沒有可匯入資料。', 'err');
    }

    externalImportState = {
      step: 3,
      rows: [],
      preview: null,
      fileName: file.name,
      eventCode,
      meta: parsed.meta || null,
      grid: parsed.grid || null,
      columns: parsed.columns || null
    };
    renderExternalImportSuggestion();
    updateExternalImportSteps(eventCode ? 3 : 2);
    if (eventCode) {
      await applyExternalColumnMapping();
    } else {
      showBoxMsg('external-import-msg', '已讀取 Excel，請選擇課程或建立新課程。', 'info');
    }
  } catch (err) {
    showBoxMsg('external-import-msg', esc(err.message || err), 'err');
  }
}

async function previewExternalImportRows() {
  const state = externalImportState || {};
  const eventCode = normalizeCode(state.eventCode || val('external-course-select'));
  if (!eventCode) {
    renderExternalImportSuggestion();
    return showBoxMsg('external-import-msg', '請先選擇要匯入的課程。', 'err');
  }
  if (!state.rows || !state.rows.length) {
    return showBoxMsg('external-import-msg', '請先上傳 Excel。', 'err');
  }

  showBoxMsg('external-import-msg', '檢查匯入資料中...', 'info');
  const data = await post('previewExternalImport', {
    userId,
    eventCode,
    fileName: state.fileName,
    rows: state.rows
  }, 60000);
  if (!data || data.status !== 'ok') {
    return showBoxMsg('external-import-msg', esc((data && data.message) || '預覽失敗'), 'err');
  }

  externalImportState.eventCode = eventCode;
  externalImportState.preview = data;
  clearBoxMsg('external-import-msg');
  updateExternalImportSteps(4);
  renderExternalImportPreview(data);
}

function parseExternalExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('讀取檔案失敗'));
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const grid = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
        const headerIndex = findExternalHeaderRow(grid);
        const columns = getDefaultExternalImportColumns(grid, headerIndex);
        resolve({
          rows: extractExternalImportRows(grid, columns),
          meta: extractExternalImportMeta(grid, columns),
          grid,
          columns
        });
      } catch (err) {
        reject(err);
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function getDefaultExternalImportColumns(grid, headerIndex) {
  headerIndex = Number.isFinite(headerIndex) ? headerIndex : findExternalHeaderRow(grid);
  const headers = grid[headerIndex] || [];
  return {
    headerIndex,
    name: findImportColumn(headers, ['姓名','學員姓名','報名者','會員姓名'], 1),
    leader: findImportColumn(headers, ['上手','上手白金','推薦人','雁群組長'], 7),
    packageName: findImportColumn(headers, ['套組','所屬活動','活動名稱','課程','課程類別'], 9),
    memberType: -1,
    registeredAt: -1,
    sourceChannel: -1,
    remark: -1
  };
}

function extractExternalImportRows(grid, columns) {
  const col = columns || getDefaultExternalImportColumns(grid);
  const headerIndex = Number(col.headerIndex) || 0;

  return grid.slice(headerIndex + 1).map((row, i) => {
    const item = {
      rowNumber: headerIndex + i + 2,
      name: cellText(row[col.name]),
      leader: cellText(row[col.leader]),
      packageName: cellText(row[col.packageName]),
      memberType: cellText(row[col.memberType]),
      registeredAt: cellText(row[col.registeredAt]),
      sourceChannel: cellText(row[col.sourceChannel]),
      remark: cellText(row[col.remark])
    };
    return item;
  }).filter(item => item.name || item.leader || item.packageName);
}

function extractExternalImportMeta(grid, columns) {
  const col = columns || getDefaultExternalImportColumns(grid);
  const headerIndex = Number(col.headerIndex) || 0;
  const title = (grid[0] || []).map(cellText).filter(Boolean).join(' ');
  const packageCol = Number(col.packageName);
  const packageCounts = {};

  grid.slice(headerIndex + 1).forEach(row => {
    const name = cellText(row[packageCol]);
    if (!name) return;
    packageCounts[name] = (packageCounts[name] || 0) + 1;
  });

  const packages = Object.keys(packageCounts).sort((a, b) => packageCounts[b] - packageCounts[a]);
  return {
    headerRow: headerIndex + 1,
    title,
    packages,
    suggestedEventName: packages[0] || guessEventNameFromTitle(title)

function guessEventNameFromTitle(title) {
  const text = cellText(title);
  if (!text) return '';
  const m = text.match(/[<＜]([^>＞]+)[>＞]([^_]+)_報名資訊/);
  if (m) return (m[1] + m[2]).trim();
  const parts = text.split('_').map(x => x.trim()).filter(Boolean);
  for (let i = parts.length - 1; i >= 0; i--) {
    if (parts[i] && !parts[i].includes('報名資訊') && !/^\d{4}[-/]/.test(parts[i])) return parts[i].replace(/[<＞>＜]/g, '');
  }
  return text;
}

function buildExternalColumnOptions(grid, maxCols) {
  return function(selectedIndex, allowBlank) {
    let html = allowBlank ? '<option value="-1">不匯入</option>' : '';
    for (let i = 0; i < maxCols; i++) {
      const selected = Number(selectedIndex) === i ? 'selected' : '';
      html += `<option value="${i}" ${selected}>${excelColumnName(i)} 欄</option>`;
    }
    return html;
  };
}

function renderExternalFirstRows(grid, maxCols) {
  const rows = grid.slice(0, Math.min(grid.length, 10));
  const head = `<tr><th>列</th>${Array.from({length:maxCols}, (_, i) => `<th>${excelColumnName(i)}</th>`).join('')}</tr>`;
  const body = rows.map((row, idx) => {
    return `<tr><td>${idx + 1}</td>${Array.from({length:maxCols}, (_, i) => `<td>${esc(cellText((row || [])[i]))}</td>`).join('')}</tr>`;
  }).join('');
  return head + body;
}

function getExternalGridMaxCols(rows) {
  return Math.max(1, Math.min(26, rows.reduce((max, row) => Math.max(max, (row || []).length), 0)));
}

function excelColumnName(index) {
  let n = Number(index) + 1;
  let s = '';
  while (n > 0) {
    const r = (n - 1) % 26;
    s = String.fromCharCode(65 + r) + s;
    n = Math.floor((n - 1) / 26);
  }
  return s;
}

function findExternalHeaderRow(grid) {
  const max = Math.min(grid.length, 20);
  for (let i = 0; i < max; i++) {
    const rowText = (grid[i] || []).map(cellText).join('|');
    if (rowText.includes('姓名') && (rowText.includes('上手') || rowText.includes('推薦人')) && rowText.includes('套組')) {
      return i;
    }
  }
  return grid.length > 1 ? 1 : 0;
}

function findImportColumn(headers, aliases, fallbackIndex) {
  const normalizedAliases = aliases.map(normalizeHeader);
  for (let i = 0; i < headers.length; i++) {
    const h = normalizeHeader(headers[i]);
    if (normalizedAliases.includes(h)) return i;
  }
  for (let i = 0; i < headers.length; i++) {
    const h = normalizeHeader(headers[i]);
    if (!h) continue;
    if (normalizedAliases.some(a => h.includes(a) || a.includes(h))) return i;
  }
  return fallbackIndex;
}

function normalizeHeader(text) {
  return cellText(text).replace(/\s+/g, '').replace(/[()（）_]/g, '').toLowerCase();
}

function cellText(value) {
  return value === undefined || value === null ? '' : String(value).trim();
}

async function commitExternalImport() {
  const state = externalImportState || {};
  if (!state.rows || !state.rows.length || !state.preview) {
    return showBoxMsg('external-import-msg', '請先上傳 Excel 並完成預覽。', 'err');
  }

  const okCount = Number((state.preview.summary && state.preview.summary.ok) || 0);
  if (!okCount) return showBoxMsg('external-import-msg', '目前沒有可匯入資料。', 'err');
  if (!confirm('確認匯入 ' + okCount + ' 筆可匯入資料到報名總表？')) return;

  try {
    showBoxMsg('external-import-msg', '匯入中，請不要關閉頁面...', 'info');
    const data = await post('commitExternalImport', {
      userId,
      eventCode: state.eventCode,
      fileName: state.fileName,
      rows: state.rows
    }, 90000);

    if (!data || data.status !== 'ok') {
      return showBoxMsg('external-import-msg', esc((data && data.message) || '匯入失敗'), 'err');

    externalImportState.preview = data;
    updateExternalImportSteps(5);
    showBoxMsg('external-import-msg', esc(data.message || '匯入完成'), 'ok');
    renderExternalImportPreview(data);
  } catch (err) {
    showBoxMsg('external-import-msg', esc(err.message || err), 'err');
  }
}

function buildActivityDateTime() {
  const date = val('c-date');
  const start = val('start-time') || to24Hour(val('start-hour'), val('start-minute'), val('start-ampm'));
  const end = val('end-time') || to24Hour(val('end-hour'), val('end-minute'), val('end-ampm'));
  if (!date || !start || !end) return '';
  return date.replace(/-/g, '/') + ' ' + start + '-' + end;
}

function to24Hour(hour, minute, ampm) {
  if (!hour || !minute || !ampm) return '';
  let h = parseInt(hour, 10);
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return String(h).padStart(2, '0') + ':' + minute;
}

function from24Hour(timeText) {
  const m = String(timeText || '').match(/^(\d{1,2}):(\d{2})/);
  if (!m) return { time: '', hour: '', minute: '00', ampm: 'PM' };
  let h24 = parseInt(m[1], 10);
  const minute = m[2];
  const time = String(h24).padStart(2, '0') + ':' + minute;
  const ampm = h24 >= 12 ? 'PM' : 'AM';
  let h = h24;
  if (h === 0) h = 12;
  if (h > 12) h -= 12;
  return { time, hour: String(h).padStart(2, '0'), minute, ampm };
}

function parseCourseDateTime(text) {
  const out = { date: '', start: {}, end: {} };
  let raw = String(text || '').trim();
  if (!raw) return out;

  raw = raw
    .replace(/上午/g, ' AM ')
    .replace(/下午/g, ' PM ')
    .replace(/中午/g, ' PM ')
    .replace(/晚上/g, ' PM ')
    .replace(/早上/g, ' AM ')
    .replace(/[～~–—]/g, '-');

  const dateMatch = raw.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (dateMatch) {
    out.date = `${dateMatch[1]}-${String(dateMatch[2]).padStart(2,'0')}-${String(dateMatch[3]).padStart(2,'0')}`;
  }

  const timeMatches = [...raw.matchAll(/(?:(AM|PM)\s*)?(\d{1,2}):(\d{2})\s*(AM|PM)?/gi)];
  if (timeMatches.length >= 1) {
    out.start = normalizeParsedTime_(timeMatches[0]);
  }
  if (timeMatches.length >= 2) {
    out.end = normalizeParsedTime_(timeMatches[1]);
  }

  return out;
}

function normalizeParsedTime_(match) {
  let before = (match[1] || '').toUpperCase();
  let after = (match[4] || '').toUpperCase();
  let h = parseInt(match[2], 10);
  const minute = match[3];
  let ampm = after || before || (h >= 12 ? 'PM' : 'AM');

  if (h === 0) {
    h = 12;
    ampm = 'AM';
  } else if (h > 12) {
    h -= 12;
    ampm = 'PM';
  }

  return { hour: String(h).padStart(2, '0'), minute, ampm };
}

function toDatetimeLocalValue(text) {
  if (!text) return '';
  let m = String(text).match(/^(\d{4})-(\d{1,2})-(\d{1,2})T(\d{1,2}):(\d{2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}T${String(m[4]).padStart(2,'0')}:${m[5]}`;
  m = String(text).match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}T${String(m[4]).padStart(2,'0')}:${m[5]}`;
  return '';
}

function csvSplit(text) {
  return String(text || '')
    .replace(/[，、｜|\n\r]/g, ',')
    .split(',')
    .map(x => x.trim())
    .filter(Boolean);
}

      try {
        const fresh = await post(isExternalCourse ? 'getExternalImportInit' : 'getCourseAdminInit', { userId });

        adminCourseData = fresh.courses || [];
        renderCourseForm(null);

        if (list) renderAdminCourseList(adminCourseData);
      } catch(e) {}
    } else {
      showFormMsg('⚠️ ' + esc(res.message || '儲存失敗'), 'err');
    }
  } catch (err) {
    showFormMsg('⚠️ ' + esc(err.message || err), 'err');
  }
}
