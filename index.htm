// V5.5 票券產生：報名總表 → QR管理 → PNG ZIP
// ─────────────────────────────────────────────
function loadScriptOnce(url, id) {
  if (window[id]) return Promise.resolve();
  const existing = document.querySelector('script[data-lib="' + id + '"]');
  if (existing) {
    return new Promise((resolve, reject) => {
      existing.addEventListener('load', resolve);
      existing.addEventListener('error', reject);
    });
  }
  return new Promise((resolve, reject) => {
    const sc = document.createElement('script');
    sc.src = url;
    sc.async = true;
    sc.dataset.lib = id;
    sc.onload = resolve;
    sc.onerror = () => reject(new Error('載入工具失敗：' + id));
    document.head.appendChild(sc);
  });
}

function ensureTicketScripts() {
  if (!ticketScriptsLoading) {
    ticketScriptsLoading = Promise.all([
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js', 'JSZip'),
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js', 'QRCode')
    ]);
  }
  return ticketScriptsLoading;
}

async function renderTicketGeneratorPage() {
  const token = beginPage('ticket', '票券產生', false);
  const app = document.getElementById('app');

  showLoading('載入票券產生工具中');
  const allowed = await ensureAdminAccess(token, 'ticket');
  if (!isPageActive(token, 'ticket')) return;
  stopLoading();
  if (!allowed) return;

  try { await ensurePublicData(false); } catch(e) {}
  if (!isPageActive(token, 'ticket')) return;

  const courses = (appState.courses || []).filter(c => c && c.eventName);
  const options = courses.map(c => `<option value="${esc(normalizeCode(c.eventCode))}">${esc(c.eventName)}${c.dateTime ? '｜' + esc(c.dateTime) : ''}</option>`).join('');

  app.innerHTML = `
    <div class="top-actions">
      <button class="btn btn-sub" onclick="renderHomePage({skipRefresh:true})">報名課程</button>
      <button class="btn btn-main" onclick="renderTicketGeneratorPage()">票券產生</button>
    </div>

    <div class="card">
      <h2>票券產生</h2>
      <div id="ticket-msg" class="msg"></div>
      <div class="field">
        <label>選擇活動</label>
        <select id="ticket-course-select">
          <option value="">請選擇活動</option>
          ${options}
        </select>
      </div>
      <div class="form-grid">
        <div class="field full">
          <label>票券底圖，上半部圖片，可選</label>
          <input type="file" id="ticket-bg-file" accept="image/*" onchange="handleTicketBgUpload(this)">
        </div>
      </div>
      <div class="ticket-toolbar">
        <button class="btn btn-main" onclick="syncTicketMembers()">同步報名名單 / 補 CODE</button>
        <button class="btn btn-sub" onclick="renderTicketPreview()">預覽前兩張</button>
      </div>
      <button class="btn btn-main" style="width:100%" onclick="downloadTicketZip()">下載全部票券 ZIP</button>
      <div class="ticket-progress" id="ticket-progress"><div id="ticket-progress-fill"></div></div>
      <div class="ticket-member-note" id="ticket-summary">尚未同步名單。</div>
    </div>

    <div class="card" id="ticket-preview-card" style="display:none">
      <h2>票券預覽</h2>
      <div class="ticket-preview-wrap" id="ticket-preview-list"></div>
    </div>
  `;
}

function handleTicketBgUpload(input) {
  const file = input && input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      ticketState.bgImage = img;
      ticketState.bgName = file.name;
      const el = document.getElementById('ticket-summary');
      if (el) el.innerHTML = `已選票券底圖：${esc(file.name)}<br>` + (ticketState.stats ? buildTicketSummaryHtml(ticketState.stats) : '尚未同步名單。');
      if (ticketState.members.length) renderTicketPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function buildTicketSummaryHtml(stats) {
  stats = stats || {};
  return `
    <div class="ticket-stat-grid">
      <div class="ticket-stat"><strong>${Number(stats.total || 0)}</strong><span>可產生</span></div>
      <div class="ticket-stat"><strong>${Number(stats.existingCode || 0)}</strong><span>保留 CODE</span></div>
      <div class="ticket-stat"><strong>${Number(stats.newCode || 0)}</strong><span>新產生</span></div>
    </div>
    排除取消：${Number(stats.cancelled || 0)} 人<br>
    CODE 規則：不同活動不同 CODE；同活動已存在者保留舊 CODE，新人才補新 CODE。
  `;
}

async function syncTicketMembers() {
  const code = normalizeCode(val('ticket-course-select'));
  if (!code) return showBoxMsg('ticket-msg', '請先選擇活動。', 'err');
  clearBoxMsg('ticket-msg');
  showBoxMsg('ticket-msg', '同步中，請稍候...', 'info');
  try {
    const data = await post('syncTicketQrFromRegistrations', { userId, eventCode: code }, 30000);
    if (!data || data.status !== 'ok') throw new Error((data && data.message) || '同步失敗');
    ticketState.course = data.course || null;
    ticketState.members = data.members || [];
    ticketState.stats = data.stats || {};
    mergeCourseToState(data.course);
    clearBoxMsg('ticket-msg');
    document.getElementById('ticket-summary').innerHTML = buildTicketSummaryHtml(ticketState.stats);
    await renderTicketPreview();
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '同步失敗', 'err');
  }
}

function ticketSafeName(text) {
  return String(text || '')
    .replace(/[\\/:*?"<>|]/g, '')
    .replace(/\s+/g, '')
    .trim() || '未命名';
}

function ticketInfo() {
  const c = ticketState.course || {};
  return {
    eventName: c.eventName || '活動名稱',
    session: c.session || '',
    ticketType: c.ticketType || '',
    displayDate: c.dateTime || c.displayDate || ''
  };
}

function drawTicketBuiltinBg(ctx, W, topH) {
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(0, 0, W, topH);
  ctx.save();
  ctx.globalAlpha = .07;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(W*.1, topH*.35, 160, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W*.75, topH*1.15, 210, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = .04;
  for (let i=0; i<14; i++) ctx.fillRect(W*.28+i*28, -20, 14, topH+40);
  ctx.restore();
}

function ticketRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function ticketWrapText(ctx, text, x, y, maxW, lh, maxLines) {
  const chars = String(text || '').split('');
  let line = '', lines = [];
  chars.forEach(c => {
    const t = line + c;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = c; }
    else line = t;
  });
  if (line) lines.push(line);
  lines.slice(0, maxLines || 2).forEach((l,i) => ctx.fillText(l, x, y+i*lh));
}

function ticketQrImage(code) {
  return new Promise(resolve => {
    const container = document.createElement('div');
    container.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(container);
    try {
      new QRCode(container, { text: String(code || ''), width: 260, height: 260, colorDark:'#000000', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.M });
      const el = container.querySelector('canvas') || container.querySelector('img');
      if (!el) { document.body.removeChild(container); resolve(null); return; }
      if (el.tagName === 'CANVAS') {
        const img = new Image();
        img.onload = () => { document.body.removeChild(container); resolve(img); };
        img.src = el.toDataURL();
      } else {
        if (el.complete) { document.body.removeChild(container); resolve(el); }
        else { el.onload = () => { document.body.removeChild(container); resolve(el); }; el.onerror = () => { document.body.removeChild(container); resolve(null); }; }
      }
    } catch(e) { document.body.removeChild(container); resolve(null); }
  });
}

async function drawTicketCanvas(canvas, person, info) {
  await ensureTicketScripts();
  const W = 560, H = 1240, topH = 420, px = 40;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0d1f33';
  ctx.fillRect(0, 0, W, topH);
  if (ticketState.bgImage) {
    const img = ticketState.bgImage;
    const scale = Math.min(W / img.width, topH / img.height);
    const dw = img.width * scale, dh = img.height * scale;
    ctx.drawImage(img, 0, 0, img.width, img.height, (W-dw)/2, (topH-dh)/2, dw, dh);
  } else {
    drawTicketBuiltinBg(ctx, W, topH);
  }

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, topH, W, H-topH);
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(px, topH + 24, W - px*2, 3);

  ctx.textAlign = 'center';
  ctx.font = '900 34px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ticketWrapText(ctx, info.eventName, px, topH + 72, W - px*2, 42, 2);

  const sub = [info.displayDate, info.session, info.ticketType].filter(Boolean).join('  ·  ');
  if (sub) {
    ctx.font = '600 18px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#4f5964';
    ctx.fillText(sub, W/2, topH + 140);
  }

  const qrSize = Math.round(W * 0.70);
  const qrX = Math.round((W - qrSize) / 2);
  const qrY = topH + 168;
  ctx.fillStyle = '#f7f7f7';
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.fill();
  ctx.strokeStyle = '#ebebeb'; ctx.lineWidth = 1;
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.stroke();
  const qrImg = await ticketQrImage(person.code);
  if (qrImg) ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

  const codeBaseY = qrY + qrSize + 28;
  ctx.font = '700 36px "Courier New", monospace';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.fillText(String(person.code || '').toUpperCase(), W/2, codeBaseY + 32);

  ctx.strokeStyle = '#eeeeee'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px*2, codeBaseY + 50); ctx.lineTo(W - px*2, codeBaseY + 50); ctx.stroke();

  const nameY = codeBaseY + 100;
  ctx.font = '900 46px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText(person.name || '', W/2, nameY);

  const flockLabel = '小組：' + (person.flock || '—');
  ctx.font = '700 20px "Noto Sans TC", sans-serif';
  const fpw = ctx.measureText(flockLabel).width + 48, fph = 42, fpx = (W - fpw) / 2, fpy = nameY + 20;
  ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)'; ctx.lineWidth = 1.5;
  ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.fill(); ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.stroke();
  ctx.fillStyle = '#1a3a5c';
  ctx.fillText(flockLabel, W/2, fpy + 28);

  if (person.group) {
    const groupLabel = String(person.group || '').trim();
    ctx.font = '700 20px "Noto Sans TC", sans-serif';
    const gpw = ctx.measureText(groupLabel).width + 48, gph = 42, gpx = (W - gpw) / 2, gpy = fpy + fph + 16;
    ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)';
    ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.fill(); ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.stroke();
    ctx.fillStyle = '#1a3a5c';
    ctx.fillText(groupLabel, W/2, gpy + 28);
  }
}

async function renderTicketPreview() {
  if (!ticketState.members.length) {
    return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  }
  await ensureTicketScripts();
  const holder = document.getElementById('ticket-preview-list');
  const card = document.getElementById('ticket-preview-card');
  if (!holder || !card) return;
  holder.innerHTML = '';
  card.style.display = 'block';
  const info = ticketInfo();
  const sample = ticketState.members.slice(0,2);
  for (const m of sample) {
    const wrap = document.createElement('div');
    wrap.className = 'ticket-preview-card';
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    holder.appendChild(wrap);
    await drawTicketCanvas(canvas, m, info);
  }
}

async function downloadTicketZip() {
  if (!ticketState.members.length) return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  await ensureTicketScripts();
  const progress = document.getElementById('ticket-progress');
  const fill = document.getElementById('ticket-progress-fill');
  progress.classList.add('on'); fill.style.width = '0%';
  clearBoxMsg('ticket-msg');
  showBoxMsg('ticket-msg', '正在產生票券...', 'info');

  try {
    const zip = new JSZip();
    const canvas = document.createElement('canvas');
    const info = ticketInfo();
    const used = {};

    for (let i = 0; i < ticketState.members.length; i++) {
      const m = ticketState.members[i];
      await drawTicketCanvas(canvas, m, info);
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      let base = ticketSafeName(m.flock || '雁群') + '_' + ticketSafeName(m.name || '姓名');
      let fname = base + '.png';
      if (used[fname]) {
        used[fname]++;
        fname = base + '_' + used[fname] + '.png';
      } else {
        used[fname] = 1;
      }
      zip.file(fname, blob);
      fill.style.width = Math.round((i+1)/ticketState.members.length*100) + '%';
      await new Promise(r => setTimeout(r, 8));
    }

    const content = await zip.generateAsync({ type: 'blob' });
    const zipName = '雁群票券_' + ticketSafeName(info.eventName) + (info.session ? '_' + ticketSafeName(info.session) : '') + '.zip';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = zipName;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    showBoxMsg('ticket-msg', '票券 ZIP 已產生。', 'ok');
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '產生失敗', 'err');
  } finally {
    progress.classList.remove('on');
    fill.style.width = '0%';
  }
}

    <small>CYP135 課程系統 V6.38</small>
    <h1 id="page-title">課程報名</h1>
  </div>
  <button class="menu-btn" onclick="toggleMenu(true)" aria-label="開啟選單">☰</button>
</div>
<div id="menu-backdrop" class="menu-backdrop" onclick="toggleMenu(false)"></div>

</div>

<div class="wrap">
  <div id="msg" class="msg"></div>
  <div id="app" class="loading">載入中...</div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzlEBM9PCjfGW-QC3w0ILIaQ9-yjvPPLnLxzT_5QD-zjsjSbnpEQcgDg6uyNvjd1vIt/exec';
const LIFF_ID = '2010580892-WjWtHyOn';

let userId = '';
let displayName = '';
let initData = null;
let currentCourse = null;
let selectedLeader = '';
let memberIndex = {};
let registrationIndex = {};
let isCurrentNameDuplicate = false;
let isSubmittingRegistration = false;
let editingCourseCode = '';
let currentCourseData = null;
let lookupTimer = null;
let publicData = null;
let adminCourseData = [];
let isAdminUser = false;
let canViewRoster = false;
let selectedClassType = '';
let lockedClassType = '';
let lookupCache = {};
let lastLookupSeq = 0;
let activeClockTarget = '';
let activeClockHour = 9;
let activeClockMinute = 0;
let pageSeq = 0;
let loadingSeq = 0;
let loadingTimer = null;
let selectedEdmFile = null;
let uploadedEdmUrl = '';
let uploadedEdmFileName = '';
let externalImportState = { step: 1, rows: [], preview: null, fileName: '', eventCode: '', meta: null, grid: null, columns: null };
let excelParserLoading = null;
let coursePrefillFromImport = null;
let rosterState = { course: null, rows: [], groups: [], stats: null, view: 'grouped', query: '', classDetails: [], leaders: [], canManage: false, scopeText: '', scopeFlocks: [], add: null, loading: false, openAdd: false };
let isSharedEntry = false;
let sharedCourseToken = '';

let ticketState = { course: null, members: [], stats: null, bgImage: null, bgName: '' };
let ticketScriptsLoading = null;

const PUBLIC_CACHE_KEY = 'cyp135_public_courses_v93';
const ADMIN_CACHE_KEY = 'cyp135_admin_init_v64';
const ROSTER_CACHE_PREFIX = 'cyp135_course_roster_v93_';
let currentView = '';
let appState = {
  courses: [],
  courseMap: {},
  publicLoaded: false,
  publicLoading: null,
  registrationInitByCode: {},
  lastPublicRefresh: 0
};

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.className = 'msg on ' + (type || 'info');
  el.innerHTML = text;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
  el.innerHTML = '';
}

function showBoxMsg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return showMsg(text, type);
  el.className = 'msg on ' + (type || 'info');
  el.innerHTML = text;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function clearBoxMsg(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'msg';
  el.innerHTML = '';
}

function showFormMsg(text, type) {
  showBoxMsg('course-form-msg', text, type);
}

function clearFormMsg() {
  clearBoxMsg('course-form-msg');
}

function showRegisterMsg(text, type) {
  showBoxMsg('registration-result', text, type);
}

function clearRegisterMsg() {
  clearBoxMsg('registration-result');
}

function userCanManageRoster() {
  if (isSharedEntry) return false;
  const audit = (publicData && publicData.permissionAudit) || {};
  if (typeof audit.canManageRoster !== 'undefined') return !!audit.canManageRoster;
  return !!(publicData && publicData.canManageRoster);
}

function val(id) {
  return (document.getElementById(id) || {value:''}).value.trim();
}

function esc(input) {
  return (input === undefined || input === null ? '' : String(input))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function post(action, payload, timeoutMs) {
  payload = payload || {};
  payload.action = action;
  timeoutMs = timeoutMs || 18000;

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);

  return fetch(GAS, {
    method: 'post',
    body: JSON.stringify(payload),
    signal: controller.signal
  }).then(async r => {
    clearTimeout(timer);
    const text = await r.text();
    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error('後端回傳非 JSON，前 200 字：' + text.slice(0, 200));
    }
  }).catch(err => {
    clearTimeout(timer);
    if (err && err.name === 'AbortError') {
      throw new Error('讀取時間過久，請重新開啟頁面或稍後再試。');
    }
    throw err;
  });
}



function normalizeCode(code) {
  return String(code || '').trim().toUpperCase();
}

function rebuildCourseMap() {
  appState.courseMap = {};
  (appState.courses || []).forEach(c => {
    const code = normalizeCode(c.eventCode);
    if (code) appState.courseMap[code] = c;
  });
}

function setPublicData(data, fromCache) {
  if (!data || data.status !== 'ok') return;
  publicData = data;
  appState.courses = data.courses || [];
  appState.publicLoaded = true;
  appState.lastPublicRefresh = Date.now();
  rebuildCourseMap();
  const audit = data.permissionAudit || {};
  if (typeof audit.canManageCourses !== 'undefined') isAdminUser = !!audit.canManageCourses;
  else if (typeof data.isAdmin !== 'undefined') isAdminUser = !!data.isAdmin;
  if (typeof audit.canViewRoster !== 'undefined') canViewRoster = !!audit.canViewRoster;
  else canViewRoster = !!(isAdminUser || data.rosterAllowed);
  renderMenu();

  if (!fromCache) {
    try {
      localStorage.setItem(PUBLIC_CACHE_KEY, JSON.stringify({
        savedAt: Date.now(),
        isAdmin: !!data.isAdmin,
        rosterAllowed: !!data.rosterAllowed,
        canManageRoster: !!data.canManageRoster,
        rosterScopeFlocks: data.rosterScopeFlocks || [],
        permissionAudit: data.permissionAudit || null,
        role: data.role || '',
        courses: data.courses || []
      }));
    } catch (e) {}
  }
}

function loadPublicCache() {
  try {
    const text = localStorage.getItem(PUBLIC_CACHE_KEY);
    if (!text) return false;
    const cached = JSON.parse(text);
    if (!cached || !Array.isArray(cached.courses) || !cached.courses.length) return false;
    setPublicData({
      status: 'ok',
      cached: true,
      isAdmin: !!cached.isAdmin,
      rosterAllowed: !!cached.rosterAllowed,
      canManageRoster: !!cached.canManageRoster,
      rosterScopeFlocks: cached.rosterScopeFlocks || [],
      permissionAudit: cached.permissionAudit || null,
      role: cached.role || '',
      courses: cached.courses || []
    }, true);
    return true;
  } catch (e) {
    return false;
  }
}

function beginPage(view, title, wide) {
  const token = ++pageSeq;
  currentView = view;
  setWideLayout(!!wide);
  clearMsg();
  setTitle(title);
  return token;
}

function setSharedEntryMode(on, token) {
  isSharedEntry = !!on;
  sharedCourseToken = on ? String(token || sharedCourseToken || '') : '';
  document.body.classList.toggle('share-mode', isSharedEntry);
  if (isSharedEntry) canViewRoster = false;
}

function isPageActive(token, view) {
  return token === pageSeq && (!view || currentView === view);
}

function loadingHtml(text) {
  return `
    <div class="loading">
      <div class="loading-card">
        <div class="loading-ring"></div>
        <div class="loading-title">${esc(text || '載入中')}</div>
        <div class="loading-bar"><i id="loading-fill"></i></div>
        <div id="loading-percent" class="loading-percent">8%</div>
      </div>
    </div>
  `;
}

function showLoading(text) {
  const app = document.getElementById('app');
  if (!app) return;
  app.innerHTML = loadingHtml(text);
  const seq = ++loadingSeq;
  let pct = 8;
  if (loadingTimer) clearInterval(loadingTimer);
  loadingTimer = setInterval(() => {
    if (seq !== loadingSeq) return clearInterval(loadingTimer);
    const fill = document.getElementById('loading-fill');
    const label = document.getElementById('loading-percent');
    if (!fill || !label) return clearInterval(loadingTimer);
    pct = Math.min(92, pct + Math.max(1, Math.round((92 - pct) * 0.18)));
    fill.style.width = pct + '%';
    label.textContent = pct + '%';
  }, 260);
}

function stopLoading() {
  loadingSeq++;
  if (loadingTimer) clearInterval(loadingTimer);
  loadingTimer = null;
}

function inlineLoadingHtml() {
  return '<div class="inline-loading" aria-label="載入中"></div>';
}

function showBoxLoading(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'msg on';
  el.innerHTML = inlineLoadingHtml();
}

function setAdminData(data, fromCache) {
  if (!data || data.status !== 'ok') return data;
  initData = data || {};
  isAdminUser = !!data.allowed;
  canViewRoster = !!(canViewRoster || isAdminUser || data.rosterAllowed);
  adminCourseData = (data && data.courses) || [];
  if (adminCourseData.length) adminCourseData.forEach(mergeCourseToState);
  renderMenu();

  if (!fromCache && data.allowed) {
    try {
      localStorage.setItem(ADMIN_CACHE_KEY, JSON.stringify({
        savedAt: Date.now(),
        status: 'ok',
        allowed: !!data.allowed,
        role: data.role || '',
        courses: data.courses || [],
        options: data.options || {},
        flocks: data.flocks || [],
        platinumNames: data.platinumNames || [],
        leaders: data.leaders || []
      }));
    } catch (e) {}
  }
  return initData;
}

function loadAdminCache() {
  try {
    const text = localStorage.getItem(ADMIN_CACHE_KEY);
    if (!text) return null;
    const cached = JSON.parse(text);
    if (!cached || cached.status !== 'ok' || !cached.allowed || !Array.isArray(cached.courses)) return null;
    return setAdminData(cached, true);
  } catch (e) {
    return null;
  }
}

function getRosterCacheKey(courseCode) {
  return ROSTER_CACHE_PREFIX + normalizeCode(courseCode);
}

function saveRosterCache(courseCode, data) {
  if (!courseCode || !data || data.status !== 'ok') return;
  try {
    localStorage.setItem(getRosterCacheKey(courseCode), JSON.stringify({
      savedAt: Date.now(),
      status: 'ok',
      allowed: !!data.allowed,
      canManage: !!data.canManage,
      course: data.course || null,
      rows: data.rows || [],
      groups: data.groups || [],
      stats: data.stats || {},
      classDetails: data.classDetails || [],
      leaders: data.leaders || [],
      rosterScopeText: data.rosterScopeText || '',
      rosterScopeFlocks: data.rosterScopeFlocks || []
    }));
  } catch (e) {}
}

function loadRosterCache(courseCode) {
  try {
    const text = localStorage.getItem(getRosterCacheKey(courseCode));
    if (!text) return null;
    const cached = JSON.parse(text);
    if (!cached || cached.status !== 'ok' || !cached.course) return null;
    return cached;
  } catch (e) {
    return null;
  }
}

function saveCurrentRosterCache() {
  if (!rosterState.course) return;
  saveRosterCache(rosterState.course.eventCode, {
    status: 'ok',
    allowed: true,
    canManage: rosterState.canManage,
    course: rosterState.course,
    rows: rosterState.rows || [],
    groups: rosterState.groups || [],
    stats: rosterState.stats || {},
    classDetails: rosterState.classDetails || [],
    leaders: rosterState.leaders || [],
    rosterScopeText: rosterState.scopeText || '',
    rosterScopeFlocks: rosterState.scopeFlocks || []
  });
}

function getCourseFromState(courseCode) {
  return appState.courseMap[normalizeCode(courseCode)] || null;
}

function mergeCourseToState(course) {
  if (!course || !course.eventCode) return;
  const code = normalizeCode(course.eventCode);
  const existsIndex = (appState.courses || []).findIndex(c => normalizeCode(c.eventCode) === code);
  if (existsIndex >= 0) appState.courses[existsIndex] = Object.assign({}, appState.courses[existsIndex], course);
  else appState.courses.unshift(course);
  rebuildCourseMap();
}

function clearCourseClientCache(courseCode) {
  try { localStorage.removeItem(PUBLIC_CACHE_KEY); } catch (e) {}
  const code = normalizeCode(courseCode);
  if (code) delete appState.registrationInitByCode[code];
  appState.publicLoaded = false;
  appState.lastPublicRefresh = 0;
}

function ensurePublicData(force) {
  if (!force && appState.courses.length) return Promise.resolve(publicData || { status:'ok', courses: appState.courses, isAdmin: isAdminUser });
  if (appState.publicLoading) return appState.publicLoading;

  appState.publicLoading = post('getPublicInitFast', { userId }, 9000)
    .then(data => {
      appState.publicLoading = null;
      if (data && data.status === 'ok') setPublicData(data, false);
      return data;
    })
    .catch(err => {
      appState.publicLoading = null;
      throw err;
    });

  return appState.publicLoading;
}

function refreshPublicInBackground() {
  // 避免短時間內切來切去一直打 GAS。
  if (Date.now() - (appState.lastPublicRefresh || 0) < 30000 && appState.courses.length) return;
  ensurePublicData(true).then(() => {
    if (currentView === 'home') renderHomePage({ skipRefresh: true, keepScroll: true });
  }).catch(() => {});
}

function ensureRegistrationData(courseCode, force) {
  const code = normalizeCode(courseCode);
  if (!force && appState.registrationInitByCode[code]) {
    initData = appState.registrationInitByCode[code];
    currentCourse = initData.course;
    return Promise.resolve(initData);
  }

  return post('getRegistrationInit', { eventCode: code, userId }, 12000).then(data => {
    if (data && data.status === 'ok') {
      appState.registrationInitByCode[code] = data;
      initData = data;
      currentCourse = data.course;
      mergeCourseToState(data.course);
      if (typeof data.isAdmin !== 'undefined') isAdminUser = !!data.isAdmin;
      canViewRoster = !!(canViewRoster || isAdminUser || data.rosterAllowed);
      renderMenu();
    }
    return data;
  });
}

function getParam(name) {
  const qs = new URLSearchParams(location.search);
  if (qs.get(name)) return qs.get(name);

  const state = qs.get('liff.state');
  if (state) {
    const decoded = decodeURIComponent(state);
    const q = decoded.indexOf('?') >= 0 ? decoded.split('?')[1] : decoded;
    const sp = new URLSearchParams(q);
    if (sp.get(name)) return sp.get(name);
  }

  return '';
}

function setTitle(text) {
  document.getElementById('page-title').textContent = text;
}

function goHomeFromHeader() {
  toggleMenu(false);
  const clock = document.getElementById('clock-backdrop');
  if (clock) clock.classList.remove('on');
  if (isSharedEntry) {
    if (currentCourse) {
      renderCourseDetailContent(currentCourse);
    } else if (sharedCourseToken) {
      renderSharedCourseDetail(sharedCourseToken);
    }
    return;
  }
  renderHomePage({ skipRefresh: true });
}

function handleHeaderHomeKey(event) {
  if (!event || (event.key !== 'Enter' && event.key !== ' ')) return;
  event.preventDefault();
  goHomeFromHeader();
}

function setWideLayout(wide) {
  const wrap = document.querySelector('.wrap');
  if (wrap) wrap.classList.toggle('wide', !!wide);
}

function renderMenu() {
  const menu = document.getElementById('side-menu');
  if (!menu) return;

  if (isSharedEntry) {
    const registerItem = currentCourse && canCourseRegister(currentCourse)
      ? '<button class="menu-item" onclick="toggleMenu(false);renderRegisterForm()">我要報名</button>'
      : '';
    menu.innerHTML = `
      <div class="menu-head">CYP135 課程系統</div>
      <div class="menu-list">
        <button class="menu-item" onclick="toggleMenu(false);goHomeFromHeader()">活動詳情</button>
        ${registerItem}
        <button class="menu-item" onclick="toggleMenu(false)">關閉選單</button>
      </div>
    `;
    return;
  }

  const adminBtns = isAdminUser
    ? `
      <button class="menu-item" onclick="toggleMenu(false);renderCreateCoursePage()">建立課程</button>
      <button class="menu-item" onclick="toggleMenu(false);renderExternalImportPage()">外部名單匯入</button>
      <button class="menu-item" onclick="toggleMenu(false);renderTicketGeneratorPage()">票券產生</button>
    `
    : '';

  menu.innerHTML = `
    <div class="menu-head">CYP135 課程系統</div>
    <div class="menu-list">
      <button class="menu-item" onclick="toggleMenu(false);renderHomePage({skipRefresh:true})">報名課程</button>
      ${adminBtns}
      <button class="menu-item" onclick="toggleMenu(false)">關閉選單</button>
    </div>
    <div class="menu-note">首頁顯示所有課程；會長可直接從課程卡片編輯。</div>
  `;
}

function toggleMenu(open) {
  renderMenu();
  const backdrop = document.getElementById('menu-backdrop');
  const menu = document.getElementById('side-menu');
  if (!backdrop || !menu) return;
  backdrop.classList.toggle('on', !!open);
  menu.classList.toggle('on', !!open);
}

async function initLiff(options) {
  options = options || {};
  const allowGuest = !!options.allowGuest;
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      if (allowGuest) return 'guest';
      liff.login();
      return 'login';
    }

    const profile = await liff.getProfile();
    userId = profile.userId || '';
    displayName = profile.displayName || '';
    return 'ok';

  } catch(e) {
    console.error('LIFF 初始化失敗：', e);
    if (allowGuest) {
      userId = '';
      displayName = '';
      return 'guest';
    }
    document.getElementById('app').innerHTML =
      '<div class="card"><h2>LIFF 初始化失敗</h2>' +
      '<p class="meta">請確認 LIFF_ID、LINE Developers Endpoint URL，以及是否從 LINE LIFF 連結開啟。<br><br>錯誤訊息：' + esc(e.message || e) + '</p></div>';
    return 'error';
  }
}

window.addEventListener('DOMContentLoaded', async function() {
  const shareToken = getParam('share') || getParam('s');
  setSharedEntryMode(!!shareToken, shareToken);
  const liffStatus = await initLiff({ allowGuest: !!shareToken });
  if (liffStatus === 'login' || liffStatus === 'error') return;

  loadPublicCache();
  loadAdminCache();
  renderMenu();

  const mode = getParam('mode');
  const courseCode = getParam('course');

  if (shareToken) {
    renderSharedCourseDetail(shareToken);
  } else if ((mode === 'detail' || mode === 'register') && courseCode) {
    renderCourseDetailPage(courseCode, mode === 'register');
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'admin' || mode === 'settings' || mode === 'create') {
    renderCreateCoursePage();
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'courses' || mode === 'manage') {
    renderHomePage();
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'import') {
    renderExternalImportPage(courseCode);
    ensurePublicData(true).catch(() => {});
  } else {
    renderHomePage();
  }
});

function renderHomePage(options) {
  options = options || {};
  const token = beginPage('home', '課程報名', true);
  const app = document.getElementById('app');

  const courses = (publicData && publicData.courses) || appState.courses || [];
  if (courses.length) {
    renderHomeShell(courses);
    if (!options.skipRefresh) refreshPublicInBackground();
    return;
  }

  showLoading('載入課程中');
  ensurePublicData(true)
    .then(data => {
      if (!isPageActive(token, 'home')) return;
      stopLoading();
      if (!data || data.status !== 'ok') {
        app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc((data && data.message) || '') + '</p></div>';
        return;
      }
      renderHomeShell(data.courses || []);
    })
    .catch(err => {
      if (!isPageActive(token, 'home')) return;
      stopLoading();
      app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
    });
}

function renderHomeShell(courses) {
  const app = document.getElementById('app');
  const adminTools = isAdminUser
    ? `<div class="top-actions single">
        <button class="btn btn-sub" onclick="renderCreateCoursePage()">建立課程</button>
      </div>`
    : '';

  app.innerHTML = `
    ${adminTools}
    <div class="searchbar">
      <input id="course-search" placeholder="搜尋活動名稱 / 日期 / 場次" oninput="filterPublicCourses()">
    </div>
    <div id="course-list"></div>
  `;

  renderPublicCourseList(courses || []);
}

function filterPublicCourses() {
  const q = val('course-search').toLowerCase();
  const courses = ((publicData && publicData.courses && publicData.courses.length) ? publicData.courses : appState.courses) || [];
  if (!q) return renderPublicCourseList(courses);
  renderPublicCourseList(courses.filter(c => {
    return [c.eventName, c.eventCode, c.dateTime, c.session, c.ticketType, c.statusBadge]
      .join(' ').toLowerCase().includes(q);
  }));
}

function renderPublicCourseList(courses) {
  const el = document.getElementById('course-list');

  if (!courses.length) {
    el.innerHTML = '<div class="card"><h2>目前沒有活動</h2><p class="meta">有新課程開放時會顯示在這裡。</p></div>';
    return;
  }

  el.innerHTML = '<div class="course-grid">' + courses.map(courseCardHtml).join('') + '</div>';
}

function shareIconSvg() {
  return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="5" r="3"></circle><circle cx="18" cy="19" r="3"></circle><path d="M8.7 10.6 15.3 6.4"></path><path d="M8.7 13.4 15.3 17.6"></path></svg>';
}

function courseCardHtml(c) {
  const full = c.statusBadge === '已額滿';
  const closed = c.statusBadge === '尚未開放';
  const canRegister = canCourseRegister(c);
  const canManageAdd = userCanManageRoster() && !canRegister;
  const badgeClass = full ? 'red' : (closed || !canRegister ? 'gray' : '');
  const registerButton = canRegister
    ? `<button class="btn btn-main" onclick="renderCourseDetailPage('${esc(c.eventCode)}', true)">立即報名</button>`
    : '<button class="btn btn-warn" disabled>目前無法報名</button>';
  const addButton = canManageAdd
    ? `<button class="btn btn-main" onclick="openCourseAddRegistration('${esc(c.eventCode)}')">加報</button>`
    : '';
  const rosterButton = (canViewRoster || isAdminUser)
    ? `<button class="btn btn-ghost" onclick="renderCourseRosterPage('${esc(c.eventCode)}')">名單</button>`
    : '';

    ? `<img class="course-img" loading="lazy" src="${esc(c.dmUrl)}" onerror="this.style.display='none'">`
    : `<div class="course-img placeholder"></div>`;

  return `
    <div class="course-card">
      ${img}
      <div class="course-body">

          <div class="course-title">${esc(c.eventName || '未命名活動')}</div>
          <button class="share-btn" onclick="shareCourseLink('${esc(c.eventCode)}', event)" title="分享課程" aria-label="分享課程">${shareIconSvg()}</button>
        </div>
        <div class="badges">
          <span class="badge ${badgeClass}">${esc(c.statusBadge || c.statusText || '活動')}</span>
          <span class="badge">${esc(c.session || '場次未設定')}</span>
        </div>
        <div class="meta">
          日期時間：<b>${esc(c.dateTime || '尚未設定')}</b><br>
          票種：${esc(c.ticketType || '—')}<br>
          金額：${esc(c.priceSummary || '—')}
        </div>
        <div class="course-actions ${isAdminUser ? 'admin' : ''}">
          <button class="btn btn-sub" onclick="renderCourseDetailPage('${esc(c.eventCode)}')">查看詳情</button>
          ${addButton}
          ${registerButton}
          ${rosterButton}
          ${isAdminUser ? `<button class="btn btn-ghost" onclick="renderEditCoursePageByCode('${esc(c.eventCode)}')">編輯</button>` : ''}

function openCourseAddRegistration(courseCode) {
  renderCourseRosterPage(courseCode, { openAdd: true });
}

function getSharePageBaseUrl() {
  const url = new URL(location.href);
  url.search = '';
  url.hash = '';
  return url.toString();
}

function formatShareExpiryText(text) {
  const raw = String(text || '').trim();
  if (!raw) return '約 7 天';
  return raw.replace(/^\d{4}\//, '');
}

function buildCourseShareText(title, url, expiresAtText) {
  return `【${title || '課程'}】快速報名\n期限｜${formatShareExpiryText(expiresAtText)}\n報名連結\n${url}`;
}

function showShareLinkFallback(url, expiresAtText, title) {
  const shareText = buildCourseShareText(title || '課程', url, expiresAtText);
  const encodedText = encodeURIComponent(shareText);
  showMsg(
    '<b>' + esc(title || '課程') + '｜快速報名</b><br>' +
    '分享連結已建立。若沒有自動開啟分享視窗，可以直接複製分享文字。' +
    '<a class="share-link-box" href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(url) + '</a>' +
    '<div class="share-copy-row"><button class="btn btn-sub" onclick="copyShareText(decodeURIComponent(\'' + encodedText + '\'))">複製分享文字</button></div>' +
    '<span class="muted">期限｜' + esc(formatShareExpiryText(expiresAtText)) + '</span>',
    'ok'
  );
}

async function copyShareText(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      showMsg('分享文字已複製，可貼到 LINE 傳給朋友。', 'ok');
      return;
    }
  } catch (e) {}

  prompt('請複製這段分享文字', text);
}

async function shareCourseLink(courseCode, event) {
  if (event) event.stopPropagation();
  const code = normalizeCode(courseCode);
  const course = getCourseFromState(code) || {};
  const btn = event && event.currentTarget;
  if (btn) btn.disabled = true;

  try {
    const data = await post('createCourseShareLink', {
      userId,
      displayName,
      eventCode: code,
      pageUrl: getSharePageBaseUrl()
    }, 12000);

    if (!data || data.status !== 'ok' || !data.url) {
      showMsg(esc((data && data.message) || '分享連結建立失敗'), 'err');
      return;
    }

    const title = course.eventName || data.eventName || '課程報名';
    const text = buildCourseShareText(title, data.url, data.expiresAtText);
    let shared = false;

    try {
      if (window.liff && liff.isInClient && liff.isInClient() && liff.shareTargetPicker) {
        const result = await liff.shareTargetPicker([{ type: 'text', text }]);
        shared = !!result;
      }
    } catch (e) {}

    if (!shared && navigator.share) {
      try {
        await navigator.share({ title, text, url: data.url });
        shared = true;
      } catch (e) {}
    }

    if (!shared && navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(text);
        showMsg('分享文字已複製，可貼到 LINE 傳給朋友。<br><span class="muted">期限｜' + esc(formatShareExpiryText(data.expiresAtText)) + '</span>', 'ok');
        return;
      } catch (e) {
        showShareLinkFallback(data.url, data.expiresAtText, title);
        return;
      }
    }

    if (shared) {
      showMsg('已開啟分享視窗。<br><span class="muted">期限｜' + esc(formatShareExpiryText(data.expiresAtText)) + '</span>', 'ok');
    } else {
      showShareLinkFallback(data.url, data.expiresAtText, title);
    }
  } catch (err) {
    showMsg(esc(err.message || err), 'err');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function renderSharedCourseDetail(shareToken) {
  setSharedEntryMode(true, shareToken);
  const token = beginPage('share', '活動詳情', false);
  const app = document.getElementById('app');
  showLoading('開啟分享活動中');

  try {
    const data = await post('validateCourseShareLink', { token: shareToken, userId }, 12000);
    if (!isPageActive(token, 'share')) return;
    stopLoading();

    if (!data || data.status !== 'ok' || !data.course) {
      app.innerHTML = `
        <div class="card compact-card">
          <h2>分享連結無法使用</h2>
          <p class="meta">${esc((data && data.message) || '此連結已失效或不存在。')}</p>
          <button class="btn btn-sub" onclick="history.back()">返回上一頁</button>
        </div>
      `;
      return;
    }

    currentCourse = data.course;
    mergeCourseToState(data.course);
    renderCourseDetailContent(data.course);
  } catch (err) {
    if (!isPageActive(token, 'share')) return;
    stopLoading();
    app.innerHTML = `
      <div class="card compact-card">
        <h2>分享連結載入失敗</h2>
        <p class="meta">${esc(err.message || err)}</p>
        <button class="btn btn-sub" onclick="history.back()">返回上一頁</button>
      </div>
    `;
  }
}

async function renderCourseDetailPage(courseCode, openRegisterNow, forceRefresh) {
  const targetView = openRegisterNow ? 'register' : 'detail';
  const token = beginPage(targetView, openRegisterNow ? '填寫報名' : '活動詳情', false);

  const localCourse = getCourseFromState(courseCode);
  if (localCourse && !forceRefresh && !openRegisterNow) {
    currentCourse = localCourse;
    renderMenu();
    if (openRegisterNow && canCourseRegister(localCourse)) {
      renderRegisterForm();
    } else {
      renderCourseDetailContent(localCourse);
    }
    return;
  }

  const app = document.getElementById('app');
  showLoading(openRegisterNow ? '載入報名表中' : '載入活動資料中');

  try {
    const data = await ensureRegistrationData(courseCode, !!forceRefresh || !!openRegisterNow);
    if (!isPageActive(token, targetView)) return;
    stopLoading();
    if (!data || data.status !== 'ok') {
      app.innerHTML = '<div class="card"><h2>找不到課程</h2><p class="meta">' + esc((data && data.message) || '') + '</p><button class="btn btn-sub" onclick="renderHomePage()">返回課程列表</button></div>';
      return;
    }

    currentCourse = data.course;
    mergeCourseToState(data.course);

    if (openRegisterNow && canCourseRegister(data.course)) {
      renderRegisterForm();
    } else {
      renderCourseDetailContent(data.course);
    }
  } catch (err) {
    if (!isPageActive(token, targetView)) return;
    stopLoading();
    app.innerHTML = '<div class="card"><h2>活動載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
  }
}

function canCourseRegister(c) {
  if (!c) return false;
  return c.openFlag === '是' && (c.statusBadge || '報名中') === '報名中';
}

function renderCourseDetailContent(c) {
  currentView = 'detail';
  setTitle('活動詳情');
  currentCourse = c;
  renderMenu();

  const app = document.getElementById('app');
  const canRegister = canCourseRegister(c);
  const showRosterButton = !isSharedEntry && (canViewRoster || isAdminUser);
  const backButton = isSharedEntry
    ? ''
    : '<button class="btn btn-ghost" onclick="renderHomePage({skipRefresh:true})">← 返回報名課程</button>';
  const rosterButton = showRosterButton
    ? `<button class="btn btn-sub" onclick="renderCourseRosterPage('${esc(c.eventCode)}')">查看名單</button>`
    : '';
  const addButton = !isSharedEntry && userCanManageRoster() && !canRegister
    ? `<button class="btn btn-main" onclick="openCourseAddRegistration('${esc(c.eventCode)}')">管理加報</button>`
    : '';
  const img = c.dmUrl ? `<img class="detail-hero" loading="lazy" src="${esc(c.dmUrl)}" onerror="this.style.display='none'">` : '';

  app.innerHTML = `
    ${backButton}
    <div class="card" style="margin-top:12px">
      ${img}
      <h2>${esc(c.eventName)}</h2>
      <div class="badges">
        <span class="badge ${c.statusBadge === '已額滿' ? 'red' : ''}">${esc(c.statusBadge || '活動')}</span>
        <span class="badge">${esc(c.session || '場次未設定')}</span>
      </div>
      <div class="meta">
        日期時間：<b>${esc(c.dateTime || '尚未設定')}</b><br>
        票種：${esc(c.ticketType || '—')}<br>
        金額：${esc(c.priceSummary || '—')}<br>
        報名時間：${esc(c.applyStart || '—')} ～ ${esc(c.applyEnd || '—')}
      </div>
      ${c.description ? '<div class="divider"></div><div class="desc">' + esc(c.description) + '</div>' : ''}
      <div class="divider"></div>
      <div class="compact-actions${isSharedEntry ? ' share-entry-actions' : ''}">
        ${canRegister ? '<button class="btn btn-main" onclick="renderRegisterForm()">我要報名</button>' : '<button class="btn btn-warn" disabled>目前無法報名</button>'}
        ${addButton}
        ${rosterButton}
      </div>
      ${!isSharedEntry && isAdminUser ? '<button class="btn btn-ghost" style="margin-top:8px" onclick="renderHomePage({skipRefresh:true})">返回課程首頁</button>' : ''}
    </div>
  `;
}

function getCountText(c) {
  if (!c) return '—';
  const hasCount = c.currentCount !== undefined && c.currentCount !== null && c.currentCount !== '';
  if (hasCount && c.maxCount) return esc(String(c.currentCount || 0) + ' / ' + c.maxCount);
  if (hasCount) return esc(String(c.currentCount || 0));
  return c.maxCount ? '上限 ' + esc(c.maxCount) : '不限';
}

// ─────────────────────────────
// 名單管理
// ─────────────────────────────
async function renderCourseRosterPage(courseCode, options) {
  if (isSharedEntry) {
    if (currentCourse) renderCourseDetailContent(currentCourse);
    else if (sharedCourseToken) renderSharedCourseDetail(sharedCourseToken);
    return;
  }
  options = options || {};
  const token = beginPage('roster', '名單管理', true);
  const app = document.getElementById('app');
  const code = normalizeCode(courseCode);
  const localCourse = getCourseFromState(code);
  const cachedRoster = loadRosterCache(code);
  let hasShell = false;
  rosterState.openAdd = !!options.openAdd;

  if (cachedRoster) {
    applyRosterData(cachedRoster, { fromCache: true, loading: true });
    renderRosterContent();
    showBoxLoading('roster-msg');
    hasShell = true;
  } else if (localCourse) {
    applyRosterData(buildRosterPlaceholderData(localCourse), { loading: true });
    renderRosterContent();
    showBoxLoading('roster-msg');
    hasShell = true;
  } else {
    showLoading('載入名單中');
  }

  if (!canViewRoster && !isAdminUser && !(initData && initData.allowed)) {
    try {
      const fresh = await ensurePublicData(true);
      if (!isPageActive(token, 'roster')) return;
      canViewRoster = !!(isAdminUser || (fresh && fresh.rosterAllowed));
    } catch (err) {}
  }

  try {
    const data = await post('getCourseRoster', { userId, eventCode: code, light: true }, 18000);
    if (!isPageActive(token, 'roster')) return;
    stopLoading();
    if (!data || data.status !== 'ok') {
      if (hasShell) showBoxMsg('roster-msg', esc((data && data.message) || '名單載入失敗'), 'err');
      else app.innerHTML = '<div class="card"><h2>名單載入失敗</h2><p class="meta">' + esc((data && data.message) || '') + '</p></div>';
      return;
    }
    applyRosterData(data);
    saveRosterCache(code, data);
    renderRosterContent();
    if (cachedRoster) showBoxMsg('roster-msg', '已更新最新名單。', 'ok');
    hydrateRosterLeaderOptions(code, token);
  } catch (err) {
    if (!isPageActive(token, 'roster')) return;
    stopLoading();
    if (hasShell) showBoxMsg('roster-msg', esc(err.message || err), 'err');
    else app.innerHTML = '<div class="card"><h2>名單載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
  }
}

async function hydrateRosterLeaderOptions(courseCode, token) {
  if (!rosterState.canManage || getRosterAddLeaderOptions().length) return;
  try {
    const data = await ensureRegistrationData(courseCode, false);
    if (!isPageActive(token, 'roster') || !data || data.status !== 'ok') return;
    rosterState.leaders = getRosterAddLeaderOptions();
    saveCurrentRosterCache();
    updateRosterLeaderDatalist();
  } catch (err) {}
}

function buildRosterPlaceholderData(course) {
  return {
    status: 'ok',
    allowed: true,
    canManage: userCanManageRoster(),
    course,
    rows: [],
    groups: [],
    stats: {
      active: course.currentCount || 0,
      added: 0,
      cancelled: 0,
      maxCount: course.maxCount || '',
      remaining: course.remainingCount !== undefined ? course.remainingCount : ''
    },
    classDetails: course.classDetails || [],
    leaders: [],
    rosterScopeText: '正在確認權限...',
    rosterScopeFlocks: []
  };
}

function applyRosterData(data, options) {
  options = options || {};
  const oldCode = rosterState.course && rosterState.course.eventCode;
  rosterState.course = data.course || rosterState.course;
  const newCode = rosterState.course && rosterState.course.eventCode;
  if (oldCode !== newCode) rosterState.add = null;
  rosterState.rows = data.rows || [];
  rosterState.groups = data.groups || [];
  rosterState.stats = data.stats || {};
  rosterState.classDetails = data.classDetails || [];
  rosterState.leaders = data.leaders || [];
  if (typeof data.canManage !== 'undefined') rosterState.canManage = !!data.canManage;
  if (typeof data.rosterScopeText !== 'undefined') rosterState.scopeText = data.rosterScopeText || '';
  if (typeof data.rosterScopeFlocks !== 'undefined') rosterState.scopeFlocks = data.rosterScopeFlocks || [];
  rosterState.loading = !!options.loading;
  if (rosterState.course) {
    currentCourse = rosterState.course;
    mergeCourseToState(rosterState.course);
  }
}

function renderRosterContent() {
  const c = rosterState.course || {};
  const stats = rosterState.stats || {};
  const money = rosterMoneySummary(rosterState.rows || []);
  const app = document.getElementById('app');

  if (rosterState.openAdd) {
    app.innerHTML = `
      ${renderRosterTopActions(c)}
      ${renderRosterAddForm()}
    `;
    return;
  }

  app.innerHTML = `
    ${renderRosterTopActions(c)}
    <div class="card compact-card">
      <h2>${esc(c.eventName || '課程名單')}</h2>
      <div class="meta">${esc(c.dateTime || '')}｜${esc(c.session || '')}<br>名額：${esc(stats.active || 0)} / ${esc(stats.maxCount || '不限')}</div>
      <div class="roster-summary">
        <div class="roster-stat"><strong>${esc(stats.active || 0)}</strong><span>有效報名</span></div>
        <div class="roster-stat"><strong>$${esc(money.total)}</strong><span>應收金額</span></div>
        <div class="roster-stat"><strong>${esc(stats.cancelled || 0)}</strong><span>取消</span></div>
        <div class="roster-stat"><strong>${stats.remaining === '' ? '不限' : esc(stats.remaining)}</strong><span>剩餘名額</span></div>
      </div>
      <div id="roster-msg" class="msg"></div>
      ${renderRosterFillAction()}
      <div class="divider"></div>
      <div class="searchbar"><input id="roster-search" placeholder="搜尋姓名 / 雁群 / 類別 / 狀態" value="${esc(rosterState.query || '')}" oninput="filterRosterList()"></div>
      <div class="roster-tabs">
        <button class="btn btn-sub ${rosterState.view === 'grouped' ? 'on' : ''}" onclick="setRosterView('grouped')">報名名單</button>
        <button class="btn btn-sub ${rosterState.view === 'detail' ? 'on' : ''}" onclick="setRosterView('detail')">報名詳情</button>
        <button class="btn btn-sub ${rosterState.view === 'cancelled' ? 'on' : ''}" onclick="setRosterView('cancelled')">取消名單</button>
      </div>
      <div id="roster-list"></div>
    </div>
  `;
  renderRosterList();
}

function renderRosterTopActions(c) {
  return `
    <div class="top-actions">
      <button class="btn btn-sub" onclick="renderHomePage({skipRefresh:true})">課程首頁</button>
      <button class="btn btn-sub" onclick="renderCourseDetailPage('${esc(c.eventCode)}')">活動詳情</button>
      <button class="btn ${rosterState.openAdd ? 'btn-sub' : 'btn-main'}" onclick="openCourseRosterList('${esc(c.eventCode)}')">名單</button>
      ${rosterState.canManage ? `<button class="btn ${rosterState.openAdd ? 'btn-main' : 'btn-sub'}" onclick="openCourseAddRegistration('${esc(c.eventCode)}')">管理加報</button>` : ''}
      <button class="btn btn-main icon-only" onclick="refreshRoster()" title="重新整理" aria-label="重新整理">↻</button>
    </div>
  `;
}

function openCourseRosterList(courseCode) {
  renderCourseRosterPage(courseCode, { openAdd: false });
}

function renderRosterAddForm() {
  if (!rosterState.canManage) {
    return '';
  }
  const c = rosterState.course || {};
  const classDetails = rosterState.classDetails || [];
  const needsClass = classDetails.length > 1;
  if (!rosterState.add) resetRosterAddState();

  return `
    <div class="card compact-card">
      <h2>管理加報</h2>
      <div id="roster-msg" class="msg"></div>
      <div class="form-grid">
        <div class="field full">
          <label>姓名</label>
          <input id="roster-add-name" placeholder="輸入加報姓名" oninput="handleRosterAddNameInput()">
        </div>
        <div id="roster-add-lookup" class="full"></div>
        ${needsClass ? `<div class="field full"><label>上課類別</label>${renderRosterAddClassChoices(classDetails)}</div>` : ''}
        <div class="field ${needsClass ? '' : 'full'}">
          <label>備註</label>
          <input id="roster-add-remark" placeholder="可空白">
        </div>
        <div class="full">${renderRegistrationExtraFields(c.registrationFields, 'roster-extra-')}</div>
      </div>
      <button id="roster-add-submit-btn" class="btn btn-main" onclick="submitAdminAddRegistration()">送出加報</button>
    </div>
  `;
}

function toggleRosterAddPanel() {
  rosterState.openAdd = true;
  renderRosterContent();
  if (rosterState.openAdd) {
    setTimeout(() => {
      const input = document.getElementById('roster-add-name');
      if (input) input.focus();
    }, 80);
  }
}

function getRosterAddLeaderOptions() {
  const merged = [];
  const seen = {};
  const push = list => (list || []).forEach(item => {
    const text = String(item || '').trim();
    if (!text || seen[text]) return;
    seen[text] = true;
    merged.push(text);
  });
  push(getLeaderOptionsForForm());
  push(rosterState.leaders);
  return merged;
}

function updateRosterLeaderDatalist() {
  const list = document.getElementById('roster-leader-options');
  if (!list) return;
  list.innerHTML = getRosterAddLeaderOptions().map(x => `<option value="${esc(x)}"></option>`).join('');
}

function renderRosterAddLeaderSelect(selectedValue) {
  const options = getRosterAddLeaderOptions();
  return `
    <div class="field">
      <label>上手白金/雁群組長</label>
      <select id="roster-add-leader" onchange="handleRosterAddLeaderChange()">
        ${optionHtml(options, selectedValue || '', '請選擇上手白金/雁群組長')}
      </select>
    </div>
  `;
}

function resetRosterAddState() {
  rosterState.add = {
    name: '',
    selectedLeader: '',
    selectedClassType: '',
    lockedClassType: '',
    lookupMembers: [],
    lookupTimer: null,
    lastSeq: 0,
    duplicate: false
  };
}

function renderRosterAddClassChoices(details) {
  const add = rosterState.add || {};
  details = details || [];
  return '<div class="class-choice-grid">' + details.map(item => {
    const name = String(item.name || '').trim();
    const price = Number(item.price || 0);
    const on = name === add.selectedClassType ? ' on' : '';
    const locked = add.lockedClassType && name !== add.lockedClassType;
    const lockedAttrs = locked ? ' disabled aria-disabled="true"' : '';
    return `<button type="button" class="class-choice roster-add-class-choice${on}${locked ? ' locked' : ''}" data-class="${esc(name)}" onclick="selectRosterAddClass(this.dataset.class)"${lockedAttrs}>
      <div class="class-choice-name">${esc(name)}</div>
      <div class="class-choice-price">$${esc(price)}</div>
    </button>`;
  }).join('') + '</div><div id="roster-add-price" class="readonly-box" style="margin-top:8px">' + rosterAddPriceText() + '</div>';
}

function rosterAddPriceText() {
  const add = rosterState.add || {};
  const detail = (rosterState.classDetails || []).find(item => String(item.name || '').trim() === String(add.selectedClassType || '').trim());
  if (!detail) return '請先選類別';
  return `本次票價：$${esc(Number(detail.price || 0))}`;
}

function syncRosterAddClassChoices() {
  const add = rosterState.add || {};
  document.querySelectorAll('.roster-add-class-choice').forEach(btn => {
    const isSelected = btn.dataset.class === add.selectedClassType;
    const isLockedOut = !!add.lockedClassType && btn.dataset.class !== add.lockedClassType;
    btn.classList.toggle('on', isSelected);
    btn.classList.toggle('locked', isLockedOut);
    btn.disabled = isLockedOut;
    btn.setAttribute('aria-disabled', isLockedOut ? 'true' : 'false');
  });
  const price = document.getElementById('roster-add-price');
  if (price) price.innerHTML = rosterAddPriceText();
}

function selectRosterAddClass(classType, options) {
  const add = rosterState.add || (rosterState.add = {});
  const nextType = String(classType || '').trim();
  if (add.lockedClassType && nextType !== add.lockedClassType && !(options && options.force)) {
    syncRosterAddClassChoices();
    return;
  }
  add.selectedClassType = nextType;
  syncRosterAddClassChoices();
}

function hasRosterAddPlatinumClassPair() {
  const mode = String((rosterState.course && rosterState.course.pricingMode) || '').trim();
  if (mode === '類別制') return false;
  const details = rosterState.classDetails || [];
  return details.some(item => String(item.name || '').trim() === '白金')
    && details.some(item => String(item.name || '').trim() === '非白金');
}

function inferRosterAddClassType(member) {
  if (!hasRosterAddPlatinumClassPair()) return '';
  const status = String((member && member.memberStatus) || '').trim();
  if (status.includes('非白金')) return '非白金';
  if (status.includes('白金')) return '白金';
  return '非白金';
}

function applyRosterAddClassAutoSelection(member) {
  const classType = inferRosterAddClassType(member);
  if (!classType) return '';
  const add = rosterState.add || (rosterState.add = {});
  add.lockedClassType = classType;
  selectRosterAddClass(classType, { force: true });
  return classType;
}

function handleRosterAddNameInput() {
  const add = rosterState.add || (rosterState.add = {});
  const name = val('roster-add-name');
  add.name = name;
  add.duplicate = false;
  add.selectedLeader = '';
  add.lookupMembers = [];
  add.selectedClassType = hasRosterAddPlatinumClassPair() ? '' : add.selectedClassType;
  add.lockedClassType = '';
  syncRosterAddClassChoices();
  setRosterAddSubmitDisabled(false, '送出加報');
  clearExtraAnswerValues('roster-extra-');

  const box = document.getElementById('roster-add-lookup');
  if (box) box.innerHTML = '';
  if (add.lookupTimer) clearTimeout(add.lookupTimer);
  const clean = cleanNameLocal(name);
  if (!clean) return;
  add.lookupTimer = setTimeout(() => lookupRosterAddName(clean, name), 350);
}

async function lookupRosterAddName(clean, name) {
  const add = rosterState.add || (rosterState.add = {});
  const box = document.getElementById('roster-add-lookup');
  if (!box || clean !== cleanNameLocal(val('roster-add-name'))) return;

  try {
    const seq = ++add.lastSeq;
    box.innerHTML = '<div class="msg on info">查詢名冊中...</div>';
    const res = await post('lookupMember', { name }, 7000);
    if (seq !== add.lastSeq || clean !== cleanNameLocal(val('roster-add-name'))) return;

    if (res && res.status === 'found') {
      const member = res.member || {};
      add.lookupMembers = [member];
      add.selectedLeader = member.leader || member.flock || member.uplinePlatinum || '';
      const duplicate = getRosterAddDuplicate(clean, add.selectedLeader, {
        usePhone: courseUsesPhoneIdentity(rosterState.course && rosterState.course.registrationFields),
        phoneTail: getPhoneTail(member) || getEnteredPhoneTail('roster-extra-')
      });
      if (duplicate) {
        const autoClassType = applyRosterAddClassAutoSelection(member);
        applyMemberProfileToRegistration(member, 'roster-extra-');
        if (courseUsesPhoneIdentity(rosterState.course && rosterState.course.registrationFields)) {
          add.duplicate = false;
          box.innerHTML = renderRosterAddPhoneCheckNotice(add.selectedLeader);
          setRosterAddSubmitDisabled(true, '請核對電話');
          refreshRosterAddPhoneDuplicateState();
          return;
        }
        add.duplicate = true;
        box.innerHTML = renderRosterAddDuplicateNotice(add.selectedLeader);
        setRosterAddSubmitDisabled(true, '已重複加報');
        return;
      }
      const autoClassType = applyRosterAddClassAutoSelection(member);
      applyMemberProfileToRegistration(member, 'roster-extra-');
      box.innerHTML = `
        <div class="msg on ok">
          ✅ 已找到名冊資料<br>
          姓名：${esc(member.name || name)}<br>
          上手白金/雁群組長：${esc(add.selectedLeader || '—')}
          ${autoClassType ? `<br>上課類別：${esc(autoClassType)}` : ''}
        </div>
        <input id="roster-add-leader" type="hidden" value="${esc(add.selectedLeader)}">
      `;
      setRosterAddSubmitDisabled(false, '送出加報');
    } else if (res && res.status === 'multiple') {
      add.lookupMembers = res.members || [];
      add.selectedLeader = '';
      setRosterAddSubmitDisabled(false, '送出加報');
      box.innerHTML = `
        <div class="msg on warn">找到多筆同名資料，請選擇正確的名冊資料。若同組同名，請用電話末四碼辨識。</div>
        ${renderLookupMemberSelect(add.lookupMembers, 'roster-add-member-choice', 'selectRosterAddMember', '請選擇正確名冊資料')}
      `;
    } else {
      add.selectedLeader = '';
      const autoClassType = applyRosterAddClassAutoSelection(null);
      setRosterAddSubmitDisabled(false, '送出加報');
      box.innerHTML = `
        <div class="msg on warn">
          查無名冊資料，請選擇上手白金/雁群組長<br>
          建立資料
          ${autoClassType ? `<br>上課類別：${esc(autoClassType)}` : ''}
        </div>
        ${renderRosterAddLeaderSelect()}
      `;
    }
  } catch (err) {
    setRosterAddSubmitDisabled(false, '送出加報');
    box.innerHTML = `
      <div class="msg on warn">名冊查詢較慢或失敗，請手動選擇上手白金/雁群組長。</div>
      ${renderRosterAddLeaderSelect()}
    `;
  }
}

function handleRosterAddLeaderChange() {
  const add = rosterState.add || (rosterState.add = {});
  const leader = val('roster-add-leader').trim();
  add.selectedLeader = leader;
  add.duplicate = false;
  const clean = cleanNameLocal(val('roster-add-name'));
  const box = document.getElementById('roster-add-lookup');
  const member = Array.isArray(add.lookupMembers)
    ? add.lookupMembers.find(item => String(item.leader || item.flock || item.uplinePlatinum || '').trim() === leader)
    : null;
  if (member) {
    applyRosterAddClassAutoSelection(member);
    applyMemberProfileToRegistration(member, 'roster-extra-');
  }
  const duplicate = getRosterAddDuplicate(clean, leader, {
    usePhone: courseUsesPhoneIdentity(rosterState.course && rosterState.course.registrationFields),
    phoneTail: getEnteredPhoneTail('roster-extra-')
  });
  if (duplicate) {
    if (courseUsesPhoneIdentity(rosterState.course && rosterState.course.registrationFields)) {
      add.duplicate = false;
      if (box) box.innerHTML = renderRosterAddPhoneCheckNotice(leader, { includeSelect: true });
      setRosterAddSubmitDisabled(true, '請核對電話');
      refreshRosterAddPhoneDuplicateState();
      return;
    }
    add.duplicate = true;
    if (box) box.innerHTML = renderRosterAddDuplicateNotice(leader, { includeSelect: true });
    setRosterAddSubmitDisabled(true, '已重複加報');
    return;
  }
  setRosterAddSubmitDisabled(false, '送出加報');
}

function getRosterAddDuplicate(clean, leader, options) {
  const targetName = String(clean || '').trim();
  const targetLeader = String(leader || '').trim();
  if (!targetName || !targetLeader) return null;
  const usePhone = !!(options && options.usePhone);
  const targetTail = String((options && options.phoneTail) || '').trim();
  return (rosterState.rows || []).find(row => {
    if (row.rawStatus === '取消') return false;
    if (cleanNameLocal(row.name || row.cleanName) !== targetName || getLeaderText(row) !== targetLeader) return false;
    if (!usePhone) return true;
    const rowTail = getPhoneTail(row);
    if (!targetTail || !rowTail) return true;
    return rowTail === targetTail;
  }) || null;
}

function selectRosterAddMember(value) {
  const index = Number(value);
  const add = rosterState.add || (rosterState.add = {});
  const member = Number.isInteger(index) ? (add.lookupMembers || [])[index] : null;
  const box = document.getElementById('roster-add-lookup');
  if (!member || !box) return;

  add.selectedLeader = getLeaderText(member);
  add.duplicate = false;
  const duplicate = getRosterAddDuplicate(cleanNameLocal(val('roster-add-name')), add.selectedLeader, {
    usePhone: courseUsesPhoneIdentity(rosterState.course && rosterState.course.registrationFields),
    phoneTail: getPhoneTail(member) || getEnteredPhoneTail('roster-extra-')
  });
  if (duplicate) {
    const autoClassType = applyRosterAddClassAutoSelection(member);
    applyMemberProfileToRegistration(member, 'roster-extra-');
    if (courseUsesPhoneIdentity(rosterState.course && rosterState.course.registrationFields)) {
      add.duplicate = false;
      box.innerHTML = renderRosterAddPhoneCheckNotice(add.selectedLeader);
      setRosterAddSubmitDisabled(true, '請核對電話');
      refreshRosterAddPhoneDuplicateState();
      return;
    }
    add.duplicate = true;
    box.innerHTML = renderRosterAddDuplicateNotice(add.selectedLeader);
    setRosterAddSubmitDisabled(true, '已重複加報');
    return;
  }

  const autoClassType = applyRosterAddClassAutoSelection(member);
  applyMemberProfileToRegistration(member, 'roster-extra-');
  box.innerHTML = `
    <div class="msg on ok">
      ✅ 已選擇名冊資料<br>
      姓名：${esc(member.name || val('roster-add-name'))}<br>
      上手白金/雁群組長：${esc(add.selectedLeader || '—')}
      ${getPhoneTail(member) ? `<br>電話末四碼：${esc(getPhoneTail(member))}` : ''}
      ${autoClassType ? `<br>上課類別：${esc(autoClassType)}` : ''}

    <input id="roster-add-leader" type="hidden" value="${esc(add.selectedLeader)}">

  setRosterAddSubmitDisabled(false, '送出加報');
}

function filterRosterList() {
  rosterState.query = val('roster-search');
  renderRosterList();
}

function setRosterView(view) {
  rosterState.view = view;
  renderRosterContent();
}

function getFilteredRosterRows() {
  const q = String(rosterState.query || '').trim().toLowerCase();
  let rows = (rosterState.rows || []).slice();
  if (rosterState.view === 'grouped') rows = rows.filter(row => row.rawStatus !== '取消');
  if (rosterState.view === 'cancelled') rows = rows.filter(row => row.rawStatus === '取消');
  if (q) {
    rows = rows.filter(row => [row.name, row.cleanName, row.leader, row.flock, row.classType, row.displayClassType, row.status, row.source, row.cancelReason]
      .join(' ').toLowerCase().includes(q));
  }
  return rows;
}

function renderRosterList() {
  const box = document.getElementById('roster-list');
  if (!box) return;
  const rows = getFilteredRosterRows();
  if (!rows.length) {
    if (rosterState.loading) {
      box.innerHTML = inlineLoadingHtml();
      return;
    }
    box.innerHTML = '<div class="readonly-box">目前沒有符合條件的名單。</div>';
    return;
  }

  if (rosterState.view === 'detail') {
    box.innerHTML = renderRosterDetailTable(rows);
    return;
  }

  if (rosterState.view === 'cancelled') {
    box.innerHTML = renderRosterCancelledTable(rows);
    return;
  }

  if (rosterState.view === 'grouped') {
    const groups = groupRosterRowsClient(rows);
    const money = rosterMoneySummary(rows);
    box.innerHTML = `
      <div class="roster-list-total">
        <span>有效 ${esc(money.active)} 人</span>
        <span>應收 $${esc(money.total)}</span>
      </div>
    ` + groups.map(group => `
      <div class="roster-group">
        ${renderRosterGroupHead(group)}
        ${renderRosterCompactClassSections(group.rows)}
      </div>
    `).join('');
    return;
  }

  box.innerHTML = '<div class="roster-group">' + rows.map(renderRosterRow).join('') + '</div>';
}

function groupRosterRowsClient(rows) {
  const map = {};
  rows.forEach(row => {
    const key = row.flock || row.leader || '未分組';
    if (!map[key]) map[key] = { flock: key, active: 0, cancelled: 0, added: 0, total: 0, classCounts: {}, rows: [] };
    map[key].rows.push(row);
    if (row.rawStatus === '取消') map[key].cancelled += 1;
    else {
      map[key].active += 1;
      if (row.rawStatus === '加報') map[key].added += 1;
      const priceValue = row.displayPrice !== undefined && row.displayPrice !== '' ? row.displayPrice : row.price;
      map[key].total += Number(priceValue || 0);
      const classText = rosterClassText(row);
      map[key].classCounts[classText] = (map[key].classCounts[classText] || 0) + 1;
    }
  });
  return Object.keys(map).sort().map(key => {
    const group = map[key];
    group.classText = Object.keys(group.classCounts)
      .filter(name => name && name !== '—')
      .sort(compareRosterClassNames)
      .map(name => `${name} ${group.classCounts[name]}`)
      .join(' / ');
    group.rows = sortRosterRows(group.rows);
    return group;
  });
}

function rosterClassOrderMap() {
  const map = {};
  (rosterState.classDetails || []).forEach((item, index) => {
    const key = String(item && item.name || '').trim();
    if (key && map[key] === undefined) map[key] = index;
  });
  return map;
}

function rosterClassRank(name) {
  const key = String(name || '').trim();
  const orderMap = rosterClassOrderMap();
  if (orderMap[key] !== undefined) return orderMap[key];
  if (key === '白金') return 0;
  if (key === '非白金') return 1;
  if (!key || key === '—') return 9999;
  return 1000;
}

function compareRosterClassNames(a, b) {
  const rankA = rosterClassRank(a);
  const rankB = rosterClassRank(b);
  if (rankA !== rankB) return rankA - rankB;
  return String(a || '').localeCompare(String(b || ''), 'zh-Hant');
}

function sortRosterRows(rows) {
  return (rows || []).slice().sort((a, b) => {
    const classCompare = compareRosterClassNames(rosterClassText(a), rosterClassText(b));
    if (classCompare) return classCompare;
    return String(a.name || a.cleanName || '').localeCompare(String(b.name || b.cleanName || ''), 'zh-Hant');
  });
}

function groupRosterRowsByClass(rows) {
  const map = {};
  sortRosterRows(rows).forEach(row => {
    const className = rosterClassText(row);
    if (!map[className]) map[className] = { className, active: 0, cancelled: 0, total: 0, rows: [] };
    map[className].rows.push(row);
    if (row.rawStatus === '取消') map[className].cancelled += 1;
    else {
      map[className].active += 1;
      const priceValue = row.displayPrice !== undefined && row.displayPrice !== '' ? row.displayPrice : row.price;
      map[className].total += Number(priceValue || 0);
    }
  });
  return Object.keys(map).sort(compareRosterClassNames).map(key => map[key]);
}

function renderRosterClassHead(classGroup) {
  const parts = [`共 ${Number(classGroup.rows.length || 0)} 人`];
  if (Number(classGroup.active || 0)) parts.push(`有效 ${Number(classGroup.active || 0)} 人`);
  if (Number(classGroup.cancelled || 0)) parts.push(`取消 ${Number(classGroup.cancelled || 0)} 人`);
  parts.push(`合計 $${Number(classGroup.total || 0)}`);
  return `
    <div class="roster-class-head">
      <strong>${esc(classGroup.className)}</strong>
      <span>${esc(parts.join('｜'))}</span>
    </div>
  `;
}

function renderRosterCompactClassSections(rows) {
  let index = 0;
  return groupRosterRowsByClass(rows).map(classGroup => `
    <div class="roster-class-section">
      ${renderRosterClassHead(classGroup)}
      ${classGroup.rows.map(row => renderRosterLine(row, ++index)).join('')}
    </div>
  `).join('');
}

function renderRosterGroupHead(group) {
  const parts = [`共 ${Number(group.rows.length || 0)} 人`];
  if (Number(group.active || 0)) parts.push(`有效 ${Number(group.active || 0)} 人`);
  if (Number(group.cancelled || 0)) parts.push(`取消 ${Number(group.cancelled || 0)} 人`);
  parts.push(`合計 $${Number(group.total || 0)}`);
  if (group.classText) parts.push(group.classText);
  return `
    <div class="roster-group-head">
      <strong>${esc(group.flock)} 小組</strong>
      <span>${esc(parts.join('｜'))}</span>
    </div>
  `;
}

function rosterMoneySummary(rows) {
  return (rows || []).reduce((sum, row) => {
    if (row.rawStatus === '取消') return sum;
    const priceValue = row.displayPrice !== undefined && row.displayPrice !== '' ? row.displayPrice : row.price;
    sum.active += 1;
    sum.total += Number(priceValue || 0);
    return sum;
  }, { active: 0, total: 0 });
}

function rosterActionButton(row) {
  if (!rosterState.canManage) return '';
  if (row.rawStatus === '取消') {
    return `<button class="btn btn-sub" onclick="updateRosterStatus(${Number(row.rowNumber)}, '')">恢復</button>`;
  }
  return `<button class="btn btn-warn" onclick="updateRosterStatus(${Number(row.rowNumber)}, '取消')">取消</button>`;
}

function rosterPriceText(row) {
  const priceValue = row.displayPrice !== undefined && row.displayPrice !== '' ? row.displayPrice : row.price;
  return priceValue === '' ? '—' : '$' + priceValue;
}

function rosterClassText(row) {
  return row.displayClassType || row.classType || '—';
}

function renderRosterRow(row) {
  const cancelled = row.rawStatus === '取消';
  const statusClass = cancelled ? 'gray' : (row.rawStatus === '加報' ? 'yellow' : '');
  const action = !rosterState.canManage
    ? ''
    : cancelled
    ? `<button class="btn btn-sub" onclick="updateRosterStatus(${Number(row.rowNumber)}, '')">恢復</button>`
    : `<button class="btn btn-warn" onclick="updateRosterStatus(${Number(row.rowNumber)}, '取消')">取消報名</button>`;
  const classText = row.displayClassType || row.classType || '—';
  const priceValue = row.displayPrice !== undefined && row.displayPrice !== '' ? row.displayPrice : row.price;
  const priceText = priceValue === '' ? '—' : priceValue;
  const inferredText = row.classTypeInferred || row.priceInferred ? '<span class="badge yellow">推算</span>' : '';
  const registeredBy = row.createdBy || row.source || '—';
  const cancelLine = cancelled
    ? `<br><span class="muted">取消：${esc(row.cancelledBy || row.statusUpdatedBy || '—')}｜${esc(row.cancelledAt || row.statusUpdatedAt || '—')}</span>`
    : '';
  return `
    <div class="roster-row ${cancelled ? 'cancelled' : ''}">
      <div>
        <div class="roster-name">${esc(row.name || row.cleanName || '未命名')}</div>
        <div class="roster-meta">${esc(row.flock || row.leader || '未分組')}｜${esc(classText)}｜$${esc(priceText)} ${inferredText}</div>
      </div>
      <div class="roster-meta">
        <span class="badge ${statusClass}">${esc(row.status || '正常')}</span><br>
        報名：${esc(registeredBy)}｜${esc(row.registeredAt || '—')}${cancelLine}
      </div>
      <div class="roster-actions">${action}</div>
    </div>
  `;
}

async function refreshRoster() {
  if (!rosterState.course) return;
  await renderCourseRosterPage(rosterState.course.eventCode, { openAdd: !!rosterState.openAdd });
}

async function updateRosterStatus(rowNumber, status) {
  if (!rosterState.course) return;
  const label = status === '取消' ? '取消這筆報名' : '恢復這筆報名';
  let cancelReason = '';
  if (status === '取消') {
    cancelReason = (prompt('請輸入取消原因（必填）') || '').trim();
    if (!cancelReason) return showBoxMsg('roster-msg', '取消報名必須填寫原因。', 'err');
  } else if (!confirm('確認要' + label + '？')) {
    return;
  }
  showBoxMsg('roster-msg', '更新中...', 'info');
  try {
    const res = await post('updateRegistrationStatus', {
      userId,
      displayName,
      eventCode: rosterState.course.eventCode,
      rowNumber,
      status,
      cancelReason
    }, 18000);
    if (!res || res.status !== 'ok') return showBoxMsg('roster-msg', esc((res && res.message) || '更新失敗'), 'err');
    applyRosterData(res);
    saveCurrentRosterCache();
    renderRosterContent();
    showBoxMsg('roster-msg', esc(res.message || '已更新'), 'ok');
  } catch (err) {
    showBoxMsg('roster-msg', esc(err.message || err), 'err');
  }
}

async function fillRosterDerivedData() {
  if (!rosterState.course) return;
  if (!confirm('確認整理本課名單資料？')) return;
  showBoxMsg('roster-msg', '整理中...', 'info');
  try {
    const res = await post('fillCourseRosterDerivedData', {
      userId,
      eventCode: rosterState.course.eventCode
    }, 30000);
    if (!res || res.status !== 'ok') return showBoxMsg('roster-msg', esc((res && res.message) || '整理失敗'), 'err');
    applyRosterData(res);
    saveCurrentRosterCache();
    renderRosterContent();
    showBoxMsg('roster-msg', esc(res.message || '已整理完成'), 'ok');
  } catch (err) {
    showBoxMsg('roster-msg', esc(err.message || err), 'err');
  }
}

async function submitAdminAddRegistration() {
  if (!rosterState.course) return;
  const name = val('roster-add-name');
  if (!name) return showBoxMsg('roster-msg', '請輸入加報姓名。', 'err');
  const add = rosterState.add || {};
  if (add.duplicate) {
    setRosterAddSubmitDisabled(true, '已重複加報');
    return showBoxMsg('roster-msg', '此姓名已在同一雁群有效報名，無法重複加報。', 'err');
  }
  const classType = add.selectedClassType || val('roster-add-class');
  const leader = (add.selectedLeader || val('roster-add-leader') || '').trim();
  if (!leader) return showBoxMsg('roster-msg', '請選擇上手白金/雁群組長。', 'warn');
  const extraCheck = collectRegistrationExtraAnswers(rosterState.course.registrationFields, 'roster-extra-');
  if (!extraCheck.ok) return showBoxMsg('roster-msg', extraCheck.message, 'err');
  const usesPhone = courseUsesPhoneIdentity(rosterState.course && rosterState.course.registrationFields);
  const phoneTail = getPhoneTailFromValue(extraCheck.answers && extraCheck.answers.phone);
  const duplicateForSubmit = getRosterAddDuplicate(cleanNameLocal(name), leader, {
    usePhone: usesPhone,
    phoneTail
  });
  if (duplicateForSubmit) {
    if (rosterState.add) rosterState.add.duplicate = !usesPhone || !!phoneTail;
    setRosterAddSubmitDisabled(true, getDuplicateButtonText(usesPhone, phoneTail, '已重複加報'));
    const lookupBox = document.getElementById('roster-add-lookup');
    if (lookupBox) lookupBox.innerHTML = usesPhone && !phoneTail
      ? renderRosterAddPhoneCheckNotice(leader)
      : renderRosterAddDuplicateNotice(leader);
    if (usesPhone && !phoneTail) return showBoxMsg('roster-msg', '請填寫電話，系統會用電話末四碼核對是否為同一人。', 'warn');
    return showBoxMsg('roster-msg', '此姓名已在同一雁群有效報名，無法重複加報。', 'err');
  }
  setRosterAddSubmitDisabled(true, '送出中...');
  showBoxMsg('roster-msg', '加報中...', 'info');
  try {
    const res = await post('adminAddRegistration', {
      userId,
      displayName,
      eventCode: rosterState.course.eventCode,
      name,
      leader,
      classType,
      extraAnswers: extraCheck.answers,
      remark: val('roster-add-remark')
    }, 20000);
    if (!res || res.status !== 'ok') {
      if (res && res.status === 'duplicate') {
        if (rosterState.add) rosterState.add.duplicate = !usesPhone || !!phoneTail;
        setRosterAddSubmitDisabled(true, getDuplicateButtonText(usesPhone, phoneTail, '已重複加報'));
        const lookupBox = document.getElementById('roster-add-lookup');
        if (lookupBox) lookupBox.innerHTML = usesPhone && !phoneTail
          ? renderRosterAddPhoneCheckNotice(leader)
          : renderRosterAddDuplicateNotice(leader);
        return showBoxMsg('roster-msg', usesPhone && !phoneTail
          ? '請填寫電話，系統會用電話末四碼核對是否為同一人。'
          : '此姓名已在同一雁群有效報名，無法重複加報。', usesPhone && !phoneTail ? 'warn' : 'err');
      }
      setRosterAddSubmitDisabled(false, '送出加報');
      return showBoxMsg('roster-msg', esc((res && res.message) || '加報失敗'), 'err');
    }
    applyRosterData(res);
    saveCurrentRosterCache();
    resetRosterAddState();
    renderRosterContent();
    showBoxMsg('roster-msg', esc(res.message || '已完成加報'), 'ok');
  } catch (err) {
    setRosterAddSubmitDisabled(false, '送出加報');
    showBoxMsg('roster-msg', esc(err.message || err), 'err');
  }
}
