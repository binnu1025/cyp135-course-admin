<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CYP135 課程報名</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f2eb;color:#2a2620;min-height:100vh}
.hd{background:linear-gradient(135deg,#2d5a3d,#1f3f2c);color:#fff;padding:18px 18px 16px;position:sticky;top:0;z-index:5;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.hd small{display:block;color:#c8ddc2;font-size:11px;letter-spacing:.12em;margin-bottom:4px}
.hd h1{font-size:20px;font-weight:900;line-height:1.35}
.wrap{padding:16px;max-width:760px;margin:0 auto 40px}
.card{background:#fff;border:1px solid rgba(45,90,61,.12);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.045)}
.card h2{font-size:17px;color:#2d5a3d;margin-bottom:12px;line-height:1.4}
.section-title{font-size:13px;font-weight:900;color:#2d5a3d;margin:16px 0 8px;letter-spacing:.05em}
.field{margin-bottom:12px}
label{display:block;font-size:12px;color:#6f6a60;margin-bottom:5px;font-weight:700}
input,select,textarea{width:100%;border:1px solid #ddd;border-radius:12px;padding:12px 12px;font-family:'Noto Sans TC',sans-serif;font-size:15px;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:#2d5a3d;box-shadow:0 0 0 3px rgba(45,90,61,.08)}
textarea{min-height:90px;resize:vertical;line-height:1.6}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{width:100%;border:none;border-radius:13px;padding:13px 14px;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:900;cursor:pointer;text-align:center;text-decoration:none;display:inline-block}
.btn-main{background:#2d5a3d;color:#fff}
.btn-sub{background:#e8f0ea;color:#2d5a3d}
.btn-warn{background:#fef6e4;color:#7a4f0f}
.btn-line{background:#06c755;color:#fff}
.btn-ghost{background:#fff;color:#2d5a3d;border:1px solid rgba(45,90,61,.25)}
.btn + .btn{margin-top:8px}
.msg{padding:12px;border-radius:12px;margin-bottom:12px;font-size:14px;line-height:1.6;display:none}
.msg.on{display:block}
.msg.ok{background:#edf7ee;color:#1f4d2c;border:1px solid #a8d5a2}
.msg.err{background:#fdf0f0;color:#7a2020;border:1px solid #d4a0a0}
.msg.info{background:#f6f3ea;color:#6a5a30;border:1px solid #e2d7b4}
.loading{padding:42px 16px;text-align:center;color:#777;font-size:14px}
.top-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.top-actions.single{grid-template-columns:1fr}
.course-card{background:#fff;border:1px solid rgba(45,90,61,.12);border-radius:18px;overflow:hidden;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.045)}
.course-img{width:100%;height:178px;background:#e7e2d7;object-fit:cover;display:block}
.course-body{padding:14px}
.course-title{font-size:18px;font-weight:900;color:#2d5a3d;line-height:1.35;margin-bottom:8px}
.meta{font-size:13px;color:#666;line-height:1.75}
.meta b{color:#2d5a3d}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.badge{display:inline-block;padding:4px 9px;border-radius:999px;background:#e8f0ea;color:#2d5a3d;font-size:12px;font-weight:800}
.badge.red{background:#fdf0f0;color:#a72828}
.badge.yellow{background:#fef6e4;color:#7a4f0f}
.badge.gray{background:#eee;color:#666}
.course-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.detail-hero{width:100%;border-radius:16px;margin-bottom:14px;background:#e7e2d7;max-height:420px;object-fit:cover}
.desc{font-size:14px;color:#4f4a43;line-height:1.85;white-space:pre-wrap}
.divider{height:1px;background:#eee;margin:14px 0}
.category-row{display:grid;grid-template-columns:1.4fr .9fr 40px;gap:8px;align-items:end;margin-bottom:8px}
.icon-btn{border:none;border-radius:11px;background:#f3eeee;color:#9a3333;font-weight:900;height:43px;cursor:pointer}
.success-box{text-align:left;font-size:14px;line-height:1.9;color:#4f4a43}
.muted{font-size:12px;color:#888;line-height:1.6}
.edm-upload{border:1px dashed rgba(45,90,61,.35);background:#fbfaf6;border-radius:14px;padding:12px}
.edm-preview{margin-top:10px;border-radius:14px;overflow:hidden;border:1px solid #eee;background:#fff}
.edm-preview img{width:100%;display:block;max-height:280px;object-fit:cover}
.edm-info{padding:10px;font-size:12px;color:#666;line-height:1.6}
.file-input{padding:10px;background:#fff}
.price-box{background:#edf7ee;border:1px solid #b9d8bf;color:#1f4d2c;border-radius:14px;padding:12px;font-weight:900;text-align:center;margin:10px 0}
.admin-course-row{background:#fafafa;border:1px solid #eee;border-radius:14px;padding:12px;margin-bottom:10px}
.inline-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.readonly-box{background:#f7f7f7;border:1px solid #e0e0e0;border-radius:12px;padding:12px;font-size:15px;color:#333}
.hide{display:none!important}

.hd{display:flex;align-items:center;justify-content:space-between;gap:12px}
.hd-title{min-width:0}
.menu-btn{width:44px;height:44px;border:none;border-radius:14px;background:rgba(255,255,255,.14);color:#fff;font-size:24px;font-weight:900;cursor:pointer;line-height:1}
.nav-menu{position:fixed;right:14px;top:72px;width:210px;background:#fff;color:#2a2620;border:1px solid rgba(45,90,61,.15);border-radius:16px;box-shadow:0 10px 28px rgba(0,0,0,.16);padding:8px;display:none;z-index:30}
.nav-menu.on{display:block}
.nav-menu button{width:100%;border:none;background:#fff;text-align:left;padding:12px 14px;border-radius:12px;font-family:'Noto Sans TC',sans-serif;font-weight:900;color:#2d5a3d;cursor:pointer}
.nav-menu button:hover{background:#edf7ee}
.course-actions.three{grid-template-columns:1fr 1fr 1fr}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none;padding:14px;overflow:auto}
.modal-mask.on{display:block}
.modal-panel{max-width:760px;margin:18px auto 40px;background:#f5f2eb;border-radius:22px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.25)}
.modal-head{position:sticky;top:0;background:#2d5a3d;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;z-index:2}
.modal-head b{font-size:17px}
.modal-close{border:none;background:rgba(255,255,255,.16);color:#fff;border-radius:12px;width:38px;height:38px;font-size:22px;cursor:pointer}
.modal-body{padding:14px}
.admin-mini{margin-top:10px;padding-top:10px;border-top:1px dashed #e6e0d6}
.admin-mini .btn{padding:10px;font-size:13px}

@media(max-width:420px){.row,.top-actions,.course-actions,.course-actions.three{grid-template-columns:1fr}.course-img{height:156px}.category-row{grid-template-columns:1fr}.icon-btn{width:100%}.nav-menu{right:12px;left:12px;width:auto}}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-title">
    <small>CYP135 課程系統</small>
    <h1 id="page-title">課程報名</h1>
  </div>
  <button class="menu-btn" onclick="toggleMenu()" aria-label="開啟選單">☰</button>
  <div id="nav-menu" class="nav-menu"></div>
</div>

<div class="wrap">
  <div id="msg" class="msg"></div>
  <div id="app" class="loading">載入中...</div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzlEBM9PCjfGW-QC3w0ILIaQ9-yjvPPLnLxzT_5QD-zjsjSbnpEQcgDg6uyNvjd1vIt/exec';
const LIFF_ID = '2010580892-WjWtHyOn';

let userId = '';
let displayName = '';
let initData = null;
let currentCourse = null;
let selectedLeader = '';
let memberIndex = {};
let editingCourseCode = '';
let currentCourseData = null;
let lookupTimer = null;
let publicData = null;
let selectedEdmFile = null;
let uploadedEdmUrl = '';
let uploadedEdmFileName = '';
let registrationCache = {};
let adminDataCache = null;
let isAdminUser = false;
let activePage = 'home';

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.className = 'msg on ' + (type || 'info');
  el.innerHTML = text;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
  el.innerHTML = '';
}

function val(id) {
  return (document.getElementById(id) || {value:''}).value.trim();
}

function esc(input) {
  return (input === undefined || input === null ? '' : String(input))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function post(action, payload) {
  payload = payload || {};
  payload.action = action;

  return fetch(GAS, {
    method: 'post',
    body: JSON.stringify(payload)
  }).then(async r => {
    const text = await r.text();
    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error('後端回傳非 JSON，前 200 字：' + text.slice(0, 200));
    }
  });
}

function getParam(name) {
  const qs = new URLSearchParams(location.search);
  if (qs.get(name)) return qs.get(name);

  const state = qs.get('liff.state');
  if (state) {
    const decoded = decodeURIComponent(state);
    const q = decoded.indexOf('?') >= 0 ? decoded.split('?')[1] : decoded;
    const sp = new URLSearchParams(q);
    if (sp.get(name)) return sp.get(name);
  }

  return '';
}


function setTitle(text) {
  document.getElementById('page-title').textContent = text;
  updateMenu();
}

function toggleMenu() {
  const menu = document.getElementById('nav-menu');
  if (!menu) return;
  updateMenu();
  menu.classList.toggle('on');
}

function closeMenu() {
  const menu = document.getElementById('nav-menu');
  if (menu) menu.classList.remove('on');
}

function updateMenu() {
  const menu = document.getElementById('nav-menu');
  if (!menu) return;
  const admin = isAdminUser || (publicData && publicData.isAdmin) || (adminDataCache && adminDataCache.allowed);
  menu.innerHTML = `
    <button onclick="closeMenu(); renderHomePage()">課程列表</button>
    ${admin ? '<button onclick="closeMenu(); openCourseEditor(\'\')">建立活動</button>' : ''}
    ${admin ? '<button onclick="closeMenu(); renderSettingsPage()">管理活動</button>' : ''}
  `;
}

function jsArg(value) {
  return JSON.stringify(value === undefined || value === null ? '' : String(value));
}

async function getPublicDataCached(force) {
  if (publicData && !force) return publicData;
  const data = await post('getPublicInit', { userId });
  publicData = data;
  if (data && data.status === 'ok') isAdminUser = !!data.isAdmin;
  updateMenu();
  return data;
}

async function getAdminDataCached(force) {
  if (adminDataCache && !force) return adminDataCache;
  const data = await post('getCourseAdminInit', { userId });
  adminDataCache = data;
  initData = data;
  if (data && data.allowed) isAdminUser = true;
  updateMenu();
  return data;
}

async function getRegistrationDataCached(courseCode, force) {
  const code = String(courseCode || '').trim();
  if (registrationCache[code] && !force) return registrationCache[code];
  const data = await post('getRegistrationInit', { eventCode: code });
  if (data && data.status === 'ok') registrationCache[code] = data;
  return data;
}

function invalidateCourseCaches() {
  publicData = null;
  adminDataCache = null;
  registrationCache = {};
}


async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return 'login';
    }

    const profile = await liff.getProfile();
    userId = profile.userId || '';
    displayName = profile.displayName || '';
    return 'ok';

  } catch(e) {
    console.error('LIFF 初始化失敗：', e);
    document.getElementById('app').innerHTML =
      '<div class="card"><h2>LIFF 初始化失敗</h2>' +
      '<p class="meta">請確認 LIFF_ID、LINE Developers Endpoint URL，以及是否從 LINE LIFF 連結開啟。<br><br>錯誤訊息：' + esc(e.message || e) + '</p></div>';
    return 'error';
  }
}

window.addEventListener('DOMContentLoaded', async function() {
  const liffStatus = await initLiff();
  if (liffStatus === 'login' || liffStatus === 'error') return;

  updateMenu();
  const mode = getParam('mode');
  const courseCode = getParam('course');

  if (mode === 'register' && courseCode) {
    renderRegisterPageByCode(courseCode);
  } else if (mode === 'detail' && courseCode) {
    renderCourseDetailPage(courseCode);
  } else if (mode === 'admin' || mode === 'settings') {
    renderSettingsPage();
  } else {
    renderHomePage();
  }
});

// ─────────────────────────────
// 首頁：報名課程列表
// ─────────────────────────────
async function renderHomePage(force) {
  clearMsg();
  activePage = 'home';
  setTitle('課程報名');
  const app = document.getElementById('app');

  if (publicData && !force) {
    app.innerHTML = '<div id="course-list"></div>';
    renderPublicCourseList(publicData.courses || []);
    return;
  }

  app.innerHTML = '<div class="loading">載入課程中...</div>';

  try {
    const data = await getPublicDataCached(!!force);

    if (data.status !== 'ok') {
      app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc(data.message || '') + '</p></div>';
      return;
    }

    app.innerHTML = '<div id="course-list"></div>';
    renderPublicCourseList(data.courses || []);
  } catch (err) {
    app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
  }
}

function renderPublicCourseList(courses) {
  const el = document.getElementById('course-list');

  if (!courses.length) {
    el.innerHTML = '<div class="card"><h2>目前沒有活動</h2><p class="meta">有新課程開放時會顯示在這裡。</p></div>';
    return;
  }

  el.innerHTML = courses.map(courseCardHtml).join('');
}

function courseCardHtml(c) {
  const full = c.statusBadge === '已額滿';
  const closed = c.statusBadge === '尚未開放';
  const badgeClass = full ? 'red' : (closed ? 'gray' : '');
  const img = c.dmUrl
    ? `<img class="course-img" src="${esc(c.dmUrl)}" onerror="this.style.display='none'">`
    : `<div class="course-img"></div>`;
  const admin = isAdminUser || (publicData && publicData.isAdmin) || (adminDataCache && adminDataCache.allowed);
  const canRegister = c.openFlag === '是' && c.statusBadge === '報名中';
  const actionClass = admin ? 'course-actions three' : 'course-actions';

  return `
    <div class="course-card">
      ${img}
      <div class="course-body">
        <div class="course-title">${esc(c.eventName || '未命名活動')}</div>
        <div class="badges">
          <span class="badge ${badgeClass}">${esc(c.statusBadge || c.statusText || '活動')}</span>
          <span class="badge">${esc(c.session || '場次未設定')}</span>
        </div>
        <div class="meta">
          日期時間：<b>${esc(c.dateTime || '尚未設定')}</b><br>
          票種：${esc(c.ticketType || '—')}<br>
          金額：${esc(c.priceSummary || '—')}<br>
          報名時間：${esc(c.applyStart || '—')} ～ ${esc(c.applyEnd || '—')}<br>
          名額：${c.maxCount ? esc((c.currentCount || 0) + ' / ' + c.maxCount) : '不限'}
          ${c.needAge === '是' ? '<br>報名資料：需填年齡' : ''}
        </div>
        <div class="${actionClass}">
          <button class="btn btn-main" ${canRegister ? `onclick='renderRegisterPageByCode(${jsArg(c.eventCode)})'` : 'disabled'}>${canRegister ? '立即報名' : '目前無法報名'}</button>
          <button class="btn btn-sub" onclick='renderCourseDetailPage(${jsArg(c.eventCode)})'>查看詳情</button>
          ${admin ? `<button class="btn btn-ghost" onclick='openCourseEditor(${jsArg(c.eventCode)})'>編輯</button>` : ''}
        </div>
      </div>
    </div>
  `;
}

// ─────────────────────────────
// 活動詳情頁
// ─────────────────────────────
async function renderCourseDetailPage(courseCode) {
  clearMsg();
  activePage = 'detail';
  setTitle('活動詳情');
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">載入活動資料中...</div>';

  try {
    const data = await getRegistrationDataCached(courseCode);

    if (data.status !== 'ok') {
      app.innerHTML = '<div class="card"><h2>找不到課程</h2><p class="meta">' + esc(data.message || '') + '</p><button class="btn btn-sub" onclick="renderHomePage()">返回課程列表</button></div>';
      return;
    }

    currentCourse = data.course;
    initData = data;

    const c = currentCourse;
    const canRegister = c.openFlag === '是' && c.statusBadge === '報名中';
    const img = c.dmUrl ? `<img class="detail-hero" src="${esc(c.dmUrl)}" onerror="this.style.display='none'">` : '';
    const admin = isAdminUser || (publicData && publicData.isAdmin) || (adminDataCache && adminDataCache.allowed);

    app.innerHTML = `
      <button class="btn btn-ghost" onclick="renderHomePage()">← 返回報名課程</button>
      <div class="card" style="margin-top:12px">
        ${img}
        <h2>${esc(c.eventName)}</h2>
        <div class="badges">
          <span class="badge ${c.statusBadge === '已額滿' ? 'red' : ''}">${esc(c.statusBadge || '活動')}</span>
          <span class="badge">${esc(c.session || '場次未設定')}</span>
        </div>
        <div class="meta">
          日期時間：<b>${esc(c.dateTime || '尚未設定')}</b><br>
          票種：${esc(c.ticketType || '—')}<br>
          金額：${esc(c.priceSummary || '—')}<br>
          報名時間：${esc(c.applyStart || '—')} ～ ${esc(c.applyEnd || '—')}<br>
          名額：${c.maxCount ? esc((c.currentCount || 0) + ' / ' + c.maxCount) : '不限'}
          ${c.needAge === '是' ? '<br>報名資料：需填年齡' : ''}
        </div>
        ${c.description ? '<div class="divider"></div><div class="desc">' + esc(c.description) + '</div>' : ''}
        <div class="divider"></div>
        ${canRegister ? '<button class="btn btn-main" onclick="renderRegisterForm()">我要報名</button>' : '<button class="btn btn-warn" disabled>目前無法報名</button>'}
        ${admin ? '<button class="btn btn-ghost" onclick="openCourseEditor(' + jsArg(c.eventCode).replace(/"/g,'&quot;') + ')">編輯活動</button>' : ''}
      </div>
    `;
  } catch (err) {
    app.innerHTML = '<div class="card"><h2>活動載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
  }
}

// ─────────────────────────────
// 設定頁：只限會長
// ─────────────────────────────
async function renderSettingsPage(force) {
  clearMsg();
  activePage = 'settings';
  setTitle('管理活動');
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">載入活動管理中...</div>';

  let data;
  try {
    data = await getAdminDataCached(!!force);
  } catch (err) {
    app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
    return;
  }

  if (!data.allowed) {
    app.innerHTML = `
      <button class="btn btn-ghost" onclick="renderHomePage()">← 返回報名課程</button>
      <div class="card" style="margin-top:12px">
        <h2>無權限進入設定頁</h2>
        <p class="meta">此功能限 LINE權限表角色為「會長」的人使用。</p>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="top-actions">
      <button class="btn btn-sub" onclick="renderHomePage()">報名課程</button>
      <button class="btn btn-main" onclick="openCourseEditor('')">新增活動</button>
    </div>

    <div class="card">
      <h2>已建立課程</h2>
      <p class="muted" style="margin-bottom:10px">編輯會以小視窗開啟，不會跳到獨立修改頁。</p>
      <div id="admin-course-list"></div>
    </div>
  `;

  renderAdminCourseList(data.courses || []);
}


function ensureEditorModal() {
  let modal = document.getElementById('editor-modal');
  if (modal) return modal;
  modal = document.createElement('div');
  modal.id = 'editor-modal';
  modal.className = 'modal-mask';
  modal.innerHTML = `
    <div class="modal-panel">
      <div class="modal-head">
        <b id="editor-title">活動編輯</b>
        <button class="modal-close" onclick="closeCourseEditor()">×</button>
      </div>
      <div class="modal-body">
        <div id="course-form-box"></div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', function(e) {
    if (e.target === modal) closeCourseEditor();
  });
  return modal;
}

async function openCourseEditor(courseCode) {
  clearMsg();
  closeMenu();
  const modal = ensureEditorModal();
  modal.classList.add('on');
  document.getElementById('course-form-box').innerHTML = '<div class="loading">載入編輯資料中...</div>';

  try {
    const data = await getAdminDataCached(false);
    if (!data.allowed) {
      document.getElementById('course-form-box').innerHTML = '<div class="card"><h2>無權限</h2><p class="meta">此功能限會長使用。</p></div>';
      return;
    }
    const code = String(courseCode || '').trim();

function handleEdmFileChange(event) {
  const file = event.target.files && event.target.files[0];
  const box = document.getElementById('edm-preview-box');
  const hidden = document.getElementById('c-dm');

  selectedEdmFile = null;
  uploadedEdmUrl = '';
  uploadedEdmFileName = '';
  if (hidden && !currentCourseData) hidden.value = '';

  if (!file) {
    if (box && !(currentCourseData && currentCourseData.dmUrl)) {
      box.classList.add('hide');
      box.innerHTML = '';
    }
    return;
  }

  if (!file.type || file.type.indexOf('image/') !== 0) {
    showMsg('請選擇圖片檔。', 'err');
    event.target.value = '';
    return;
  }

  selectedEdmFile = file;
  const previewUrl = URL.createObjectURL(file);
  const predictedName = buildPreviewEdmFileName(file);

  if (box) {
    box.classList.remove('hide');
    box.innerHTML = `
      <img src="${previewUrl}" alt="EDM 預覽">
      <div class="edm-info">
        已選擇：${esc(file.name)}<br>
        上傳後檔名：${esc(predictedName)}<br>
        狀態：尚未上傳，按「${editingCourseCode ? '更新課程' : '建立課程'}」時會自動上傳。
      </div>
    `;
  }
}

function buildPreviewEdmFileName(file) {
  const date = val('c-date') || '日期';
  const cleanDate = date.replace(/[^0-9]/g, '') || '日期';
  const name = (val('c-name') || '活動名稱')
    .replace(/[\\\/:*?"<>|#%&{}$!'@+=`]/g, '_')
    .replace(/\s+/g, '_')
    .replace(/_+/g, '_')
    .slice(0, 80);
  const ext = getExtFromMime(file && file.type ? file.type : 'image/jpeg');
  return `${cleanDate}_${name}.${ext}`;
}

function getExtFromMime(mime) {
  const m = (mime || '').toLowerCase();
  if (m.includes('png')) return 'png';
  if (m.includes('webp')) return 'webp';
  if (m.includes('gif')) return 'gif';
  return 'jpg';
}

async function uploadEdmIfNeeded(eventName, eventDate) {
  if (!selectedEdmFile) return val('c-dm');
  if (uploadedEdmUrl) return uploadedEdmUrl;

  const dataUrl = await compressImageToDataUrl(selectedEdmFile, 1600, 0.86);
  const res = await post('uploadEdmImage', {
    userId,
    eventName,
    eventDate,
    fileName: selectedEdmFile.name,
    mimeType: 'image/jpeg',
    dataUrl
  });

  if (res.status !== 'ok') throw new Error(res.message || 'EDM 圖片上傳失敗');

  uploadedEdmUrl = res.url || '';
  uploadedEdmFileName = res.fileName || '';
  const hidden = document.getElementById('c-dm');
  if (hidden) hidden.value = uploadedEdmUrl;

  const box = document.getElementById('edm-preview-box');
  if (box) {
    box.classList.remove('hide');
    box.innerHTML = `
      <img src="${esc(uploadedEdmUrl)}" alt="EDM 預覽">
      <div class="edm-info">✅ 已上傳到 Google Drive<br>檔名：${esc(uploadedEdmFileName || '—')}</div>
    `;
  }

  return uploadedEdmUrl;
}

function compressImageToDataUrl(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('圖片讀取失敗'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('圖片載入失敗'));
      img.onload = () => {
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function buildActivityDateTime() {
  const date = val('c-date');
  const start = to24Hour(val('start-hour'), val('start-minute'), val('start-ampm'));
  const end = to24Hour(val('end-hour'), val('end-minute'), val('end-ampm'));
  if (!date || !start || !end) return '';
  return date.replace(/-/g, '/') + ' ' + start + '-' + end;
}

function to24Hour(hour, minute, ampm) {
  if (!hour || !minute || !ampm) return '';
  let h = parseInt(hour, 10);
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return String(h).padStart(2, '0') + ':' + minute;
}

function from24Hour(timeText) {
  const m = String(timeText || '').match(/^(\d{1,2}):(\d{2})/);
  if (!m) return { hour: '', minute: '00', ampm: 'PM' };
  let h = parseInt(m[1], 10);
  const minute = m[2];
  const ampm = h >= 12 ? 'PM' : 'AM';
  if (h === 0) h = 12;
  if (h > 12) h -= 12;
  return { hour: String(h).padStart(2, '0'), minute, ampm };
}

function parseCourseDateTime(text) {
  const out = { date: '', start: {}, end: {} };
  const m = String(text || '').match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/);
  if (!m) return out;
  out.date = `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  out.start = from24Hour(m[4]);
  out.end = from24Hour(m[5]);
  return out;
}

function toDatetimeLocalValue(text) {
  if (!text) return '';
  let m = String(text).match(/^(\d{4})-(\d{1,2})-(\d{1,2})T(\d{1,2}):(\d{2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}T${String(m[4]).padStart(2,'0')}:${m[5]}`;
  m = String(text).match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}T${String(m[4]).padStart(2,'0')}:${m[5]}`;
  return '';
}

function csvSplit(text) {
  return String(text || '').replace(/，/g, ',').replace(/｜/g, '|').split(/[|,]/).map(x => x.trim()).filter(Boolean);
}

async function submitCourseForm() {
  clearMsg();

  const pricingMode = val('c-mode');
  const categoryItems = collectCategoryItems();
  const eventName = val('c-name');
  const activityDate = val('c-date');
  const dateTime = buildActivityDateTime();

  if (!eventName) return showMsg('請填活動名稱', 'err');
  if (!dateTime) return showMsg('請選擇活動日期、開始時間與結束時間', 'err');
  if (!val('c-session')) return showMsg('請選擇場次', 'err');
  if (!val('c-ticket')) return showMsg('請選擇票種', 'err');
  if (val('c-ticket') === '其他' && !val('c-ticket-other')) return showMsg('請輸入其他票種名稱', 'err');
  if (pricingMode === '類別制') {
    if (!categoryItems.length) return showMsg('請至少新增一個課程類別與價格', 'err');
    const missingPrice = categoryItems.find(item => item.name && item.price === '');
    if (missingPrice) return showMsg('請填寫「' + esc(missingPrice.name) + '」的價格；免費請填 0', 'err');
  }

  try {
    let dmUrl = val('c-dm');
    if (selectedEdmFile && !uploadedEdmUrl) {
      showMsg('EDM 圖片上傳中...', 'info');
      dmUrl = await uploadEdmIfNeeded(eventName, activityDate);
    }

    const payload = {
      userId,
      eventCode: val('c-code'),
      eventName,
      dateTime,
      session: val('c-session'),
      ticketType: val('c-ticket'),
      ticketTypeOther: val('c-ticket-other'),
      maxCount: val('c-max'),
      pricingMode,
      platinumPrice: val('c-plat'),
      nonPlatinumPrice: val('c-nonplat'),
      categoryItems,
      openFlag: val('c-open'),
      qrFlag: '是',
      needAge: val('c-need-age'),
      dmUrl,
      description: val('c-desc'),
      applyStart: val('c-apply-start'),
      applyEnd: val('c-apply-end')
    };

    showMsg(editingCourseCode ? '更新中...' : '建立中...', 'info');
    const res = await post(editingCourseCode ? 'updateCourse' : 'createCourse', payload);

    if (res.status === 'ok') {
      invalidateCourseCaches();
      closeCourseEditor();
      const okText = '✅ ' + (editingCourseCode ? '課程已更新' : '課程建立完成') + '<br>活動代碼：' + esc(res.eventCode) + (uploadedEdmFileName ? '<br>EDM：' + esc(uploadedEdmFileName) : '');
      if (activePage === 'settings') {
        await renderSettingsPage(true);
      } else {
        await renderHomePage(true);
      }
      showMsg(okText, 'ok');
    } else {
      showMsg('⚠️ ' + esc(res.message || '儲存失敗'), 'err');
    }
  } catch (err) {
    showMsg('⚠️ ' + esc(err.message || err), 'err');
  }
}

        </select>
      </div>

      <div id="price-box" class="price-box hide"></div>

      <div class="field">
        <label>備註，可空白</label>
        <textarea id="r-remark" placeholder="有特殊需求可填寫"></textarea>
      </div>
      <button class="btn btn-main" onclick="submitRegister()">送出報名</button>
    </div>
  `;
}

function cleanNameLocal(input) {
  const m = String(input || '').match(/[\u4e00-\u9fa5]/g);
  return m ? m.join('') : String(input || '').trim();
}

function buildMemberIndex(list) {
  const map = {};
  (list || []).forEach(item => {
    const key = item.cleanName || cleanNameLocal(item.name);
    if (!key) return;
    if (!map[key]) map[key] = [];
    map[key].push(item);
  });
  return map;
}

function autoLookupMemberLocal() {
  selectedLeader = '';
  const box = document.getElementById('lookup-box');
  const name = val('r-name');
  const clean = cleanNameLocal(name);

  if (!clean) {
    box.innerHTML = '';
    return;
  }

  const matches = memberIndex[clean] || [];
  if (matches.length === 1) {
    selectedLeader = matches[0].leader || '';
    box.innerHTML = `
      <div class="msg on ok">
        ✅ 已找到名冊資料<br>
        姓名：${esc(matches[0].name)}<br>
        上手白金/雁群組長：${esc(selectedLeader || '—')}
      </div>
      <input id="r-leader" type="hidden" value="${esc(selectedLeader)}">
    `;
  } else if (matches.length > 1) {
    selectedLeader = '';
    const choices = [...new Set(matches.map(x => x.leader).filter(Boolean))];
    box.innerHTML = `
      <div class="msg on info">找到多筆同名資料，請選擇上手白金/雁群組長</div>
      ${renderLeaderSelect(choices.length ? choices : getLeaderOptionsForForm())}
    `;
  } else {
    selectedLeader = '';
    box.innerHTML = `
      <div class="msg on err">查無名冊資料，請選擇上手白金/雁群組長建立資料</div>
      ${renderLeaderSelect(getLeaderOptionsForForm())}
    `;
  }
}

function getLeaderOptionsForForm() {
  return (initData && (initData.leaders || initData.platinumNames)) || [];
}

function renderLeaderSelect(options) {
  return `
    <div class="field">
      <label>上手白金/雁群組長</label>
      <select id="r-leader" onchange="selectedLeader=this.value.trim()">
        ${optionHtml(options, '', '請選擇上手白金/雁群組長')}
      </select>
    </div>
  `;
}

function getSelectedClassPrice() {
  const classType = val('r-class');
  const details = (initData && initData.classDetails) || [];
  const item = details.find(x => x.name === classType);
  return { classType, price: item ? Number(item.price || 0) : null };
}

function updateRegistrationPrice() {
  const box = document.getElementById('price-box');
  const info = getSelectedClassPrice();
  if (!info.classType || info.price === null) {
    box.classList.add('hide');
    box.innerHTML = '';
    return;
  }
  box.classList.remove('hide');
  box.innerHTML = `本次票價：$${esc(info.price)}`;
}

async function submitRegister() {
  clearMsg();

  const name = val('r-name');
  if (!name) return showMsg('請輸入姓名', 'err');

  let leader = selectedLeader;
  const leaderField = document.getElementById('r-leader');
  if (!leader && leaderField) leader = leaderField.value.trim();

  if (!leader) return showMsg('查無名冊資料，請選擇上手白金/雁群組長建立資料', 'err');

  const needAge = currentCourse && currentCourse.needAge === '是';
  const age = needAge ? val('r-age') : '';
  if (needAge && !age) return showMsg('請填寫年齡', 'err');

  const priceInfo = getSelectedClassPrice();
  if (!priceInfo.classType) return showMsg('請選擇上課類別', 'err');

  showMsg('送出中...', 'info');

  try {
    const res = await post('submitRegistration', {
      userId,
      displayName,
      eventCode: currentCourse.eventCode,
      name,
      leader,
      flock: leader,
      uplinePlatinum: leader,
      classType: priceInfo.classType,
      age,
      remark: val('r-remark')
    });

    if (res.status === 'ok') {
      delete registrationCache[currentCourse.eventCode];
      clearMsg();
      document.getElementById('app').innerHTML = `
        <div class="card">
          <h2>✅ 報名成功</h2>
          <div class="success-box">
            活動：${esc(res.eventName)}<br>
            姓名：${esc(res.name)}<br>
            上手白金/雁群組長：${esc(res.leader || res.flock || '—')}<br>
            ${res.age ? '年齡：' + esc(res.age) + '<br>' : ''}
            上課類別：${esc(res.classType || '—')}<br>
            應收金額：$${esc(res.price || 0)}
          </div>
          <div class="divider"></div>
          <button class="btn btn-main" onclick='renderRegisterPageByCode(${jsArg(currentCourse.eventCode)})'>繼續報下一位</button>
          <button class="btn btn-sub" onclick="renderHomePage(true)">返回報名課程</button>
        </div>
      `;
    } else if (res.status === 'need_profile') {
      showMsg('查無名冊資料，請選擇上手白金/雁群組長建立資料', 'err');
      autoLookupMemberLocal();
    } else {
      showMsg('⚠️ ' + esc(res.message || '報名失敗'), 'err');
    }
  } catch (err) {
    showMsg('⚠️ ' + esc(err.message || err), 'err');
  }
}
</script>
</body>
</html>
