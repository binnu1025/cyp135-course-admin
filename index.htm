function getCachedAdminData_(force) {
  if (!force && initData && initData.allowed && Array.isArray(initData.courses)) return Promise.resolve(initData);
  if (!force) {
    const cached = loadAdminCache();
    if (cached && cached.allowed) return Promise.resolve(cached);
  }
  return post('getCourseAdminInit', { userId }).then(data => {
    return setAdminData(data || {}, false) || data || {};
  });
}

function renderNoAdminPage() {
  document.getElementById('app').innerHTML = `
    <button class="btn btn-ghost" onclick="renderHomePage({skipRefresh:true})">← 返回報名課程</button>
    <div class="card" style="margin-top:12px">
      <h2>目前無法進入</h2>
      <p class="meta">請返回課程首頁。</p>
    </div>
  `;
}

async function ensureAdminAccess(token, view) {
  if (initData && initData.allowed) return true;
  try {
    const data = await getCachedAdminData_();
    if (token && !isPageActive(token, view)) return false;
    if (data && data.allowed) return true;
  } catch (err) {
    if (token && !isPageActive(token, view)) return false;
    document.getElementById('app').innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
    return false;
  }
  if (token && !isPageActive(token, view)) return false;
  renderNoAdminPage();
  return false;
}

  currentView = 'adminCourses';

    app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';

function renderAdminCoursesShell(courses) {

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="top-actions">
      <button class="btn btn-sub" onclick="renderHomePage({skipRefresh:true})">課程首頁</button>

function handleEdmFileChange(event) {
  const file = event.target.files && event.target.files[0];
  const box = document.getElementById('edm-preview-box');
  const hidden = document.getElementById('c-dm');

  selectedEdmFile = null;
  uploadedEdmUrl = '';
  uploadedEdmFileName = '';
  if (hidden && !currentCourseData) hidden.value = '';

  if (!file) {
    if (box && !(currentCourseData && currentCourseData.dmUrl)) {
      box.classList.add('hide');
      box.innerHTML = '';
    }
    return;
  }

  if (!file.type || file.type.indexOf('image/') !== 0) {
    showFormMsg('請選擇圖片檔。', 'err');
    event.target.value = '';
    return;
  }

  selectedEdmFile = file;
  const previewUrl = URL.createObjectURL(file);
  const predictedName = buildPreviewEdmFileName(file);

  if (box) {
    box.classList.remove('hide');
    box.innerHTML = `
      <img src="${previewUrl}" alt="EDM 預覽">
      <div class="edm-info">
        已選擇：${esc(file.name)}<br>
        上傳後檔名：${esc(predictedName)}<br>
        狀態：尚未上傳。
      </div>
    `;
  }
}

function buildPreviewEdmFileName(file) {
  const date = val('c-date') || '日期';
  const cleanDate = date.replace(/[^0-9]/g, '') || '日期';
  const name = (val('c-name') || '活動名稱')
    .replace(/[\\\/:*?"<>|#%&{}$!'@+=`]/g, '_')
    .replace(/\s+/g, '_')
    .replace(/_+/g, '_')
    .slice(0, 80);
  const ext = getExtFromMime(file && file.type ? file.type : 'image/jpeg');
  return `${cleanDate}_${name}.${ext}`;
}

function getExtFromMime(mime) {
  const m = (mime || '').toLowerCase();
  if (m.includes('png')) return 'png';
  if (m.includes('webp')) return 'webp';
  if (m.includes('gif')) return 'gif';
  return 'jpg';
}

async function uploadEdmIfNeeded(eventName, eventDate) {
  if (!selectedEdmFile) return val('c-dm');
  if (uploadedEdmUrl) return uploadedEdmUrl;

  const dataUrl = await compressImageToDataUrl(selectedEdmFile, 1600, 0.86);
  const res = await post('uploadEdmImage', {
    userId,
    eventName,
    eventDate,
    fileName: selectedEdmFile.name,
    mimeType: 'image/jpeg',
    dataUrl
  });

  if (res.status !== 'ok') throw new Error(res.message || 'EDM 圖片上傳失敗');

  uploadedEdmUrl = res.url || '';
  uploadedEdmFileName = res.fileName || '';
  const hidden = document.getElementById('c-dm');
  if (hidden) hidden.value = uploadedEdmUrl;

  const box = document.getElementById('edm-preview-box');
  if (box) {
    box.classList.remove('hide');
    box.innerHTML = `
      <img src="${esc(uploadedEdmUrl)}" alt="EDM 預覽">
      <div class="edm-info">✅ 圖片已準備完成<br>檔名：${esc(uploadedEdmFileName || '—')}</div>
    `;
  }

  return uploadedEdmUrl;
}

function compressImageToDataUrl(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('圖片讀取失敗'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('圖片載入失敗'));
      img.onload = () => {
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderTimePicker(prefix, selected) {
  selected = selected || {};
  const value = selected.time || to24Hour(selected.hour, selected.minute, selected.ampm) || '';
  return renderClockTimePicker(`${prefix}-time`, value);
}

function renderClockTimePicker(id, value, dataAttrs) {
  const safeValue = normalizeClockValue(value);
  const attrs = dataAttrs || '';
  return `
    <div class="time-clock-grid">
      <input id="${esc(id)}" type="hidden" value="${esc(safeValue)}"${attrs}>
      <button id="${esc(id)}-display" type="button" class="clock-display ${safeValue ? '' : 'empty'}" onclick="openClockPicker('${esc(id)}')">${esc(formatClockDisplay(safeValue))}</button>
    </div>
  `;
}

function renderDateTimeClockPicker(id, text) {
  const local = toDatetimeLocalValue(text);
  const parts = local ? local.split('T') : ['', ''];
  const date = parts[0] || '';
  const time = normalizeClockValue(parts[1] || '');
  return `
    <div class="date-time-clock">
      <input id="${esc(id)}" type="hidden" value="${esc(date && time ? date + 'T' + time : '')}">
      <input id="${esc(id)}-date" type="date" value="${esc(date)}" onchange="syncDateTimeClock('${esc(id)}')">
      ${renderClockTimePicker(`${id}-time`, time, ` data-datetime-base="${esc(id)}"`)}
    </div>
  `;
}

function syncDateTimeClock(id) {
  const date = val(`${id}-date`);
  const time = val(`${id}-time`);
  const target = document.getElementById(id);
  if (!target) return;
  target.value = date && time ? `${date}T${time}` : '';
}

function normalizeClockValue(value) {
  const m = String(value || '').match(/^(\d{1,2}):(\d{2})/);
  if (!m) return '';
  const h = Math.max(0, Math.min(23, Number(m[1]) || 0));
  const min = Math.max(0, Math.min(59, Number(m[2]) || 0));
  return String(h).padStart(2, '0') + ':' + String(min).padStart(2, '0');
}

function formatClockDisplay(value) {
  const normalized = normalizeClockValue(value);
  return normalized || '選擇時間';
}

function openClockPicker(targetId) {
  const target = document.getElementById(targetId);
  if (!target) return;
  activeClockTarget = targetId;
  const parsed = normalizeClockValue(target.value);
  const now = new Date();
  activeClockHour = parsed ? Number(parsed.slice(0, 2)) : now.getHours();
  activeClockMinute = parsed ? Number(parsed.slice(3, 5)) : 0;
  renderClockPanel();
  document.getElementById('clock-backdrop').classList.add('on');
}

function closeClockPicker(event) {
  if (event && event.target && event.target.id !== 'clock-backdrop') return;
  document.getElementById('clock-backdrop').classList.remove('on');
}

function getClockPeriod() {
  return activeClockHour >= 12 ? 'PM' : 'AM';
}

function getClockHour12() {
  const hour = activeClockHour % 12;
  return hour || 12;
}

function setClockPeriod(period) {
  const hour12 = getClockHour12();
  activeClockHour = period === 'PM' ? (hour12 % 12) + 12 : (hour12 % 12);
  renderClockPanel();
}

function setClockHour(hour12) {
  const period = getClockPeriod();
  activeClockHour = period === 'PM' ? (hour12 % 12) + 12 : (hour12 % 12);
  renderClockPanel();
}

function setClockMinute(minute) {
  activeClockMinute = Math.max(0, Math.min(59, Number(minute) || 0));
  renderClockPanel();
}

function adjustClockMinute(delta) {
  activeClockMinute = (activeClockMinute + delta + 60) % 60;
  renderClockPanel();
}

function saveClockPicker() {
  const target = document.getElementById(activeClockTarget);
  if (!target) return;
  const value = String(activeClockHour).padStart(2, '0') + ':' + String(activeClockMinute).padStart(2, '0');
  target.value = value;
  updateClockDisplay(activeClockTarget);
  if (target.dataset.datetimeBase) syncDateTimeClock(target.dataset.datetimeBase);
  document.getElementById('clock-backdrop').classList.remove('on');
}

function clearClockPicker() {
  const target = document.getElementById(activeClockTarget);
  if (!target) return;
  target.value = '';
  updateClockDisplay(activeClockTarget);
  if (target.dataset.datetimeBase) syncDateTimeClock(target.dataset.datetimeBase);
  document.getElementById('clock-backdrop').classList.remove('on');
}

function updateClockDisplay(targetId) {
  const target = document.getElementById(targetId);
  const display = document.getElementById(`${targetId}-display`);
  if (!target || !display) return;
  const text = formatClockDisplay(target.value);
  display.textContent = text;
  display.classList.toggle('empty', !target.value);
}

function renderClockPanel() {
  const panel = document.getElementById('clock-panel');
  if (!panel) return;
  const period = getClockPeriod();
  const hour12 = getClockHour12();
  const minuteChoices = ['00','05','10','15','20','25','30','35','40','45','50','55'];
  const hours = Array.from({ length: 12 }, (_, i) => i + 1);
  panel.innerHTML = `
    <div class="clock-title">選擇時間</div>
    <div class="clock-value">${String(activeClockHour).padStart(2, '0')}:${String(activeClockMinute).padStart(2, '0')}</div>
    <div class="clock-period">
      <button type="button" class="${period === 'AM' ? 'on' : ''}" onclick="setClockPeriod('AM')">上午</button>
      <button type="button" class="${period === 'PM' ? 'on' : ''}" onclick="setClockPeriod('PM')">下午</button>
    </div>
    <div class="clock-face">
      ${hours.map(hour => {
        const angle = (hour % 12) * 30 - 90;
        const rad = angle * Math.PI / 180;
        const x = 110 + Math.cos(rad) * 82;
        const y = 110 + Math.sin(rad) * 82;
        return `<button type="button" class="clock-hour ${hour12 === hour ? 'on' : ''}" style="left:${x}px;top:${y}px" onclick="setClockHour(${hour})">${hour}</button>`;
      }).join('')}
    </div>
    <div class="clock-minute">
      ${minuteChoices.map(min => `<button type="button" class="${activeClockMinute === Number(min) ? 'on' : ''}" onclick="setClockMinute(${Number(min)})">${min}</button>`).join('')}
    </div>

function optionHtml(arr, selected, placeholder) {
  const first = placeholder ? `<option value="">${esc(placeholder)}</option>` : '';
  const list = (arr || []).slice();
  if (selected && !list.some(v => String(v) === String(selected))) list.unshift(selected);
  return first + list.map(v => `<option value="${esc(v)}" ${String(v) === String(selected) ? 'selected' : ''}>${esc(v)}</option>`).join('');
}

function normalizeRegistrationFieldsClient(fields) {
  fields = parseRegistrationFieldsClientSource(fields);
  const pick = (keys) => {
    for (const key of keys) {
      if (fields[key] !== undefined && fields[key] !== null && fields[key] !== '') return fields[key];
    }
    return '';
  };
  return {
    phone: normalizeFieldModeClient(pick(['phone', '電話'])),
    gender: normalizeFieldModeClient(pick(['gender', '性別'])),
    idNumber: normalizeFieldModeClient(pick(['idNumber', 'id', '身分證', '身分證字號'])),
    birthDate: normalizeFieldModeClient(pick(['birthDate', 'birthday', '生日', '出生年月日'])),
    meal: normalizeFieldModeClient(pick(['meal', '葷素', '餐食'])),
    customFields: normalizeCustomRegistrationFieldsClient(fields.customFields || fields.custom || fields.fields || [])
  };
}

function parseRegistrationFieldsClientSource(fields) {
  if (!fields) return {};
  if (typeof fields !== 'string') return fields;

  const text = fields.trim();
  if (!text) return {};

  try {
    const parsed = JSON.parse(text);
    return parsed && typeof parsed === 'object' ? parsed : {};
  } catch (e) {
    const source = {};
    text.split(/[;,，、\n]/).forEach(part => {
      const pair = part.split(/[:=：]/);
      if (pair.length >= 2) source[pair[0].trim()] = pair.slice(1).join(':').trim();
    });
    return source;
  }
}

function normalizeFieldModeClient(mode) {
  mode = String(mode || '').trim();
  if (mode === 'required' || mode === '必填') return 'required';
  if (mode === 'optional' || mode === '選填') return 'optional';
  return 'hidden';
}

function normalizeCustomFieldTypeClient(type) {
  type = String(type || '').trim();
  if (['text', 'textarea', 'select', 'number', 'date'].includes(type)) return type;
  if (type === '長文字') return 'textarea';
  if (type === '下拉選單') return 'select';
  if (type === '數字') return 'number';
  if (type === '日期') return 'date';
  return 'text';
}

function makeCustomFieldIdClient(label, index) {
  const safe = String(label || '').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
  return 'cf_' + (safe || ('field_' + (index + 1)));
}

function normalizeCustomRegistrationFieldsClient(items) {
  if (typeof items === 'string') {
    try { items = JSON.parse(items); } catch (e) { items = []; }
  }
  if (!Array.isArray(items)) return [];
  const used = {};
  return items.map((item, index) => {
    item = item && typeof item === 'object' ? item : {};
    const label = String(item.label || item.name || item.title || '').trim();
    if (!label) return null;
    let id = String(item.id || item.key || '').trim() || makeCustomFieldIdClient(label, index);
    id = id.replace(/[^A-Za-z0-9_-]/g, '_') || makeCustomFieldIdClient(label, index);
    if (used[id]) id = id + '_' + (index + 1);
    used[id] = true;
    let options = item.options || item.choices || [];
    if (typeof options === 'string') options = options.split(/[,\n，、]/);
    options = Array.isArray(options) ? options.map(v => String(v || '').trim()).filter(Boolean) : [];
    return {
      id,
      label,
      type: normalizeCustomFieldTypeClient(item.type),
      mode: normalizeFieldModeClient(item.mode || item.required),
      options
    };
  }).filter(Boolean);
}

function validateCategoryItems(items) {

    if (item.price === '') return `請填寫「${item.name}」的價格`;
    const price = Number(item.price);
    if (!Number.isFinite(price) || price < 0) return `「${item.name}」的價格格式不正確`;
  }

  const names = filled.map(x => x.name).join(',');
  const prices = filled.map(x => String(Number(x.price))).join(',');
  return { items: filled, names, prices };

async function renderExternalImportPage(courseCode) {
  const token = beginPage('externalImport', '外部名單匯入', false);
  const app = document.getElementById('app');

  const selectedCode = normalizeCode(courseCode || '');
  externalImportState = { step: 1, rows: [], preview: null, fileName: '', eventCode: selectedCode, meta: null, grid: null, columns: null };
  if (initData && initData.allowed) {
    renderExternalImportShell(selectedCode, true);
  } else {
    showLoading('載入外部名單匯入');
  }

  const allowed = await ensureAdminAccess(token, 'externalImport');
  if (!isPageActive(token, 'externalImport')) return;
  stopLoading();
  if (!allowed) return;

  getExternalImportData_()
    .then(data => {
      if (!isPageActive(token, 'externalImport')) return;
      if (!data.allowed) return renderNoAdminPage();
      if (!externalImportState.grid || !externalImportState.grid.length) {
        renderExternalImportShell(selectedCode, false);
      } else {
        refreshExternalCourseOptions(selectedCode);
        clearBoxMsg('external-import-msg');
      }
    })
    .catch(err => {
      if (!isPageActive(token, 'externalImport')) return;
      const select = document.getElementById('external-course-select');
      if (select) select.innerHTML = '<option value="">課程載入失敗</option>';
      showBoxMsg('external-import-msg', '課程清單載入失敗：' + esc(err.message || err) + '<br><button class="btn btn-sub" style="margin-top:10px" onclick="renderExternalImportPage()">重新載入</button>', 'err');
    });
}

function refreshExternalCourseOptions(selectedCode) {

}

function ensureExcelParser() {
  if (window.XLSX) return Promise.resolve();
  if (excelParserLoading) return excelParserLoading;

  excelParserLoading = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    script.onload = () => window.XLSX ? resolve() : reject(new Error('Excel 解析工具載入失敗'));
    script.onerror = () => reject(new Error('Excel 解析工具載入失敗，請確認網路後重試。'));
    document.head.appendChild(script);
  });

  return excelParserLoading;
}

async function handleExternalExcelFile(input) {
  const file = input && input.files && input.files[0];
  const eventCode = normalizeCode(val('external-course-select'));
  const preview = document.getElementById('external-import-preview');
  if (preview) preview.innerHTML = '';

  if (!file) return;

  try {
    showBoxMsg('external-import-msg', '讀取 Excel 中...', 'info');
    await ensureExcelParser();
    const parsed = await parseExternalExcelFile(file);
    const rows = parsed.rows || [];
    if (!rows.length) {
      externalImportState = {
        step: 2,
        rows: [],
        preview: null,
        fileName: file.name,
        eventCode,
        meta: parsed.meta || null,
        grid: parsed.grid || null,
        columns: parsed.columns || null
      };
      return showBoxMsg('external-import-msg', 'Excel 沒有可匯入資料。', 'err');
    }

    externalImportState = {
      step: 3,
      rows: [],
      preview: null,
      fileName: file.name,
      eventCode,
      meta: parsed.meta || null,
      grid: parsed.grid || null,
      columns: parsed.columns || null
    };
    renderExternalImportSuggestion();
    updateExternalImportSteps(eventCode ? 3 : 2);
    if (eventCode) {
      await applyExternalColumnMapping();
    } else {
      showBoxMsg('external-import-msg', '已讀取 Excel，請選擇課程或建立新課程。', 'info');
    }
  } catch (err) {
    showBoxMsg('external-import-msg', esc(err.message || err), 'err');
  }
}

async function previewExternalImportRows() {
  const state = externalImportState || {};
  const eventCode = normalizeCode(state.eventCode || val('external-course-select'));
  if (!eventCode) {
    renderExternalImportSuggestion();
    return showBoxMsg('external-import-msg', '請先選擇要匯入的課程。', 'err');
  }
  if (!state.rows || !state.rows.length) {
    return showBoxMsg('external-import-msg', '請先上傳 Excel。', 'err');
  }

  showBoxMsg('external-import-msg', '檢查匯入資料中...', 'info');
  const data = await post('previewExternalImport', {
    userId,
    eventCode,
    fileName: state.fileName,
    rows: state.rows
  }, 60000);
  if (!data || data.status !== 'ok') {
    return showBoxMsg('external-import-msg', esc((data && data.message) || '預覽失敗'), 'err');
  }

  externalImportState.eventCode = eventCode;
  externalImportState.preview = data;
  clearBoxMsg('external-import-msg');
  updateExternalImportSteps(4);
  renderExternalImportPreview(data);
}

function parseExternalExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('讀取檔案失敗'));
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const grid = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
        const headerIndex = findExternalHeaderRow(grid);
        const columns = getDefaultExternalImportColumns(grid, headerIndex);
        resolve({
          rows: extractExternalImportRows(grid, columns),
          meta: extractExternalImportMeta(grid, columns),
          grid,
          columns
        });
      } catch (err) {
        reject(err);
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function getDefaultExternalImportColumns(grid, headerIndex) {
  headerIndex = Number.isFinite(headerIndex) ? headerIndex : findExternalHeaderRow(grid);
  const headers = grid[headerIndex] || [];
  return {
    headerIndex,
    name: findImportColumn(headers, ['姓名','學員姓名','報名者','會員姓名'], 1),
    leader: findImportColumn(headers, ['上手','上手白金','推薦人','雁群組長'], 7),
    packageName: findImportColumn(headers, ['套組','所屬活動','活動名稱','課程','課程類別'], 9),
    memberType: -1,
    registeredAt: -1,
    sourceChannel: -1,
    remark: -1
  };
}

function extractExternalImportRows(grid, columns) {
  const col = columns || getDefaultExternalImportColumns(grid);
  const headerIndex = Number(col.headerIndex) || 0;

  return grid.slice(headerIndex + 1).map((row, i) => {
    const item = {
      rowNumber: headerIndex + i + 2,
      name: cellText(row[col.name]),
      leader: cellText(row[col.leader]),
      packageName: cellText(row[col.packageName]),
      memberType: cellText(row[col.memberType]),
      registeredAt: cellText(row[col.registeredAt]),
      sourceChannel: cellText(row[col.sourceChannel]),
      remark: cellText(row[col.remark])
    };
    return item;
  }).filter(item => item.name || item.leader || item.packageName);
}

function extractExternalImportMeta(grid, columns) {
  const col = columns || getDefaultExternalImportColumns(grid);
  const headerIndex = Number(col.headerIndex) || 0;
  const title = (grid[0] || []).map(cellText).filter(Boolean).join(' ');
  const packageCol = Number(col.packageName);
  const packageCounts = {};

  grid.slice(headerIndex + 1).forEach(row => {
    const name = cellText(row[packageCol]);
    if (!name) return;
    packageCounts[name] = (packageCounts[name] || 0) + 1;
  });

  const packages = Object.keys(packageCounts).sort((a, b) => packageCounts[b] - packageCounts[a]);
  return {
    headerRow: headerIndex + 1,
    title,
    packages,
    suggestedEventName: packages[0] || guessEventNameFromTitle(title)
  };
}

function guessEventNameFromTitle(title) {
  const text = cellText(title);
  if (!text) return '';
  const m = text.match(/[<＜]([^>＞]+)[>＞]([^_]+)_報名資訊/);
  if (m) return (m[1] + m[2]).trim();
  const parts = text.split('_').map(x => x.trim()).filter(Boolean);
  for (let i = parts.length - 1; i >= 0; i--) {
    if (parts[i] && !parts[i].includes('報名資訊') && !/^\d{4}[-/]/.test(parts[i])) return parts[i].replace(/[<＞>＜]/g, '');
  }
  return text;
}

function buildExternalColumnOptions(grid, maxCols) {
  return function(selectedIndex, allowBlank) {
    let html = allowBlank ? '<option value="-1">不匯入</option>' : '';
    for (let i = 0; i < maxCols; i++) {
      const selected = Number(selectedIndex) === i ? 'selected' : '';
      html += `<option value="${i}" ${selected}>${excelColumnName(i)} 欄</option>`;
    }
    return html;
  };
}

function getExternalSelectedCourse() {

  return (adminCourseData || []).find(c => normalizeCode(c.eventCode) === code) || getCourseFromState(code) || null;
}

function renderExternalFirstRows(grid, maxCols) {
  const rows = grid.slice(0, Math.min(grid.length, 10));
  const head = `<tr><th>列</th>${Array.from({length:maxCols}, (_, i) => `<th>${excelColumnName(i)}</th>`).join('')}</tr>`;
  const body = rows.map((row, idx) => {
    return `<tr><td>${idx + 1}</td>${Array.from({length:maxCols}, (_, i) => `<td>${esc(cellText((row || [])[i]))}</td>`).join('')}</tr>`;
  }).join('');
  return head + body;
}

function getExternalGridMaxCols(rows) {
  return Math.max(1, Math.min(26, rows.reduce((max, row) => Math.max(max, (row || []).length), 0)));
}

function excelColumnName(index) {
  let n = Number(index) + 1;
  let s = '';
  while (n > 0) {
    const r = (n - 1) % 26;
    s = String.fromCharCode(65 + r) + s;
    n = Math.floor((n - 1) / 26);
  }
  return s;
}

function findExternalHeaderRow(grid) {
  const max = Math.min(grid.length, 20);
  for (let i = 0; i < max; i++) {
    const rowText = (grid[i] || []).map(cellText).join('|');
    if (rowText.includes('姓名') && (rowText.includes('上手') || rowText.includes('推薦人')) && rowText.includes('套組')) {
      return i;
    }
  }
  return grid.length > 1 ? 1 : 0;
}

function findImportColumn(headers, aliases, fallbackIndex) {
  const normalizedAliases = aliases.map(normalizeHeader);
  for (let i = 0; i < headers.length; i++) {
    const h = normalizeHeader(headers[i]);
    if (normalizedAliases.includes(h)) return i;
  }
  for (let i = 0; i < headers.length; i++) {
    const h = normalizeHeader(headers[i]);
    if (!h) continue;
    if (normalizedAliases.some(a => h.includes(a) || a.includes(h))) return i;
  }
  return fallbackIndex;
}

function normalizeHeader(text) {
  return cellText(text).replace(/\s+/g, '').replace(/[()（）_]/g, '').toLowerCase();
}

function cellText(value) {
  return value === undefined || value === null ? '' : String(value).trim();
}

async function commitExternalImport() {
  const state = externalImportState || {};
  if (!state.rows || !state.rows.length || !state.preview) {
    return showBoxMsg('external-import-msg', '請先上傳 Excel 並完成預覽。', 'err');
  }

  const okCount = Number((state.preview.summary && state.preview.summary.ok) || 0);
  if (!okCount) return showBoxMsg('external-import-msg', '目前沒有可匯入資料。', 'err');
  if (!confirm('確認匯入 ' + okCount + ' 筆資料？')) return;

  try {
    showBoxMsg('external-import-msg', '匯入中，請不要關閉頁面...', 'info');
    const data = await post('commitExternalImport', {
      userId,
      eventCode: state.eventCode,
      fileName: state.fileName,
      rows: state.rows
    }, 90000);

    if (!data || data.status !== 'ok') {
      return showBoxMsg('external-import-msg', esc((data && data.message) || '匯入失敗'), 'err');
    }

    externalImportState.preview = data;
    updateExternalImportSteps(5);
    showBoxMsg('external-import-msg', esc(data.message || '匯入完成'), 'ok');
    renderExternalImportPreview(data);
  } catch (err) {
    showBoxMsg('external-import-msg', esc(err.message || err), 'err');
  }
}

async function syncImportedRowsFromMaster() {
  const data = externalImportState.preview || {};
  const startRow = Number(data.firstWrittenRow || 0);
  const endRow = Number(data.lastWrittenRow || 0);
  if (!startRow || !endRow) {
    return showBoxMsg('external-sync-msg', '找不到剛匯入的列號，無法同步母版。', 'err');

  try {
    showBoxMsg('external-sync-msg', '同步母版中...', 'info');
    const res = await post('syncImportedRowsFromMaster', {

function buildActivityDateTime() {
  const date = val('c-date');
  const start = val('start-time') || to24Hour(val('start-hour'), val('start-minute'), val('start-ampm'));
  const end = val('end-time') || to24Hour(val('end-hour'), val('end-minute'), val('end-ampm'));
  if (!date || !start || !end) return '';
  return date.replace(/-/g, '/') + ' ' + start + '-' + end;
}

function to24Hour(hour, minute, ampm) {
  if (!hour || !minute || !ampm) return '';
  let h = parseInt(hour, 10);
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return String(h).padStart(2, '0') + ':' + minute;
}

function from24Hour(timeText) {
  const m = String(timeText || '').match(/^(\d{1,2}):(\d{2})/);
  if (!m) return { time: '', hour: '', minute: '00', ampm: 'PM' };
  let h24 = parseInt(m[1], 10);
  const minute = m[2];
  const time = String(h24).padStart(2, '0') + ':' + minute;
  const ampm = h24 >= 12 ? 'PM' : 'AM';
  let h = h24;
  if (h === 0) h = 12;
  if (h > 12) h -= 12;
  return { time, hour: String(h).padStart(2, '0'), minute, ampm };
}

function parseCourseDateTime(text) {
  const out = { date: '', start: {}, end: {} };
  let raw = String(text || '').trim();
  if (!raw) return out;

  raw = raw
    .replace(/上午/g, ' AM ')
    .replace(/下午/g, ' PM ')
    .replace(/中午/g, ' PM ')
    .replace(/晚上/g, ' PM ')
    .replace(/早上/g, ' AM ')
    .replace(/[～~–—]/g, '-');

  const dateMatch = raw.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (dateMatch) {
    out.date = `${dateMatch[1]}-${String(dateMatch[2]).padStart(2,'0')}-${String(dateMatch[3]).padStart(2,'0')}`;
  }

  const timeMatches = [...raw.matchAll(/(?:(AM|PM)\s*)?(\d{1,2}):(\d{2})\s*(AM|PM)?/gi)];
  if (timeMatches.length >= 1) {
    out.start = normalizeParsedTime_(timeMatches[0]);
  }
  if (timeMatches.length >= 2) {
    out.end = normalizeParsedTime_(timeMatches[1]);
  }

  return out;
}

function normalizeParsedTime_(match) {
  let before = (match[1] || '').toUpperCase();
  let after = (match[4] || '').toUpperCase();
  let h = parseInt(match[2], 10);
  const minute = match[3];
  let ampm = after || before || (h >= 12 ? 'PM' : 'AM');

  if (h === 0) {
    h = 12;
    ampm = 'AM';
  } else if (h > 12) {
    h -= 12;
    ampm = 'PM';
  }

  return { hour: String(h).padStart(2, '0'), minute, ampm };
}

function toDatetimeLocalValue(text) {
  if (!text) return '';
  let m = String(text).match(/^(\d{4})-(\d{1,2})-(\d{1,2})T(\d{1,2}):(\d{2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}T${String(m[4]).padStart(2,'0')}:${m[5]}`;
  m = String(text).match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+(\d{1,2}):(\d{2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}T${String(m[4]).padStart(2,'0')}:${m[5]}`;
  return '';
}

function csvSplit(text) {
  return String(text || '')
    .replace(/[，、｜|\n\r]/g, ',')
    .split(',')
    .map(x => x.trim())
    .filter(Boolean);
}

function splitCategoryPrices(text, expectedCount) {
  const raw = String(text || '').trim();
  let prices = csvSplit(raw);
  if (!expectedCount || prices.length === expectedCount) return prices;

  const numberMatches = raw.match(/\d+(?:\.\d+)?/g) || [];
  if (numberMatches.length === expectedCount) return numberMatches;

  if (expectedCount > 1 && /^\d+$/.test(raw) && raw.length % expectedCount === 0) {
    const size = raw.length / expectedCount;
    if (size >= 2) {
      return Array.from({ length: expectedCount }, (_, i) => raw.slice(i * size, (i + 1) * size));
    }
  }

  return prices;
}

      userId,
      eventCode: val('c-code'),
      eventName,
      dateTime,
      session: val('c-session'),
      ticketType: val('c-ticket'),
      ticketTypeOther: val('c-ticket-other'),
      coursePurpose: val('c-purpose'),
      registrationFields: collectRegistrationFieldSettings(),
      maxCount: val('c-max'),
      pricingMode,
      platinumPrice: val('c-plat'),
      nonPlatinumPrice: val('c-nonplat'),
      categoryItems: categoryNormalized ? categoryNormalized.items : categoryItems,
      categoryNames: categoryNormalized ? categoryNormalized.names : '',
      categoryPrices: categoryNormalized ? categoryNormalized.prices : '',
      openFlag: val('c-open'),
      qrFlag: val('c-qr'),
      dmUrl,
      description: val('c-desc'),
      applyStart: val('c-apply-start'),
      applyEnd: val('c-apply-end')
    };

    showFormMsg(editingCourseCode ? '更新中...' : '建立中...', 'info');
    const res = await post(editingCourseCode ? 'updateCourse' : 'createCourse', payload);

    if (res.status === 'ok') {
      const isExternalCourse = payload.coursePurpose === '外部匯入';
      clearCourseClientCache(res.eventCode);
      document.getElementById('create-result').innerHTML = `
        <div class="msg on ok">
          ✅ ${editingCourseCode ? '課程已更新' : '課程建立完成'}<br>
          活動代碼：${esc(res.eventCode)}
          ${uploadedEdmFileName ? '<br>EDM：' + esc(uploadedEdmFileName) : ''}
          ${isExternalCourse
            ? `<button class="btn btn-main" style="margin-top:10px" onclick="renderExternalImportPage('${esc(res.eventCode)}')">返回外部名單匯入</button>`
            : `<button class="btn btn-main" style="margin-top:10px" onclick="renderHomePage()">返回報名課程頁</button>
               <button class="btn btn-sub" onclick="renderCourseDetailPage('${esc(res.eventCode)}', false, true)">查看報名頁</button>`}
          <button class="btn btn-ghost" onclick="renderCreateCoursePage()">返回設定</button>
        </div>
      `;
      clearMsg();
      try {
        const fresh = await post(isExternalCourse ? 'getExternalImportInit' : 'getCourseAdminInit', { userId });
        if (!isExternalCourse) initData = fresh;
        adminCourseData = fresh.courses || [];
        renderCourseForm(null);
        const list = document.getElementById('admin-course-list');
        if (list) renderAdminCourseList(adminCourseData);
      } catch(e) {}
    } else {
      showFormMsg('⚠️ ' + esc(res.message || '儲存失敗'), 'err');
    }
  } catch (err) {
    showFormMsg('⚠️ ' + esc(err.message || err), 'err');
  }
}

function cleanNameLocal(input) {
  const m = String(input || '').match(/[\u4e00-\u9fa5]/g);
  return m ? m.join('') : String(input || '').trim();
}

function buildMemberIndex(list) {
  const map = {};
  (list || []).forEach(item => {
    const key = item.cleanName || cleanNameLocal(item.name);
    if (!key) return;
    if (!map[key]) map[key] = [];
    map[key].push(item);
  });
  return map;
}

function buildRegistrationIndex(list) {
  const map = {};
  (list || []).forEach(item => {
    const key = item.cleanName || cleanNameLocal(item.name);
    if (!key) return;
    if (!map[key]) map[key] = [];
    map[key].push(item);
  });
  return map;
}

function getLeaderText(item) {
  return String((item && (item.leader || item.flock || item.uplinePlatinum)) || '').trim();
}

function getPhoneTail(item) {
  const digits = String((item && item.phone) || '').replace(/\D/g, '');
  return digits ? digits.slice(-4) : '';
}

function getPhoneTailFromValue(value) {
  const digits = String(value || '').replace(/\D/g, '');
  return digits ? digits.slice(-4) : '';
}

function courseUsesPhoneIdentity(fields) {
  fields = normalizeRegistrationFieldsClient(fields || (currentCourse && currentCourse.registrationFields));
  return fields.phone && fields.phone !== 'hidden';
}

function getEnteredPhoneTail(prefix = 'r-extra-') {
  return getPhoneTailFromValue(val(prefix + 'phone'));
}

function getDuplicateButtonText(usePhone, phoneTail, duplicateText) {
  return usePhone && !String(phoneTail || '').trim() ? '請核對電話' : (duplicateText || '已重複報名');
}

function getRegistrationLeaderValue() {
  const leaderField = document.getElementById('r-leader');
  const fieldValue = leaderField ? leaderField.value.trim() : '';
  return fieldValue || selectedLeader || '';
}

function getExistingRegistrations(cleanName) {
  const value = registrationIndex[cleanName] || [];
  return Array.isArray(value) ? value : [value];
}

function getExistingRegistration(cleanName, leader, options) {
  const rows = getExistingRegistrations(cleanName);
  const targetLeader = String(leader || '').trim();
  const candidates = targetLeader
    ? rows.filter(item => getLeaderText(item) === targetLeader)
    : (rows.length === 1 ? rows : []);
  if (!candidates.length) return null;

  const usePhone = !!(options && options.usePhone);
  if (!usePhone) return candidates[0] || null;

  const targetTail = String((options && options.phoneTail) || '').trim();
  if (!targetTail) return candidates.find(item => !getPhoneTail(item)) || candidates[0] || null;

  return candidates.find(item => {
    const rowTail = getPhoneTail(item);
    return !rowTail || rowTail === targetTail;
  }) || null;
}

function refreshRegistrationPhoneDuplicateState() {
  if (!courseUsesPhoneIdentity(currentCourse && currentCourse.registrationFields)) return;
  const clean = cleanNameLocal(val('r-name'));
  let leader = getRegistrationLeaderValue();
  if (!clean || !leader) return;
  selectedLeader = leader;

  const phoneTail = getEnteredPhoneTail();
  const duplicate = getExistingRegistration(clean, leader, {
    usePhone: true,
    phoneTail
  });
  const box = document.getElementById('lookup-box');
  if (duplicate) {
    isCurrentNameDuplicate = true;
    setRegisterButtonDisabled(true, getDuplicateButtonText(true, phoneTail, '已重複報名'));
    if (box) box.innerHTML = phoneTail ? duplicateNoticeHtml(leader) : renderPhoneCheckNotice(leader);
  } else {
    isCurrentNameDuplicate = false;
    setRegisterButtonDisabled(false, '送出報名');
    if (box && phoneTail) box.innerHTML = renderRegistrationPhonePassNotice(leader);
  }
}

function refreshRosterAddPhoneDuplicateState() {
  if (!courseUsesPhoneIdentity(rosterState.course && rosterState.course.registrationFields)) return;
  const add = rosterState.add || (rosterState.add = {});
  const clean = cleanNameLocal(val('roster-add-name'));
  const leader = (add.selectedLeader || val('roster-add-leader') || '').trim();
  if (!clean || !leader) return;
  add.selectedLeader = leader;

  const phoneTail = getEnteredPhoneTail('roster-extra-');
  const duplicate = getRosterAddDuplicate(clean, leader, {
    usePhone: true,
    phoneTail
  });
  const box = document.getElementById('roster-add-lookup');
  if (duplicate) {
    add.duplicate = true;
    setRosterAddSubmitDisabled(true, getDuplicateButtonText(true, phoneTail, '已重複加報'));
    if (box) box.innerHTML = phoneTail ? renderRosterAddDuplicateNotice(leader) : renderRosterAddPhoneCheckNotice(leader);
  } else {
    add.duplicate = false;
    setRosterAddSubmitDisabled(false, '送出加報');
    if (box && phoneTail) box.innerHTML = renderRosterAddPhonePassNotice(leader);
  }
}

function memberChoiceLabel(member, index) {

function setRegisterButtonDisabled(disabled, text) {
  const btn = document.getElementById('submit-register-btn');
  if (!btn) return;
  btn.disabled = !!disabled;
  btn.textContent = text || '送出報名';
}

function setRosterAddSubmitDisabled(disabled, text) {
  const btn = document.getElementById('roster-add-submit-btn');
  if (!btn) return;
  btn.disabled = !!disabled;
  btn.textContent = text || '送出加報';
}

function setExtraAnswerValue(key, value, prefix = 'r-extra-') {
  const el = document.getElementById(prefix + key);
  if (!el || value === undefined || value === null || value === '') return false;
  const text = String(value || '').trim();
  if (!text) return false;
  if (el.tagName === 'SELECT') {
    const exists = Array.from(el.options).some(opt => opt.value === text);
    if (!exists) {
      const opt = document.createElement('option');
      opt.value = text;
      opt.textContent = text;
      el.appendChild(opt);
    }
  }
  el.value = text;
  return true;
}

function clearExtraAnswerValues(prefix = 'r-extra-') {
  document.querySelectorAll(`[id^="${prefix}"]`).forEach(el => { el.value = ''; });
}

function applyMemberProfileToRegistration(member, prefix = 'r-extra-') {
  member = member || {};
  const filled = [];
  if (setExtraAnswerValue('phone', member.phone, prefix)) filled.push('電話');
  if (setExtraAnswerValue('gender', member.gender, prefix)) filled.push('性別');
  if (setExtraAnswerValue('meal', member.meal, prefix)) filled.push('葷素');
  return filled;
}

function duplicateNoticeHtml(leader, options) {

  return `

  `;
}

function autoLookupMemberDebounced() {
  clearTimeout(lookupTimer);
  selectedLeader = '';
  isCurrentNameDuplicate = false;
  clearRegisterMsg();
  resetPlatinumClassAutoSelection();

  const box = document.getElementById('lookup-box');
  const name = val('r-name');
  const clean = cleanNameLocal(name);

  if (!clean) {
    if (box) box.innerHTML = '';
    setRegisterButtonDisabled(false, '送出報名');
    return;
  }

  setRegisterButtonDisabled(false, '送出報名');
  if (box) box.innerHTML = '<div class="msg on info">查詢名冊中...</div>';
  lookupTimer = setTimeout(() => autoLookupMemberRemote(clean, name), 180);
}


function renderLookupResult(res, clean, name) {
  const box = document.getElementById('lookup-box');
  if (!box) return;

  if (res.status === 'duplicate') {
    const duplicateItem = {
      name: (res.registration && res.registration.name) || name,
      cleanName: clean,
      leader: (res.registration && res.registration.leader) || ''
    };
    if (!registrationIndex[clean]) registrationIndex[clean] = [];
    if (!Array.isArray(registrationIndex[clean])) registrationIndex[clean] = [registrationIndex[clean]];
    registrationIndex[clean].push(duplicateItem);
    if (courseUsesPhoneIdentity()) {
      selectedLeader = duplicateItem.leader || selectedLeader;
      isCurrentNameDuplicate = false;
      setRegisterButtonDisabled(true, '請核對電話');
      box.innerHTML = renderPhoneCheckNotice(selectedLeader);
      refreshRegistrationPhoneDuplicateState();
      return;
    }
    isCurrentNameDuplicate = true;
    selectedLeader = duplicateItem.leader || selectedLeader;
    setRegisterButtonDisabled(true, '已重複報名');
    box.innerHTML = duplicateNoticeHtml(selectedLeader);
    return;
  }

  if (res.status === 'found') {
    selectedLeader = (res.member && (res.member.leader || res.member.flock || res.member.uplinePlatinum)) || '';
    const duplicate = getExistingRegistration(clean, selectedLeader, {
      usePhone: courseUsesPhoneIdentity(),
      phoneTail: getPhoneTail(res.member) || getEnteredPhoneTail()
    });
    if (duplicate) {
      if (courseUsesPhoneIdentity()) {
        isCurrentNameDuplicate = false;
        setRegisterButtonDisabled(true, '請核對電話');
        const autoClassType = applyPlatinumClassAutoSelection(res.member);
        applyMemberProfileToRegistration(res.member);
        box.innerHTML = renderPhoneCheckNotice(selectedLeader);
        refreshRegistrationPhoneDuplicateState();
        return;
      }
      isCurrentNameDuplicate = true;
      setRegisterButtonDisabled(true, '已重複報名');
      box.innerHTML = duplicateNoticeHtml(selectedLeader);
      return;
    }
    const autoClassType = applyPlatinumClassAutoSelection(res.member);
    const prefilled = applyMemberProfileToRegistration(res.member);
    box.innerHTML = `
      <div class="msg on ok">
        ✅ 已找到名冊資料<br>
        姓名：${esc((res.member && res.member.name) || name)}<br>
        上手白金/雁群組長：${esc(selectedLeader || '—')}
        ${autoClassType ? `<br>上課類別：${esc(autoClassType)}` : ''}
      </div>
      <input id="r-leader" type="hidden" value="${esc(selectedLeader)}">
    `;
  } else if (res.status === 'multiple') {
    selectedLeader = '';
    isCurrentNameDuplicate = false;
    setRegisterButtonDisabled(false, '送出報名');
    box.innerHTML = `
      <div class="msg on warn">找到多筆同名資料，請選擇正確的名冊資料。若同組同名，請用電話末四碼辨識。</div>
      ${renderLookupMemberSelect(res.members || [], 'r-member-choice', 'handleLookupMemberChoice', '請選擇正確名冊資料')}
    `;
  } else {
    selectedLeader = '';
    const autoClassType = applyPlatinumClassAutoSelection(null);
    box.innerHTML = `
      <div class="msg on warn">查無名冊資料，請選擇上手白金/雁群組長<br>建立資料${autoClassType ? '<br>上課類別：' + esc(autoClassType) : ''}</div>
      ${renderLeaderSelect(getLeaderOptionsForForm())}
    `;
  }
}

async function autoLookupMemberRemote(clean, name) {
  const box = document.getElementById('lookup-box');
  if (!box || clean !== cleanNameLocal(val('r-name'))) return;

  try {
    if (lookupCache[clean]) {
      renderLookupResult(lookupCache[clean], clean, name);
      return;
    }

    const seq = ++lastLookupSeq;
    const res = await post('lookupMember', { name }, 7000);
    if (seq !== lastLookupSeq || clean !== cleanNameLocal(val('r-name'))) return;
    lookupCache[clean] = res;

    renderLookupResult(res, clean, name);
  } catch (err) {
    selectedLeader = '';
    box.innerHTML = `
      <div class="msg on warn">名冊查詢較慢或失敗，請手動選擇上手白金/雁群組長</div>
      ${renderLeaderSelect(getLeaderOptionsForForm())}
    `;
  }
}

function refreshRegistrationAfterInitData() {
  const name = val('r-name');
  const clean = cleanNameLocal(name);
  if (!clean) return;

  const cached = lookupCache[clean];
  const leader = getRegistrationLeaderValue();
  if (!leader) {
    if (cached) renderLookupResult(cached, clean, name);
    return;
  }

  selectedLeader = leader;
  const usesPhone = courseUsesPhoneIdentity(currentCourse && currentCourse.registrationFields);
  const phoneTail = getEnteredPhoneTail();
  const duplicate = getExistingRegistration(clean, leader, { usePhone: usesPhone, phoneTail });
  const box = document.getElementById('lookup-box');

  if (duplicate) {
    if (usesPhone) {
      refreshRegistrationPhoneDuplicateState();
      return;
    }
    isCurrentNameDuplicate = true;
    setRegisterButtonDisabled(true, '已重複報名');
    if (box) box.innerHTML = duplicateNoticeHtml(leader);
    return;
  }

  isCurrentNameDuplicate = false;
  setRegisterButtonDisabled(false, '送出報名');
  if (box && phoneTail) box.innerHTML = renderRegistrationPhonePassNotice(leader);
}

function autoLookupMemberLocal() {
  // 舊函式名稱保留相容。
  autoLookupMemberDebounced();
}

function handleLeaderSelectChange(selectEl) {
  selectedLeader = (selectEl && selectEl.value ? selectEl.value : '').trim();
  const clean = cleanNameLocal(val('r-name'));
  const box = document.getElementById('lookup-box');
  const duplicate = getExistingRegistration(clean, selectedLeader, {
    usePhone: courseUsesPhoneIdentity(),
    phoneTail: getEnteredPhoneTail()
  });
  if (duplicate) {
    if (courseUsesPhoneIdentity()) {
      isCurrentNameDuplicate = false;
      setRegisterButtonDisabled(true, '請核對電話');
      if (box) box.innerHTML = renderPhoneCheckNotice(selectedLeader);
      refreshRegistrationPhoneDuplicateState();
      return;
    }
    isCurrentNameDuplicate = true;
    setRegisterButtonDisabled(true, '已重複報名');
    if (box) box.innerHTML = duplicateNoticeHtml(selectedLeader);
    return;
  }
  isCurrentNameDuplicate = false;
  setRegisterButtonDisabled(false, '送出報名');
  const cached = lookupCache[clean];
  if (!cached || cached.status !== 'multiple') {
    clearExtraAnswerValues();
    const autoClassType = applyPlatinumClassAutoSelection(null);
    const options = getLeaderOptionsForForm();
    if (box && selectedLeader) {
      box.innerHTML = `
        <div class="msg on warn">
          已改以 ${esc(selectedLeader)} 小組 的同名者報名<br>
          請確認這是另一位同名同姓的人。
          ${autoClassType ? `<br>上課類別：${esc(autoClassType)}` : ''}
        </div>
        ${renderLeaderSelect(options, selectedLeader)}
      `;
    }
    return;
  }

  const member = findLookupMemberByLeader(cached.members || [], selectedLeader);
  applyPlatinumClassAutoSelection(member);
  applyMemberProfileToRegistration(member);
}

function handleLookupMemberChoice(value) {
  const index = Number(value);
  const clean = cleanNameLocal(val('r-name'));
  const cached = lookupCache[clean];
  const members = cached && cached.status === 'multiple' ? (cached.members || []) : [];
  const member = Number.isInteger(index) ? members[index] : null;
  const box = document.getElementById('lookup-box');
  if (!member || !box) return;

  selectedLeader = getLeaderText(member);
  const duplicate = getExistingRegistration(clean, selectedLeader, {
    usePhone: courseUsesPhoneIdentity(),
    phoneTail: getPhoneTail(member) || getEnteredPhoneTail()
  });
  if (duplicate) {
    if (courseUsesPhoneIdentity()) {
      isCurrentNameDuplicate = false;
      setRegisterButtonDisabled(true, '請核對電話');
      const autoClassType = applyPlatinumClassAutoSelection(member);
      applyMemberProfileToRegistration(member);
      box.innerHTML = renderPhoneCheckNotice(selectedLeader);
      refreshRegistrationPhoneDuplicateState();
      return;
    }
    isCurrentNameDuplicate = true;
    setRegisterButtonDisabled(true, '已重複報名');
    box.innerHTML = duplicateNoticeHtml(selectedLeader);
    return;
  }

  isCurrentNameDuplicate = false;
  setRegisterButtonDisabled(false, '送出報名');
  const autoClassType = applyPlatinumClassAutoSelection(member);
  applyMemberProfileToRegistration(member);
  box.innerHTML = `
    <div class="msg on ok">
      ✅ 已選擇名冊資料<br>
      姓名：${esc(member.name || val('r-name'))}<br>
      上手白金/雁群組長：${esc(selectedLeader || '—')}
      ${getPhoneTail(member) ? `<br>電話末四碼：${esc(getPhoneTail(member))}` : ''}
      ${autoClassType ? `<br>上課類別：${esc(autoClassType)}` : ''}
    </div>
    <input id="r-leader" type="hidden" value="${esc(selectedLeader)}">
  `;
}

function findLookupMemberByLeader(members, leader) {
  const target = String(leader || '').trim();
  if (!target) return null;
  return (members || []).find(item => String(item.leader || item.flock || item.uplinePlatinum || '').trim() === target) || null;
}

function hasPlatinumClassPair() {
  const mode = String((currentCourse && currentCourse.pricingMode) || '').trim();
  if (mode === '類別制') return false;

  const details = (initData && initData.classDetails) || [];
  let hasPlatinum = false;
  let hasNonPlatinum = false;
  details.forEach(item => {
    const name = String(item.name || '').trim();
    if (name === '白金') hasPlatinum = true;
    if (name === '非白金') hasNonPlatinum = true;
  });
  return hasPlatinum && hasNonPlatinum;
}

function inferPlatinumClassType(member) {
  if (!hasPlatinumClassPair()) return '';
  const status = String((member && member.memberStatus) || '').trim();
  if (status.includes('非白金')) return '非白金';
  if (status.includes('白金')) return '白金';
  return '非白金';
}

function applyPlatinumClassAutoSelection(member) {
  const classType = inferPlatinumClassType(member);
  if (!classType) return '';
  lockedClassType = classType;
  selectRegistrationClass(classType, { force: true });
  return classType;
}

function resetPlatinumClassAutoSelection() {
  if (!hasPlatinumClassPair()) return;
  selectedClassType = '';
  lockedClassType = '';
  syncClassChoiceButtons();
  updateRegistrationPrice();
}


function renderClassChoiceButtons(details) {
  details = details || [];
  if (!details.length) {
    return '<div class="msg on err">此課程尚未設定上課類別，請洽票務。</div>';
  }
  return '<div class="class-choice-grid">' + details.map(item => {
    const name = String(item.name || '').trim();
    const price = Number(item.price || 0);
    const on = name === selectedClassType ? ' on' : '';
    const locked = lockedClassType && name !== lockedClassType;
    const lockedAttrs = locked ? ' disabled aria-disabled="true"' : '';
    return `<button type="button" class="class-choice registration-class-choice${on}${locked ? ' locked' : ''}" data-class="${esc(name)}" onclick="selectRegistrationClass(this.dataset.class)"${lockedAttrs}>
      <div class="class-choice-name">${esc(name)}</div>
      <div class="class-choice-price">$${esc(price)}</div>
    </button>`;
  }).join('') + '</div>';
}

function getPriceByClassType(classType) {
  const details = (initData && initData.classDetails) || [];
  const item = details.find(x => String(x.name || '') === String(classType || ''));
  return item ? Number(item.price || 0) : 0;
}

function syncClassChoiceButtons() {
  document.querySelectorAll('.registration-class-choice').forEach(btn => {
    const isSelected = btn.dataset.class === selectedClassType;
    const isLockedOut = !!lockedClassType && btn.dataset.class !== lockedClassType;
    btn.classList.toggle('on', isSelected);
    btn.classList.toggle('locked', isLockedOut);
    btn.disabled = isLockedOut;
    btn.setAttribute('aria-disabled', isLockedOut ? 'true' : 'false');
  });
}

function selectRegistrationClass(classType, options) {
  const nextType = String(classType || '').trim();
  if (lockedClassType && nextType !== lockedClassType && !(options && options.force)) {
    syncClassChoiceButtons();
    return;
  }
  selectedClassType = nextType;
  syncClassChoiceButtons();
  updateRegistrationPrice();
}

function getSelectedClassPrice() {
  const classType = selectedClassType || val('r-class');
  const details = (initData && initData.classDetails) || [];
  const item = details.find(x => String(x.name || '') === String(classType || ''));
  return { classType, price: item ? Number(item.price || 0) : null };
}

function updateRegistrationPrice() {
  const box = document.getElementById('price-box');
  const info = getSelectedClassPrice();
  if (!box) return;
  if (!info.classType || info.price === null) {
    box.innerHTML = '請先選類別';
    return;
  }
  box.innerHTML = `本次票價：$${esc(info.price)}`;
}

function registrationExtraFieldLabels() {
  return {
    phone: '電話',
    gender: '性別',
    idNumber: '身分證字號',
    birthDate: '出生年月日',
    meal: '葷素'
  };
}

function customRegistrationInputId(prefix, field) {
  return prefix + 'custom-' + String(field.id || '').replace(/[^A-Za-z0-9_-]/g, '_');
}

function renderCustomRegistrationInput(field, inputId, required) {
  const requiredAttr = required ? 'required' : '';
  if (field.type === 'textarea') {
    return `<textarea id="${esc(inputId)}" placeholder="${esc(field.label)}" ${requiredAttr}></textarea>`;
  }
  if (field.type === 'select') {
    const options = (field.options || []).map(option => `<option value="${esc(option)}">${esc(option)}</option>`).join('');
    return `<select id="${esc(inputId)}" ${requiredAttr}><option value="">請選擇</option>${options}</select>`;
  }
  if (field.type === 'number') {
    return `<input id="${esc(inputId)}" type="number" placeholder="${esc(field.label)}" ${requiredAttr}>`;
  }
  if (field.type === 'date') {
    return `<input id="${esc(inputId)}" type="date" ${requiredAttr}>`;
  }
  return `<input id="${esc(inputId)}" type="text" placeholder="${esc(field.label)}" ${requiredAttr}>`;
}

function renderRegistrationExtraFields(fields, prefix = 'r-extra-') {
  fields = normalizeRegistrationFieldsClient(fields);
  const labels = registrationExtraFieldLabels();
  const rows = [];
  Object.keys(labels).forEach(key => {
    const mode = fields[key];
    if (mode === 'hidden') return;
    const required = mode === 'required';
    const inputId = prefix + key;
    let input = '';
    if (key === 'birthDate') {
      input = `<input id="${inputId}" type="date" ${required ? 'required' : ''}>`;
    } else if (key === 'gender') {
      input = `<select id="${inputId}" ${required ? 'required' : ''}>
        <option value="">請選擇</option>
        <option value="男">男</option>
        <option value="女">女</option>
        <option value="其他">其他</option>
      </select>`;
    } else if (key === 'meal') {
      input = `<select id="${inputId}" ${required ? 'required' : ''}>
        <option value="">請選擇</option>
        <option value="葷">葷</option>
        <option value="素">素</option>
      </select>`;
    } else {
      const phoneHandler = prefix === 'roster-extra-' ? 'refreshRosterAddPhoneDuplicateState()' : 'refreshRegistrationPhoneDuplicateState()';
      const inputAttrs = key === 'phone' ? `type="tel" oninput="${phoneHandler}"` : 'type="text"';
      input = `<input id="${inputId}" ${inputAttrs} placeholder="${esc(labels[key])}" ${required ? 'required' : ''}>`;
    }
    rows.push(`
      <div class="field">
        <label>${esc(labels[key])}${required ? '（必填）' : '（選填）'}</label>
        ${input}
      </div>
    `);
  });
  (fields.customFields || []).forEach(field => {
    const mode = normalizeFieldModeClient(field.mode);
    if (mode === 'hidden') return;
    const required = mode === 'required';
    const inputId = customRegistrationInputId(prefix, field);
    rows.push(`
      <div class="field">
        <label>${esc(field.label)}${required ? '（必填）' : '（選填）'}</label>
        ${renderCustomRegistrationInput(field, inputId, required)}
      </div>
    `);
  });
  if (!rows.length) return '';
  return `<div class="mini-section"><div class="section-title">補充資料</div><div class="form-grid">${rows.join('')}</div></div>`;
}

function collectRegistrationExtraAnswers(fields, prefix = 'r-extra-') {
  fields = normalizeRegistrationFieldsClient(fields);
  const labels = registrationExtraFieldLabels();
  const answers = {};
  for (const key of Object.keys(labels)) {
    if (fields[key] === 'hidden') continue;
    const answer = val(prefix + key).trim();
    if (fields[key] === 'required' && !answer) {
      return { ok: false, message: '請填寫' + labels[key] };
    }
    answers[key] = answer;
  }
  answers.customFields = {};
  for (const field of (fields.customFields || [])) {
    const mode = normalizeFieldModeClient(field.mode);
    if (mode === 'hidden') continue;
    const answer = val(customRegistrationInputId(prefix, field)).trim();
    if (mode === 'required' && !answer) {
      return { ok: false, message: '請填寫' + field.label };
    }
    answers.customFields[field.id] = answer;
  }
  return { ok: true, answers };
}

async function submitRegister() {
  clearMsg();
  clearRegisterMsg();

  if (isSubmittingRegistration) return;

  const name = val('r-name');
  const clean = cleanNameLocal(name);
  if (!name) return showRegisterMsg('請輸入姓名', 'err');

  let leader = selectedLeader;
  const leaderField = document.getElementById('r-leader');
  if (!leader && leaderField) leader = leaderField.value.trim();

  if (!leader) return showRegisterMsg('查無名冊資料，請選擇上手白金/雁群組長', 'warn');

  const priceInfo = getSelectedClassPrice();
  if (!priceInfo.classType) return showRegisterMsg('請選擇上課類別', 'err');
  const extraCheck = collectRegistrationExtraAnswers(currentCourse && currentCourse.registrationFields);
  if (!extraCheck.ok) return showRegisterMsg(extraCheck.message, 'err');

  const usesPhone = courseUsesPhoneIdentity(currentCourse && currentCourse.registrationFields);
  const phoneTail = getPhoneTailFromValue(extraCheck.answers && extraCheck.answers.phone);
  const duplicateBeforeSubmit = getExistingRegistration(clean, leader, { usePhone: usesPhone, phoneTail });
  if (duplicateBeforeSubmit || (isCurrentNameDuplicate && !usesPhone)) {
    isCurrentNameDuplicate = !usesPhone || !!phoneTail;
    setRegisterButtonDisabled(true, getDuplicateButtonText(usesPhone, phoneTail, '已重複報名'));
    const box = document.getElementById('lookup-box');
    if (box) box.innerHTML = usesPhone && !phoneTail ? renderPhoneCheckNotice(leader) : duplicateNoticeHtml(leader);
    if (usesPhone && !phoneTail) return showRegisterMsg('請填寫電話，系統會用電話末四碼核對是否為同一人。', 'warn');
    return showRegisterMsg('此姓名已報名過本課程，若是同名同姓的另一個人，請改選上手白金/雁群組長。', 'warn');
  }

  isSubmittingRegistration = true;
  setRegisterButtonDisabled(true, '送出中...');
  showRegisterMsg('送出中...', 'info');

  try {
    const res = await post('submitRegistration', {
      userId,
      displayName,
      eventCode: currentCourse.eventCode,
      name,
      leader,
      flock: leader,
      uplinePlatinum: leader,
      classType: priceInfo.classType,
      remark: val('r-remark'),
      extraAnswers: extraCheck.answers
    });

    if (res.status === 'ok') {
      const newRegistrant = {
        name: res.name || name,
        cleanName: clean,
        leader: res.leader || res.flock || leader,
        classType: res.classType || priceInfo.classType,
        phone: (extraCheck.answers && extraCheck.answers.phone) || ''
      };
      if (!registrationIndex[clean]) registrationIndex[clean] = [];
      if (!Array.isArray(registrationIndex[clean])) registrationIndex[clean] = [registrationIndex[clean]];
      registrationIndex[clean].push(newRegistrant);
      if (initData && Array.isArray(initData.existingRegistrants)) initData.existingRegistrants.push(newRegistrant);
      const cacheCode = normalizeCode(currentCourse && currentCourse.eventCode);
      if (cacheCode && appState.registrationInitByCode[cacheCode] && Array.isArray(appState.registrationInitByCode[cacheCode].existingRegistrants)) {
        appState.registrationInitByCode[cacheCode].existingRegistrants.push(newRegistrant);
      }

      if (currentCourse) {
        currentCourse.currentCount = res.currentCount !== undefined ? res.currentCount : Number(currentCourse.currentCount || 0) + 1;
        if (res.remainingCount !== undefined) currentCourse.remainingCount = res.remainingCount;
        if (res.statusBadge) currentCourse.statusBadge = res.statusBadge;
        mergeCourseToState(currentCourse);
      }

      showRegisterMsg(`
        ✅ 報名成功：${esc(res.name || clean)}<br>
        上手白金/雁群組長：${esc(res.leader || res.flock || leader || '—')}<br>
        上課類別：${esc(res.classType || priceInfo.classType || '—')}<br>
        本次票價：$${esc(res.price || priceInfo.price || 0)}<br><br>
        請繼續輸入下一位。
      `, 'ok');

      const nameInput = document.getElementById('r-name');
      const remarkInput = document.getElementById('r-remark');
      const lookupBox = document.getElementById('lookup-box');
      selectedLeader = '';
      isCurrentNameDuplicate = false;
      if (nameInput) nameInput.value = '';
      if (remarkInput) remarkInput.value = '';
      document.querySelectorAll('[id^="r-extra-"]').forEach(el => { el.value = ''; });
      if (lookupBox) lookupBox.innerHTML = '';
      resetPlatinumClassAutoSelection();
      setRegisterButtonDisabled(false, '送出報名');
      setTimeout(() => { if (nameInput) nameInput.focus(); }, 60);

    } else if (res.status === 'need_profile') {
      showRegisterMsg('查無名冊資料，請選擇上手白金/雁群組長', 'warn');
      autoLookupMemberLocal();
    } else if (res.status === 'duplicate') {
      if (!registrationIndex[clean]) registrationIndex[clean] = [];
      if (!Array.isArray(registrationIndex[clean])) registrationIndex[clean] = [registrationIndex[clean]];
      registrationIndex[clean].push({ name, cleanName: clean, leader });
      isCurrentNameDuplicate = !usesPhone || !!phoneTail;
      setRegisterButtonDisabled(true, getDuplicateButtonText(usesPhone, phoneTail, '已重複報名'));
      const box = document.getElementById('lookup-box');
      if (box) box.innerHTML = usesPhone && !phoneTail ? renderPhoneCheckNotice(leader) : duplicateNoticeHtml(leader);
      showRegisterMsg(usesPhone && !phoneTail
        ? '請填寫電話，系統會用電話末四碼核對是否為同一人。'
        : '此姓名已報名過本課程，若是同名同姓的另一個人，請改選上手白金/雁群組長。', 'warn');
    } else {
      showRegisterMsg('⚠️ ' + esc(res.message || '報名失敗'), 'err');
    }
  } catch (err) {
    showRegisterMsg('⚠️ ' + esc(err.message || err), 'err');
  } finally {
    isSubmittingRegistration = false;
    if (!isCurrentNameDuplicate) setRegisterButtonDisabled(false, '送出報名');
  }
}

function loadScriptOnce(url, id) {
  if (window[id]) return Promise.resolve();
  const existing = document.querySelector('script[data-lib="' + id + '"]');
  if (existing) {
    return new Promise((resolve, reject) => {
      existing.addEventListener('load', resolve);
      existing.addEventListener('error', reject);
    });
  }
  return new Promise((resolve, reject) => {
    const sc = document.createElement('script');
    sc.src = url;
    sc.async = true;
    sc.dataset.lib = id;
    sc.onload = resolve;
    sc.onerror = () => reject(new Error('載入工具失敗：' + id));
    document.head.appendChild(sc);
  });
}

function ensureTicketScripts() {
  if (!ticketScriptsLoading) {
    ticketScriptsLoading = Promise.all([
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js', 'JSZip'),
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js', 'QRCode')
    ]);
  }
  return ticketScriptsLoading;
}

function handleTicketBgUpload(input) {
  const file = input && input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      ticketState.bgImage = img;
      ticketState.bgName = file.name;
      const el = document.getElementById('ticket-summary');
      if (el) el.innerHTML = `已選票券底圖：${esc(file.name)}<br>` + (ticketState.stats ? buildTicketSummaryHtml(ticketState.stats) : '尚未同步名單。');
      if (ticketState.members.length) renderTicketPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function buildTicketSummaryHtml(stats) {
  stats = stats || {};
  return `
    <div class="ticket-stat-grid">
      <div class="ticket-stat"><strong>${Number(stats.total || 0)}</strong><span>可產生</span></div>
      <div class="ticket-stat"><strong>${Number(stats.existingCode || 0)}</strong><span>保留 CODE</span></div>
      <div class="ticket-stat"><strong>${Number(stats.newCode || 0)}</strong><span>新產生</span></div>
    </div>
    排除取消：${Number(stats.cancelled || 0)} 人<br>
    CODE 規則：不同活動不同 CODE；同活動已存在者保留舊 CODE，新人才補新 CODE。
  `;
}

async function syncTicketMembers() {
  const code = normalizeCode(val('ticket-course-select'));
  if (!code) return showBoxMsg('ticket-msg', '請先選擇活動。', 'err');
  clearBoxMsg('ticket-msg');
  showBoxMsg('ticket-msg', '同步中，請稍候...', 'info');
  try {
    const data = await post('syncTicketQrFromRegistrations', { userId, eventCode: code }, 30000);
    if (!data || data.status !== 'ok') throw new Error((data && data.message) || '同步失敗');
    ticketState.course = data.course || null;
    ticketState.members = data.members || [];
    ticketState.stats = data.stats || {};
    mergeCourseToState(data.course);
    clearBoxMsg('ticket-msg');
    document.getElementById('ticket-summary').innerHTML = buildTicketSummaryHtml(ticketState.stats);
    await renderTicketPreview();
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '同步失敗', 'err');
  }
}

function ticketSafeName(text) {
  return String(text || '')
    .replace(/[\\/:*?"<>|]/g, '')
    .replace(/\s+/g, '')
    .trim() || '未命名';
}

function ticketInfo() {
  const c = ticketState.course || {};
  return {
    eventName: c.eventName || '活動名稱',
    session: c.session || '',
    ticketType: c.ticketType || '',
    displayDate: c.dateTime || c.displayDate || ''
  };
}

function drawTicketBuiltinBg(ctx, W, topH) {
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(0, 0, W, topH);
  ctx.save();
  ctx.globalAlpha = .07;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(W*.1, topH*.35, 160, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W*.75, topH*1.15, 210, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = .04;
  for (let i=0; i<14; i++) ctx.fillRect(W*.28+i*28, -20, 14, topH+40);
  ctx.restore();
}

function ticketRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function ticketWrapText(ctx, text, x, y, maxW, lh, maxLines) {
  const chars = String(text || '').split('');
  let line = '', lines = [];
  chars.forEach(c => {
    const t = line + c;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = c; }
    else line = t;
  });
  if (line) lines.push(line);
  lines.slice(0, maxLines || 2).forEach((l,i) => ctx.fillText(l, x, y+i*lh));
}

function ticketQrImage(code) {
  return new Promise(resolve => {
    const container = document.createElement('div');
    container.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(container);
    try {
      new QRCode(container, { text: String(code || ''), width: 260, height: 260, colorDark:'#000000', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.M });
      const el = container.querySelector('canvas') || container.querySelector('img');
      if (!el) { document.body.removeChild(container); resolve(null); return; }
      if (el.tagName === 'CANVAS') {
        const img = new Image();
        img.onload = () => { document.body.removeChild(container); resolve(img); };
        img.src = el.toDataURL();
      } else {
        if (el.complete) { document.body.removeChild(container); resolve(el); }
        else { el.onload = () => { document.body.removeChild(container); resolve(el); }; el.onerror = () => { document.body.removeChild(container); resolve(null); }; }
      }
    } catch(e) { document.body.removeChild(container); resolve(null); }
  });
}

async function drawTicketCanvas(canvas, person, info) {
  await ensureTicketScripts();
  const W = 560, H = 1240, topH = 420, px = 40;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0d1f33';
  ctx.fillRect(0, 0, W, topH);
  if (ticketState.bgImage) {
    const img = ticketState.bgImage;
    const scale = Math.min(W / img.width, topH / img.height);
    const dw = img.width * scale, dh = img.height * scale;
    ctx.drawImage(img, 0, 0, img.width, img.height, (W-dw)/2, (topH-dh)/2, dw, dh);
  } else {
    drawTicketBuiltinBg(ctx, W, topH);
  }

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, topH, W, H-topH);
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(px, topH + 24, W - px*2, 3);

  ctx.textAlign = 'center';
  ctx.font = '900 34px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ticketWrapText(ctx, info.eventName, px, topH + 72, W - px*2, 42, 2);

  const sub = [info.displayDate, info.session, info.ticketType].filter(Boolean).join('  ·  ');
  if (sub) {
    ctx.font = '600 18px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#4f5964';
    ctx.fillText(sub, W/2, topH + 140);
  }

  const qrSize = Math.round(W * 0.70);
  const qrX = Math.round((W - qrSize) / 2);
  const qrY = topH + 168;
  ctx.fillStyle = '#f7f7f7';
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.fill();
  ctx.strokeStyle = '#ebebeb'; ctx.lineWidth = 1;
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.stroke();
  const qrImg = await ticketQrImage(person.code);
  if (qrImg) ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

  const codeBaseY = qrY + qrSize + 28;
  ctx.font = '700 36px "Courier New", monospace';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.fillText(String(person.code || '').toUpperCase(), W/2, codeBaseY + 32);

  ctx.strokeStyle = '#eeeeee'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px*2, codeBaseY + 50); ctx.lineTo(W - px*2, codeBaseY + 50); ctx.stroke();

  const nameY = codeBaseY + 100;
  ctx.font = '900 46px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText(person.name || '', W/2, nameY);

  const flockLabel = '小組：' + (person.flock || '—');
  ctx.font = '700 20px "Noto Sans TC", sans-serif';
  const fpw = ctx.measureText(flockLabel).width + 48, fph = 42, fpx = (W - fpw) / 2, fpy = nameY + 20;
  ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)'; ctx.lineWidth = 1.5;
  ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.fill(); ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.stroke();
  ctx.fillStyle = '#1a3a5c';
  ctx.fillText(flockLabel, W/2, fpy + 28);

  if (person.group) {
    const groupLabel = String(person.group || '').trim();
    ctx.font = '700 20px "Noto Sans TC", sans-serif';
    const gpw = ctx.measureText(groupLabel).width + 48, gph = 42, gpx = (W - gpw) / 2, gpy = fpy + fph + 16;
    ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)';
    ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.fill(); ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.stroke();
    ctx.fillStyle = '#1a3a5c';
    ctx.fillText(groupLabel, W/2, gpy + 28);
  }
}

async function renderTicketPreview() {
  if (!ticketState.members.length) {
    return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  }
  await ensureTicketScripts();
  const holder = document.getElementById('ticket-preview-list');
  const card = document.getElementById('ticket-preview-card');
  if (!holder || !card) return;
  holder.innerHTML = '';
  card.style.display = 'block';
  const info = ticketInfo();
  const sample = ticketState.members.slice(0,2);
  for (const m of sample) {
    const wrap = document.createElement('div');
    wrap.className = 'ticket-preview-card';
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    holder.appendChild(wrap);
    await drawTicketCanvas(canvas, m, info);
  }
}

async function downloadTicketZip() {
  if (!ticketState.members.length) return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  await ensureTicketScripts();
  const progress = document.getElementById('ticket-progress');
  const fill = document.getElementById('ticket-progress-fill');
  progress.classList.add('on'); fill.style.width = '0%';
  clearBoxMsg('ticket-msg');
  showBoxMsg('ticket-msg', '正在產生票券...', 'info');

  try {
    const zip = new JSZip();
    const canvas = document.createElement('canvas');
    const info = ticketInfo();
    const used = {};

    for (let i = 0; i < ticketState.members.length; i++) {
      const m = ticketState.members[i];
      await drawTicketCanvas(canvas, m, info);
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      let base = ticketSafeName(m.flock || '雁群') + '_' + ticketSafeName(m.name || '姓名');
      let fname = base + '.png';
      if (used[fname]) {
        used[fname]++;
        fname = base + '_' + used[fname] + '.png';
      } else {
        used[fname] = 1;
      }
      zip.file(fname, blob);
      fill.style.width = Math.round((i+1)/ticketState.members.length*100) + '%';
      await new Promise(r => setTimeout(r, 8));
    }

    const content = await zip.generateAsync({ type: 'blob' });
    const zipName = '雁群票券_' + ticketSafeName(info.eventName) + (info.session ? '_' + ticketSafeName(info.session) : '') + '.zip';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = zipName;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    showBoxMsg('ticket-msg', '票券 ZIP 已產生。', 'ok');
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '產生失敗', 'err');
  } finally {
    progress.classList.remove('on');
    fill.style.width = '0%';
  }
}
