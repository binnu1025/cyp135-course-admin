// ─────────────────────────────────────────────
// V5.5 票券產生：報名總表 → QR管理 → PNG ZIP
// ─────────────────────────────────────────────
function loadScriptOnce(url, id) {
  if (window[id]) return Promise.resolve();
  const existing = document.querySelector('script[data-lib="' + id + '"]');
  if (existing) {
    return new Promise((resolve, reject) => {
      existing.addEventListener('load', resolve);
      existing.addEventListener('error', reject);
    });
  }
  return new Promise((resolve, reject) => {
    const sc = document.createElement('script');
    sc.src = url;
    sc.async = true;
    sc.dataset.lib = id;
    sc.onload = resolve;
    sc.onerror = () => reject(new Error('載入工具失敗：' + id));
    document.head.appendChild(sc);
  });
}

function ensureTicketScripts() {
  if (!ticketScriptsLoading) {
    ticketScriptsLoading = Promise.all([
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js', 'JSZip'),
      loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js', 'QRCode')
    ]);
  }
  return ticketScriptsLoading;
}

async function renderTicketGeneratorPage() {
  const token = beginPage('ticket', '票券產生', false);
  const app = document.getElementById('app');

  showLoading('載入票券產生工具中');
  const allowed = await ensureAdminAccess(token, 'ticket');
  if (!isPageActive(token, 'ticket')) return;
  stopLoading();
  if (!allowed) return;

  try { await ensurePublicData(false); } catch(e) {}
  if (!isPageActive(token, 'ticket')) return;

  const courses = (appState.courses || []).filter(c => c && c.eventName);
  const options = courses.map(c => `<option value="${esc(normalizeCode(c.eventCode))}">${esc(c.eventName)}${c.dateTime ? '｜' + esc(c.dateTime) : ''}</option>`).join('');

  app.innerHTML = `
    <div class="top-actions">
      <button class="btn btn-sub" onclick="renderHomePage({skipRefresh:true})">報名課程</button>
      <button class="btn btn-main" onclick="renderTicketGeneratorPage()">票券產生</button>
    </div>

    <div class="card">
      <h2>票券產生</h2>
      <div id="ticket-msg" class="msg"></div>
      <div class="field">
        <label>選擇活動</label>
        <select id="ticket-course-select">
          <option value="">請選擇活動</option>
          ${options}
        </select>
      </div>
      <div class="form-grid">
        <div class="field full">
          <label>票券底圖，上半部圖片，可選</label>
          <input type="file" id="ticket-bg-file" accept="image/*" onchange="handleTicketBgUpload(this)">
        </div>
      </div>
      <div class="ticket-toolbar">
        <button class="btn btn-main" onclick="syncTicketMembers()">同步報名名單 / 補 CODE</button>
        <button class="btn btn-sub" onclick="renderTicketPreview()">預覽前兩張</button>
      </div>
      <button class="btn btn-main" style="width:100%" onclick="downloadTicketZip()">下載全部票券 ZIP</button>
      <button class="btn btn-sub" style="width:100%" onclick="uploadTicketsToDrive(false)">補缺到雲端</button>
      <button class="btn btn-ghost" style="width:100%" onclick="uploadTicketsToDrive(true)">重新覆蓋全部</button>
      <div class="ticket-progress" id="ticket-progress"><div id="ticket-progress-fill"></div></div>
      <div class="ticket-member-note" id="ticket-summary">尚未同步名單。</div>
    </div>

    <div class="card" id="ticket-preview-card" style="display:none">
      <h2>票券預覽</h2>
      <div class="ticket-preview-wrap" id="ticket-preview-list"></div>
    </div>
  `;
}

function handleTicketBgUpload(input) {
  const file = input && input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      ticketState.bgImage = img;
      ticketState.bgName = file.name;
      const el = document.getElementById('ticket-summary');
      if (el) el.innerHTML = `已選票券底圖：${esc(file.name)}<br>` + (ticketState.stats ? buildTicketSummaryHtml(ticketState.stats) : '尚未同步名單。');
      if (ticketState.members.length) renderTicketPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function buildTicketSummaryHtml(stats) {
  stats = stats || {};
  return `
    <div class="ticket-stat-grid">
      <div class="ticket-stat"><strong>${Number(stats.total || 0)}</strong><span>可產生</span></div>
      <div class="ticket-stat"><strong>${Number(stats.existingCode || 0)}</strong><span>保留 CODE</span></div>
      <div class="ticket-stat"><strong>${Number(stats.newCode || 0)}</strong><span>新產生</span></div>
    </div>
    排除取消：${Number(stats.cancelled || 0)} 人<br>
    CODE 規則：不同活動不同 CODE；同活動已存在者保留舊 CODE，新人才補新 CODE。
  `;
}

async function syncTicketMembers() {
  const code = normalizeCode(val('ticket-course-select'));
  if (!code) return showBoxMsg('ticket-msg', '請先選擇活動。', 'err');
  clearBoxMsg('ticket-msg');
  showActionLock('正在同步票券名單', '請稍候，正在同步報名名單並補 CODE。');
  showBoxMsg('ticket-msg', '同步中，請稍候...', 'info');
  try {
    const data = await post('syncTicketQrFromRegistrations', { userId, eventCode: code }, 30000);
    if (!data || data.status !== 'ok') throw new Error((data && data.message) || '同步失敗');
    ticketState.course = data.course || null;
    ticketState.members = data.members || [];
    ticketState.stats = data.stats || {};
    mergeCourseToState(data.course);
    clearBoxMsg('ticket-msg');
    document.getElementById('ticket-summary').innerHTML = buildTicketSummaryHtml(ticketState.stats);
    await renderTicketPreview();
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '同步失敗', 'err');
  } finally {
    hideActionLock();
  }
}

function ticketSafeName(text) {
  return String(text || '')
    .replace(/[\\/:*?"<>|]/g, '')
    .replace(/\s+/g, '')
    .trim() || '未命名';
}

function ticketInfo() {
  const c = ticketState.course || {};
  return {
    eventName: c.eventName || '活動名稱',
    session: c.session || '',
    ticketType: c.ticketType || '',
    displayDate: c.dateTime || c.displayDate || ''
  };
}

function drawTicketBuiltinBg(ctx, W, topH) {
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(0, 0, W, topH);
  ctx.save();
  ctx.globalAlpha = .07;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(W*.1, topH*.35, 160, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W*.75, topH*1.15, 210, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = .04;
  for (let i=0; i<14; i++) ctx.fillRect(W*.28+i*28, -20, 14, topH+40);
  ctx.restore();
}

function ticketRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function ticketWrapText(ctx, text, x, y, maxW, lh, maxLines) {
  const chars = String(text || '').split('');
  let line = '', lines = [];
  chars.forEach(c => {
    const t = line + c;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = c; }
    else line = t;
  });
  if (line) lines.push(line);
  lines.slice(0, maxLines || 2).forEach((l,i) => ctx.fillText(l, x, y+i*lh));
}

function ticketQrImage(code) {
  return new Promise(resolve => {
    const container = document.createElement('div');
    container.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(container);
    try {
      new QRCode(container, { text: String(code || ''), width: 260, height: 260, colorDark:'#000000', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.M });
      const el = container.querySelector('canvas') || container.querySelector('img');
      if (!el) { document.body.removeChild(container); resolve(null); return; }
      if (el.tagName === 'CANVAS') {
        const img = new Image();
        img.onload = () => { document.body.removeChild(container); resolve(img); };
        img.src = el.toDataURL();
      } else {
        if (el.complete) { document.body.removeChild(container); resolve(el); }
        else { el.onload = () => { document.body.removeChild(container); resolve(el); }; el.onerror = () => { document.body.removeChild(container); resolve(null); }; }
      }
    } catch(e) { document.body.removeChild(container); resolve(null); }
  });
}

async function drawTicketCanvas(canvas, person, info) {
  await ensureTicketScripts();
  const W = 560, H = 1240, topH = 420, px = 40;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0d1f33';
  ctx.fillRect(0, 0, W, topH);
  if (ticketState.bgImage) {
    const img = ticketState.bgImage;
    const scale = Math.min(W / img.width, topH / img.height);
    const dw = img.width * scale, dh = img.height * scale;
    ctx.drawImage(img, 0, 0, img.width, img.height, (W-dw)/2, (topH-dh)/2, dw, dh);
  } else {
    drawTicketBuiltinBg(ctx, W, topH);
  }

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, topH, W, H-topH);
  ctx.fillStyle = '#1a3a5c';
  ctx.fillRect(px, topH + 24, W - px*2, 3);

  ctx.textAlign = 'center';
  ctx.font = '900 34px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ticketWrapText(ctx, info.eventName, px, topH + 72, W - px*2, 42, 2);

  const sub = [info.displayDate, info.session, info.ticketType].filter(Boolean).join('  ·  ');
  if (sub) {
    ctx.font = '600 18px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#4f5964';
    ctx.fillText(sub, W/2, topH + 140);
  }

  const qrSize = Math.round(W * 0.70);
  const qrX = Math.round((W - qrSize) / 2);
  const qrY = topH + 168;
  ctx.fillStyle = '#f7f7f7';
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.fill();
  ctx.strokeStyle = '#ebebeb'; ctx.lineWidth = 1;
  ticketRoundRect(ctx, qrX-8, qrY-8, qrSize+16, qrSize+16, 12);
  ctx.stroke();
  const qrImg = await ticketQrImage(person.code);
  if (qrImg) ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

  const codeBaseY = qrY + qrSize + 28;
  ctx.font = '700 36px "Courier New", monospace';
  ctx.fillStyle = '#1a1a2e';
  ctx.textAlign = 'center';
  ctx.fillText(String(person.code || '').toUpperCase(), W/2, codeBaseY + 32);

  ctx.strokeStyle = '#eeeeee'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px*2, codeBaseY + 50); ctx.lineTo(W - px*2, codeBaseY + 50); ctx.stroke();

  const nameY = codeBaseY + 100;
  ctx.font = '900 46px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText(person.name || '', W/2, nameY);

  const flockLabel = '小組：' + (person.flock || '—');
  ctx.font = '700 20px "Noto Sans TC", sans-serif';
  const fpw = ctx.measureText(flockLabel).width + 48, fph = 42, fpx = (W - fpw) / 2, fpy = nameY + 20;
  ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)'; ctx.lineWidth = 1.5;
  ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.fill(); ticketRoundRect(ctx, fpx, fpy, fpw, fph, 21); ctx.stroke();
  ctx.fillStyle = '#1a3a5c';
  ctx.fillText(flockLabel, W/2, fpy + 28);

  if (person.group) {
    const groupLabel = String(person.group || '').trim();
    ctx.font = '700 20px "Noto Sans TC", sans-serif';
    const gpw = ctx.measureText(groupLabel).width + 48, gph = 42, gpx = (W - gpw) / 2, gpy = fpy + fph + 16;
    ctx.fillStyle = 'rgba(26,58,92,.09)'; ctx.strokeStyle = 'rgba(26,58,92,.20)';
    ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.fill(); ticketRoundRect(ctx, gpx, gpy, gpw, gph, 21); ctx.stroke();
    ctx.fillStyle = '#1a3a5c';
    ctx.fillText(groupLabel, W/2, gpy + 28);
  }
}

async function renderTicketPreview() {
  if (!ticketState.members.length) {
    return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  }
  showActionLock('正在產生票券預覽', '請稍候，正在繪製前兩張票券。');
  try {
    await ensureTicketScripts();
    const holder = document.getElementById('ticket-preview-list');
    const card = document.getElementById('ticket-preview-card');
    if (!holder || !card) return;
    holder.innerHTML = '';
    card.style.display = 'block';
    const info = ticketInfo();
    const sample = ticketState.members.slice(0,2);
    for (let i = 0; i < sample.length; i++) {
      const m = sample[i];
      setActionLockProgress(Math.round((i / Math.max(1, sample.length)) * 80) + 12, '正在產生票券預覽', '請稍候，正在繪製前兩張票券。');
      const wrap = document.createElement('div');
      wrap.className = 'ticket-preview-card';
      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);
      holder.appendChild(wrap);
      await drawTicketCanvas(canvas, m, info);
    }
    setActionLockProgress(100, '票券預覽完成', '已完成前兩張票券預覽。');
  } finally {
    hideActionLock();
  }
}

async function downloadTicketZip() {
  if (!ticketState.members.length) return showBoxMsg('ticket-msg', '請先同步報名名單。', 'err');
  showActionLock('正在產生票券 ZIP', '請稍候，正在逐張產生票券。');
  let progress = null;
  let fill = null;

  try {
    await ensureTicketScripts();
    progress = document.getElementById('ticket-progress');
    fill = document.getElementById('ticket-progress-fill');
    if (progress) progress.classList.add('on');
    if (fill) fill.style.width = '0%';
    clearBoxMsg('ticket-msg');
    showBoxMsg('ticket-msg', '正在產生票券...', 'info');

    const zip = new JSZip();
    const canvas = document.createElement('canvas');
    const info = ticketInfo();
    const used = {};

    for (let i = 0; i < ticketState.members.length; i++) {
      const m = ticketState.members[i];
      await drawTicketCanvas(canvas, m, info);
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      let base = ticketSafeName(m.flock || '雁群') + '_' + ticketSafeName(m.name || '姓名');
      let fname = base + '.png';
      if (used[fname]) {
        used[fname]++;
        fname = base + '_' + used[fname] + '.png';
      } else {
        used[fname] = 1;
      }
      zip.file(fname, blob);
      const pct = Math.round((i+1)/ticketState.members.length*92);
      if (fill) fill.style.width = pct + '%';
      setActionLockProgress(pct, '正在產生票券 ZIP', `已完成 ${i + 1} / ${ticketState.members.length} 張票券。`);
      await new Promise(r => setTimeout(r, 8));
    }

    setActionLockProgress(96, '正在打包票券 ZIP', '票券已產生，正在打包下載檔。');
    const content = await zip.generateAsync({ type: 'blob' });
    const zipName = '雁群票券_' + ticketSafeName(info.eventName) + (info.session ? '_' + ticketSafeName(info.session) : '') + '.zip';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = zipName;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    setActionLockProgress(100, '票券 ZIP 已產生', '下載已開始。');
    showBoxMsg('ticket-msg', '票券 ZIP 已產生。', 'ok');
  } catch(e) {
    showBoxMsg('ticket-msg', e.message || '產生失敗', 'err');
  } finally {
    if (progress) progress.classList.remove('on');
    if (fill) fill.style.width = '0%';
    hideActionLock();
  }
}

body{font-family:'Noto Sans TC',sans-serif;background:#f5f2eb;color:#2a2620;min-height:100vh}
body.share-mode{background:#f8efe9}
body.share-mode .hd{background:#174b34}
body.share-mode .hd small:after{content:'｜分享入口'}
body.share-mode .wrap{max-width:820px}
body.share-mode .share-entry-actions{grid-template-columns:minmax(220px,420px);justify-content:center}
.hd{background:linear-gradient(135deg,#2d5a3d,#1f3f2c);color:#fff;padding:18px 18px 16px;position:sticky;top:0;z-index:5;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.hd-home{display:inline-block;cursor:pointer;border-radius:10px;padding:2px 4px;margin:-2px -4px;max-width:calc(100% - 98px)}
.hd-home:focus-visible{outline:2px solid rgba(255,255,255,.9);outline-offset:3px}
.hd small{display:block;color:#c8ddc2;font-size:11px;letter-spacing:.12em;margin-bottom:4px}
.hd h1{font-size:20px;font-weight:900;line-height:1.35}
.wrap{padding:16px;max-width:760px;margin:0 auto 40px}
.wrap.wide{max-width:1360px}
.card{background:#fff;border:1px solid rgba(45,90,61,.12);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.045)}
.card h2{font-size:17px;color:#2d5a3d;margin-bottom:12px;line-height:1.4}
.section-title{font-size:13px;font-weight:900;color:#2d5a3d;margin:16px 0 8px;letter-spacing:.05em}
.field{margin-bottom:12px}
label{display:block;font-size:12px;color:#6f6a60;margin-bottom:5px;font-weight:700}
input,select,textarea{width:100%;border:1px solid #ddd;border-radius:12px;padding:12px 12px;font-family:'Noto Sans TC',sans-serif;font-size:15px;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:#2d5a3d;box-shadow:0 0 0 3px rgba(45,90,61,.08)}
textarea{min-height:90px;resize:vertical;line-height:1.6}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{width:100%;border:none;border-radius:13px;padding:13px 14px;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:900;cursor:pointer;text-align:center;text-decoration:none;display:inline-block}
.btn-main{background:#2d5a3d;color:#fff}
.btn-sub{background:#e8f0ea;color:#2d5a3d}
.btn-warn{background:#fef6e4;color:#7a4f0f}
.btn-line{background:#06c755;color:#fff}
.btn-ghost{background:#fff;color:#2d5a3d;border:1px solid rgba(45,90,61,.25)}
.btn + .btn{margin-top:8px}
.msg{padding:12px;border-radius:12px;margin-bottom:12px;font-size:14px;line-height:1.6;display:none}
.msg.on{display:block}
.msg.ok{background:#edf7ee;color:#1f4d2c;border:1px solid #a8d5a2}
.msg.err{background:#fdf0f0;color:#7a2020;border:1px solid #d4a0a0}
.msg.info{background:#f6f3ea;color:#6a5a30;border:1px solid #e2d7b4}
.msg.warn{background:#fff8e8;color:#6f4b12;border:1px solid #e6c987}
.loading{padding:42px 16px;text-align:center;color:#777;font-size:14px}
.loading-card{max-width:360px;margin:0 auto;background:#fff;border:1px solid rgba(45,90,61,.12);border-radius:18px;padding:22px 18px;box-shadow:0 3px 12px rgba(0,0,0,.045)}
.loading-ring{width:42px;height:42px;border-radius:50%;border:4px solid #e8f0ea;border-top-color:#2d5a3d;margin:0 auto 12px;animation:spin .85s linear infinite}
.loading-logo{width:64px;height:64px;margin:0 auto 12px;background-image:var(--loading-logo-image);background-size:contain;background-repeat:no-repeat;background-position:center}
.loading-logo-large{width:82px;height:82px;margin-bottom:14px}
.loading-title{font-weight:900;color:#2d5a3d;margin-bottom:8px}
.loading-bar{height:8px;border-radius:999px;background:#e8f0ea;overflow:hidden;margin:10px 0 6px}
.loading-bar i{display:block;height:100%;width:8%;background:#2d5a3d;border-radius:999px;transition:width .25s ease}
.loading-percent{font-size:12px;color:#888}
.action-lock,.dialog-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:60;display:none;align-items:center;justify-content:center;padding:18px}
.action-lock.on,.dialog-backdrop.on{display:flex}
.action-lock-card,.dialog-panel{width:min(420px,calc(100vw - 36px));background:#fff;border-radius:18px;border:1px solid rgba(45,90,61,.14);box-shadow:0 18px 58px rgba(0,0,0,.28);padding:20px;text-align:center}
.action-lock-title,.dialog-title{font-size:19px;font-weight:900;color:#2d5a3d;margin-bottom:8px}
.action-lock-text,.dialog-text{font-size:14px;line-height:1.7;color:#6f6a60;margin-bottom:12px}
.action-lock-bar{height:8px;border-radius:999px;background:#e8f0ea;overflow:hidden;margin-top:12px}
.action-lock-bar i{display:block;height:100%;width:8%;border-radius:999px;background:#2d5a3d;transition:width .25s ease}
.action-lock-percent{font-size:12px;color:#888;margin-top:8px}
.dialog-panel{text-align:left}
.dialog-panel textarea{min-height:118px}
.dialog-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.dialog-error{display:none;margin-top:8px;font-size:13px;color:#7a2020;font-weight:800}
.dialog-error.on{display:block}
.inline-loading{height:44px;border:1px solid #eadfce;border-radius:12px;background:#fbfaf6;overflow:hidden;position:relative;margin-bottom:12px}
.inline-loading:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(45,90,61,.12) 35%,rgba(45,90,61,.28) 50%,rgba(45,90,61,.12) 65%,transparent 100%);transform:translateX(-100%);animation:slideLoading 1.2s ease-in-out infinite}
@keyframes slideLoading{to{transform:translateX(100%)}}
@keyframes spin{to{transform:rotate(360deg)}}
.top-actions{display:flex;flex-wrap:nowrap;gap:8px;margin-bottom:14px;align-items:stretch}
.top-actions .btn{width:auto;flex:1 1 0;min-width:0;padding:10px 8px;font-size:13px;border-radius:12px;white-space:nowrap}
.top-actions .btn + .btn{margin-top:0}
.top-actions.single .btn{max-width:100%}
.top-actions .icon-only{flex:0 0 42px;width:42px;min-width:42px;padding:0;font-size:18px;line-height:1}
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,380px));gap:14px;align-items:start;justify-content:start}
.course-card{background:#fff;border:1px solid rgba(45,90,61,.12);border-radius:18px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.045);display:flex;flex-direction:column;min-height:100%}
.course-img{width:100%;height:auto;max-height:none;background:#f7f4ed;object-fit:contain;display:block}
.course-img.placeholder{height:180px}
.course-body{padding:14px;display:flex;flex-direction:column;flex:1}
.course-head{display:grid;grid-template-columns:minmax(0,1fr) 42px;gap:8px;align-items:start;margin-bottom:8px}
.course-title{font-size:18px;font-weight:900;color:#2d5a3d;line-height:1.35;min-height:48px}
.share-btn{width:42px;height:42px;border:none;border-radius:12px;background:#e8f0ea;color:#2d5a3d;cursor:pointer;display:grid;place-items:center}
.share-btn svg{width:24px;height:24px;display:block;stroke:currentColor;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.share-btn:disabled{opacity:.55;cursor:wait}
.share-link-box{display:block;margin-top:8px;padding:10px;border-radius:10px;background:#fff;border:1px solid rgba(45,90,61,.18);color:#2d5a3d;word-break:break-all;font-size:13px;line-height:1.5}
.share-copy-row{margin-top:8px;display:grid;grid-template-columns:1fr;gap:8px}
.meta{font-size:13px;color:#666;line-height:1.75}
.meta b{color:#2d5a3d}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.badge{display:inline-block;padding:4px 9px;border-radius:999px;background:#e8f0ea;color:#2d5a3d;font-size:12px;font-weight:800}
.badge.red{background:#fdf0f0;color:#a72828}
.badge.yellow{background:#fef6e4;color:#7a4f0f}
.badge.gray{background:#eee;color:#666}
.course-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:auto;padding-top:12px}
.course-actions.admin{grid-template-columns:1fr 1fr}
.course-actions .btn{padding:11px 8px;font-size:13px}
.detail-hero{width:100%;border-radius:16px;margin-bottom:14px;background:#e7e2d7;max-height:420px;object-fit:cover}
.desc{font-size:14px;color:#4f4a43;line-height:1.85;white-space:pre-wrap}
.divider{height:1px;background:#eee;margin:14px 0}
.category-row{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(82px,.8fr) 38px;gap:8px;align-items:end;margin-bottom:8px}
.custom-field-row{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(96px,.55fr) minmax(92px,.55fr) minmax(0,1fr) 38px;gap:8px;align-items:end;margin-bottom:8px}
.course-form-card{padding:18px 16px}
.course-form-card > h2{text-align:center;font-size:20px;margin-bottom:14px}
.course-form-card .mini-section{background:transparent;border:0;border-radius:0;padding:16px 0 0;margin:16px 0 0;border-top:1px solid #ede7dc}
.course-form-card .mini-section:first-of-type{border-top:0;padding-top:0;margin-top:0}
.course-form-card .section-title{font-size:16px;margin:0 0 12px;letter-spacing:0;display:flex;align-items:center;gap:8px}
.course-form-card .section-title:before{content:"";width:4px;height:18px;border-radius:999px;background:#2d5a3d;display:inline-block}
.course-form-card .form-grid .field,.course-form-card .field-setting-grid .field{margin-bottom:0}
.course-form-card .fold{background:transparent;border:0;border-top:1px solid #ede7dc;border-radius:0;margin:16px 0 0;padding:14px 0 0}
.course-form-card .fold summary{background:transparent;padding:0 0 12px;font-size:16px}
.course-form-card .fold-content{padding:0}
.course-form-card .edm-upload{background:transparent}
.field-setting-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
.custom-field-tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.custom-field-empty{padding:12px 0;border-top:1px solid #eee7da;border-bottom:1px solid #eee7da}
.course-form-card .custom-field-row{display:block;border-top:1px solid #eee7da;padding:14px 0;margin:0;background:transparent}
.custom-field-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.custom-field-title{font-weight:900;color:#2d5a3d;font-size:15px}
.custom-field-body{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(120px,.55fr) minmax(120px,.55fr);gap:10px;align-items:end}
.custom-field-body .options{grid-column:1 / -1}
.custom-field-options{min-height:76px}
.icon-btn{border:none;border-radius:11px;background:#f3eeee;color:#9a3333;font-weight:900;height:43px;cursor:pointer}
.custom-field-head .icon-btn{width:38px;height:38px;flex:0 0 38px}
.success-box{text-align:left;font-size:14px;line-height:1.9;color:#4f4a43}
.muted{font-size:12px;color:#888;line-height:1.6}
.edm-upload{border:1px dashed rgba(45,90,61,.35);background:#fbfaf6;border-radius:14px;padding:12px}
.edm-preview{margin-top:10px;border-radius:14px;overflow:hidden;border:1px solid #eee;background:#fff}
.edm-preview img{width:100%;display:block;max-height:280px;object-fit:cover}
.edm-info{padding:10px;font-size:12px;color:#666;line-height:1.6}
.file-input{padding:10px;background:#fff}
.price-box{background:#edf7ee;border:1px solid #b9d8bf;color:#1f4d2c;border-radius:14px;padding:12px;font-weight:900;text-align:center;margin:10px 0}
.admin-course-row{background:#fafafa;border:1px solid #eee;border-radius:14px;padding:12px;margin-bottom:10px}
.inline-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.confirm-panel{text-align:center;padding:22px 20px 18px}
.confirm-panel .dialog-title{font-size:20px;margin-bottom:10px}
.confirm-panel .dialog-text{font-size:15px;color:#4f4a43;line-height:1.75;margin-bottom:16px}
.past-course-list{display:grid;gap:8px;margin-top:12px}
.past-course-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;border:1px solid #eee7da;border-radius:13px;background:#fff;padding:10px}
.past-course-main{min-width:0}
.past-course-title{font-size:14px;font-weight:900;color:#2d5a3d;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.past-course-meta{font-size:11px;color:#777;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.past-course-actions{display:grid;grid-template-columns:56px 56px 56px;gap:6px;align-items:center}
.past-course-actions .btn{padding:8px 6px;font-size:12px;border-radius:10px}
.past-course-actions .btn + .btn{margin-top:0}
.past-course-status{font-size:11px;padding:4px 8px;border-radius:999px;background:#eee;color:#666;font-weight:900;justify-self:start}
.readonly-box{background:#f7f7f7;border:1px solid #e0e0e0;border-radius:12px;padding:12px;font-size:15px;color:#333}
.quick-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compact-card{padding:14px}
.time-clock-grid{display:grid;grid-template-columns:1fr;gap:8px}
.date-time-clock{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.clock-display{width:100%;border:1px solid #ddd;border-radius:13px;background:#fff;color:#2a2620;padding:13px 14px;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:800;text-align:left;cursor:pointer;min-height:48px}
.clock-display:after{content:'◷';float:right;color:#2d5a3d;font-weight:900}
.clock-display.empty{color:#777;font-weight:700}
.clock-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:30;display:none;align-items:center;justify-content:center;padding:18px}
.clock-backdrop.on{display:flex}
.clock-panel{width:min(360px,calc(100vw - 36px));background:#fff;border-radius:20px;box-shadow:0 16px 54px rgba(0,0,0,.28);padding:16px;border:1px solid rgba(45,90,61,.15)}
.clock-title{text-align:center;color:#2d5a3d;font-size:18px;font-weight:900;margin-bottom:10px}
.clock-value{text-align:center;font-size:30px;font-weight:900;color:#1f4d2c;line-height:1.1;margin-bottom:12px}
.clock-period{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.clock-period button,.clock-minute button,.clock-actions button{border:none;border-radius:12px;padding:10px;font-family:'Noto Sans TC',sans-serif;font-weight:900;cursor:pointer;background:#e8f0ea;color:#2d5a3d}
.clock-period button.on,.clock-minute button.on{background:#2d5a3d;color:#fff}
.clock-face{position:relative;width:220px;height:220px;border-radius:50%;background:#f7f4ed;border:1px solid #eadfce;margin:0 auto 14px}
.clock-face:before{content:'';position:absolute;left:50%;top:50%;width:8px;height:8px;border-radius:50%;background:#2d5a3d;transform:translate(-50%,-50%)}
.clock-hour{position:absolute;width:42px;height:42px;margin:-21px 0 0 -21px;border:none;border-radius:50%;background:#fff;color:#2a2620;font-family:'Noto Sans TC',sans-serif;font-weight:900;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer}
.clock-hour.on{background:#2d5a3d;color:#fff}
.clock-minute{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.clock-minute button{padding:8px 0;border-radius:10px}
.clock-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.clock-actions .ghost{background:#fff;border:1px solid rgba(45,90,61,.22)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:end}
.form-grid .full{grid-column:1 / -1}
.form-grid .field{margin-bottom:0}
.mini-section{background:#fbfaf6;border:1px solid #eee7da;border-radius:16px;padding:12px;margin:12px 0}
.mini-section .section-title{margin-top:0}
.searchbar{margin-bottom:12px}
.searchbar input{background:#fffdf8;border:1px solid #ded5c5}
.fold{border:1px solid #eee7da;border-radius:16px;background:#fbfaf6;padding:0;margin:12px 0;overflow:hidden}
.fold summary{list-style:none;cursor:pointer;padding:13px 14px;font-weight:900;color:#2d5a3d;background:#f7f2e8}
.fold summary::-webkit-details-marker{display:none}
.fold-content{padding:12px}
.tiny-meta{font-size:12px;color:#777;line-height:1.6;margin-top:4px}
.compact-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}


.menu-btn{position:absolute;right:18px;top:50%;transform:translateY(-50%);width:58px;height:58px;border:none;border-radius:18px;background:rgba(255,255,255,.16);color:#fff;font-size:34px;font-weight:900;line-height:1;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);cursor:pointer}
.hd{padding-right:92px}
.menu-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:20;display:none}
.menu-backdrop.on{display:block}
.side-menu{position:fixed;right:14px;top:86px;width:min(310px,calc(100vw - 28px));background:#fff;border-radius:20px;box-shadow:0 14px 48px rgba(0,0,0,.25);z-index:21;display:none;overflow:hidden;border:1px solid rgba(45,90,61,.12)}
.side-menu.on{display:block}
.menu-head{background:#f5f2eb;padding:16px;color:#2d5a3d;font-weight:900;font-size:16px;border-bottom:1px solid #ece5d8}
.menu-list{padding:10px}
.menu-item{width:100%;border:none;background:#fff;text-align:left;padding:14px 14px;border-radius:14px;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:900;color:#2d5a3d;cursor:pointer}
.menu-item:hover,.menu-item:active{background:#edf7ee}
.menu-note{font-size:12px;color:#777;line-height:1.6;padding:0 14px 12px}
.class-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.class-choice{border:1px solid #ddd;background:#fff;border-radius:15px;padding:13px 10px;text-align:center;font-family:'Noto Sans TC',sans-serif;cursor:pointer;color:#2a2620;min-height:68px}
.class-choice.on{border-color:#2d5a3d;background:#edf7ee;color:#1f4d2c;box-shadow:0 0 0 3px rgba(45,90,61,.08)}
.class-choice.locked,.class-choice[disabled]{opacity:.45;cursor:not-allowed}
.class-choice-name{font-size:16px;font-weight:900;line-height:1.35;word-break:break-word}
.class-choice-price{font-size:13px;color:#6f6a60;margin-top:3px;font-weight:800}
.class-choice.on .class-choice-price{color:#2d5a3d}

#r-name{font-size:18px;font-weight:700}
.submit-sticky{position:sticky;bottom:10px;z-index:4;box-shadow:0 6px 18px rgba(0,0,0,.18)}
.btn[disabled]{opacity:.55;cursor:not-allowed}
.hide{display:none!important}

.ticket-toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.ticket-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.ticket-stat{background:#f5f2eb;border:1px solid #eadfce;border-radius:14px;padding:10px;text-align:center}
.ticket-stat strong{display:block;color:#2d5a3d;font-size:20px;line-height:1.1}
.ticket-stat span{font-size:11px;color:#777}
.ticket-preview-wrap{display:grid;grid-template-columns:1fr;gap:14px;margin-top:12px}
.ticket-preview-card{background:#f7f4ed;border:1px solid #eadfce;border-radius:16px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.08)}
.ticket-preview-card canvas{display:block;width:100%;height:auto}
.ticket-member-note{font-size:12px;color:#777;line-height:1.7;background:#faf8f3;border:1px solid #eee3d4;border-radius:14px;padding:10px;margin-top:8px}
.ticket-progress{display:none;margin-top:10px;background:#f5f2eb;border-radius:999px;height:8px;overflow:hidden}
.ticket-progress.on{display:block}
.ticket-progress > div{height:100%;width:0;background:#2d5a3d;transition:width .15s}
.ticket-small{font-size:12px;color:#777;line-height:1.7}
.import-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.import-stat{background:#f7f4ed;border:1px solid #eadfce;border-radius:12px;padding:10px;text-align:center}
.import-stat strong{display:block;color:#2d5a3d;font-size:20px;line-height:1.1}
.import-stat span{font-size:11px;color:#777}
.import-table-wrap{overflow:auto;margin-top:12px;border:1px solid #eee;border-radius:12px}
.import-table{width:100%;border-collapse:collapse;font-size:12px;min-width:760px}
.import-table th,.import-table td{padding:9px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}
.import-table th{background:#faf8f3;color:#555;font-weight:700}
.import-status-ok{color:#2d7d46;font-weight:700}
.import-status-duplicate,.import-status-error{color:#b23b3b;font-weight:700}
.roster-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.roster-stat{background:#f7f4ed;border:1px solid #eadfce;border-radius:10px;padding:8px;text-align:center}
.roster-stat strong{display:block;color:#2d5a3d;font-size:18px;line-height:1.1}
.roster-stat span{font-size:11px;color:#777}
.roster-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.roster-tabs .btn{padding:10px 6px;border-radius:12px;font-size:14px}
.roster-tabs .btn.on{background:#2d5a3d;color:#fff}
.roster-list-total{display:flex;justify-content:space-between;gap:8px;align-items:center;margin:8px 0 10px;padding:8px 10px;border:1px solid #eadfce;border-radius:10px;background:#fbfaf6;color:#2d5a3d;font-weight:900;font-size:13px}
.roster-list-total span{white-space:nowrap}
.roster-group{border:1px solid #eee7da;border-radius:10px;background:#fff;margin:8px 0;overflow:hidden}
.roster-group-head{display:grid;grid-template-columns:minmax(120px,.75fr) minmax(0,1.25fr);gap:10px;align-items:center;padding:10px 12px;background:#f7f4ed;color:#2d5a3d;font-weight:900;font-size:13px}

<div class="hd">
  <div class="hd-home" role="button" tabindex="0" onclick="goHomeFromHeader()" onkeydown="handleHeaderHomeKey(event)" aria-label="返回報名課程首頁">
    <small>CYP135 課程系統 V6.58</small>
    <h1 id="page-title">課程報名</h1>
  </div>
  <button class="menu-btn" style="display:none" onclick="toggleMenu(true)" aria-label="開啟選單">☰</button>
</div>
<div id="menu-backdrop" class="menu-backdrop" onclick="toggleMenu(false)"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzlEBM9PCjfGW-QC3w0ILIaQ9-yjvPPLnLxzT_5QD-zjsjSbnpEQcgDg6uyNvjd1vIt/exec';

let userId = '';
let displayName = '';
let initData = null;
let currentCourse = null;
let selectedLeader = '';
let memberIndex = {};
let registrationIndex = {};
let isCurrentNameDuplicate = false;
let isSubmittingRegistration = false;
let editingCourseCode = '';
let currentCourseData = null;
let lookupTimer = null;
let publicData = null;
let adminCourseData = [];
let isAdminUser = false;
let canViewRoster = false;
let selectedClassType = '';
let lockedClassType = '';
let lookupCache = {};
let lastLookupSeq = 0;
let activeClockTarget = '';
let activeClockHour = 9;
let activeClockMinute = 0;

let loadingSeq = 0;

let uploadedEdmUrl = '';

let externalImportState = { step: 1, rows: [], preview: null, fileName: '', eventCode: '', meta: null, grid: null, columns: null };
let excelParserLoading = null;

let rosterState = { course: null, rows: [], groups: [], stats: null, view: 'grouped', query: '', classDetails: [], leaders: [], canManage: false, scopeText: '', scopeFlocks: [], add: null, loading: false, openAdd: false };
let isSharedEntry = false;
let sharedCourseToken = '';

let ticketState = { course: null, members: [], stats: null, bgImage: null, bgName: '' };

const PUBLIC_CACHE_KEY = 'cyp135_public_courses_v96';
const ADMIN_CACHE_KEY = 'cyp135_admin_init_v67';
const ROSTER_CACHE_PREFIX = 'cyp135_course_roster_v93_';
let currentView = '';
let appState = {
  courses: [],
  courseMap: {},
  publicLoaded: false,
  publicLoading: null,
  registrationInitByCode: {},
  lastPublicRefresh: 0
};

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.className = 'msg on ' + (type || 'info');
  el.innerHTML = text;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
  el.innerHTML = '';
}

function showBoxMsg(id, text, type) {
  const el = document.getElementById(id);
  if (!el) return showMsg(text, type);
  el.className = 'msg on ' + (type || 'info');
  el.innerHTML = text;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function clearBoxMsg(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'msg';
  el.innerHTML = '';
}

function showFormMsg(text, type) {
  showBoxMsg('course-form-msg', text, type);
}

function clearFormMsg() {
  clearBoxMsg('course-form-msg');
}

function showRegisterMsg(text, type) {
  showBoxMsg('registration-result', text, type);
}

function clearRegisterMsg() {
  clearBoxMsg('registration-result');
}

function userCanManageRoster() {
  if (isSharedEntry) return false;
  const audit = (publicData && publicData.permissionAudit) || {};
  if (typeof audit.canManageRoster !== 'undefined') return !!audit.canManageRoster;
  return !!(publicData && publicData.canManageRoster);
}

function val(id) {
  return (document.getElementById(id) || {value:''}).value.trim();
}

function esc(input) {
  return (input === undefined || input === null ? '' : String(input))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function post(action, payload, timeoutMs) {
  payload = payload || {};
  payload.action = action;
  timeoutMs = timeoutMs || 18000;

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);

  return fetch(GAS, {
    method: 'post',
    body: JSON.stringify(payload),
    signal: controller.signal
  }).then(async r => {
    clearTimeout(timer);
    const text = await r.text();
    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error('後端回傳非 JSON，前 200 字：' + text.slice(0, 200));
    }
  }).catch(err => {
    clearTimeout(timer);
    if (err && err.name === 'AbortError') {
      throw new Error('讀取時間過久，請重新開啟頁面或稍後再試。');
    }
    throw err;
  });
}



function normalizeCode(code) {
  return String(code || '').trim().toUpperCase();
}

function rebuildCourseMap() {
  appState.courseMap = {};
  (appState.courses || []).forEach(c => {
    const code = normalizeCode(c.eventCode);
    if (code) appState.courseMap[code] = c;
  });
}

function setPublicData(data, fromCache) {
  if (!data || data.status !== 'ok') return;
  publicData = data;
  appState.courses = (data.courses || []).map(c => reconcileCourseStatus(Object.assign({}, c)));
  publicData.courses = appState.courses;
  appState.publicLoaded = true;
  appState.lastPublicRefresh = Date.now();
  rebuildCourseMap();
  const audit = data.permissionAudit || {};
  if (typeof audit.canManageCourses !== 'undefined') isAdminUser = !!audit.canManageCourses;
  else if (typeof data.isAdmin !== 'undefined') isAdminUser = !!data.isAdmin;
  if (typeof audit.canViewRoster !== 'undefined') canViewRoster = !!audit.canViewRoster;
  else canViewRoster = !!(isAdminUser || data.rosterAllowed);
  renderMenu();

  if (!fromCache) {
    try {
      localStorage.setItem(PUBLIC_CACHE_KEY, JSON.stringify({
        savedAt: Date.now(),
        isAdmin: !!data.isAdmin,
        rosterAllowed: !!data.rosterAllowed,
        canManageRoster: !!data.canManageRoster,
        rosterScopeFlocks: data.rosterScopeFlocks || [],
        permissionAudit: data.permissionAudit || null,
        role: data.role || '',
        courses: data.courses || []
      }));
    } catch (e) {}
  }
}

function loadPublicCache() {
  try {
    const text = localStorage.getItem(PUBLIC_CACHE_KEY);
    if (!text) return false;
    const cached = JSON.parse(text);
    if (!cached || !Array.isArray(cached.courses) || !cached.courses.length) return false;
    setPublicData({
      status: 'ok',
      cached: true,
      isAdmin: !!cached.isAdmin,
      rosterAllowed: !!cached.rosterAllowed,
      canManageRoster: !!cached.canManageRoster,
      rosterScopeFlocks: cached.rosterScopeFlocks || [],
      permissionAudit: cached.permissionAudit || null,
      role: cached.role || '',
      courses: cached.courses || []
    }, true);
    return true;
  } catch (e) {
    return false;
  }
}

function beginPage(view, title, wide) {
  const token = ++pageSeq;
  currentView = view;
  setWideLayout(!!wide);
  clearMsg();
  setTitle(title);
  return token;
}

function setSharedEntryMode(on, token) {
  isSharedEntry = !!on;
  sharedCourseToken = on ? String(token || sharedCourseToken || '') : '';
  document.body.classList.toggle('share-mode', isSharedEntry);
  if (isSharedEntry) canViewRoster = false;
}

function isPageActive(token, view) {
  return token === pageSeq && (!view || currentView === view);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function loadingHtml(text) {
  return `
    <div class="loading">
      <div class="loading-card">
        <div class="loading-logo" aria-hidden="true"></div>
        <div class="loading-title">${esc(text || '載入中')}</div>
        <div class="loading-bar"><i id="loading-fill"></i></div>
        <div id="loading-percent" class="loading-percent">8%</div>
      </div>
    </div>
  `;
}

function showLoading(text) {
  const app = document.getElementById('app');
  if (!app) return;
  app.innerHTML = loadingHtml(text);
  const seq = ++loadingSeq;
  let pct = 8;
  if (loadingTimer) clearInterval(loadingTimer);
  loadingTimer = setInterval(() => {
    if (seq !== loadingSeq) return clearInterval(loadingTimer);
    const fill = document.getElementById('loading-fill');
    const label = document.getElementById('loading-percent');
    if (!fill || !label) return clearInterval(loadingTimer);
    pct = Math.min(92, pct + Math.max(1, Math.round((92 - pct) * 0.18)));
    fill.style.width = pct + '%';
    label.textContent = pct + '%';
  }, 260);
}

function stopLoading() {
  loadingSeq++;
  if (loadingTimer) clearInterval(loadingTimer);
  loadingTimer = null;
}

function setActionLockProgress(percent, title, text) {
  const fill = document.getElementById('action-lock-fill');
  const label = document.getElementById('action-lock-percent');
  const titleEl = document.getElementById('action-lock-title');
  const textEl = document.getElementById('action-lock-text');
  const pct = Math.max(0, Math.min(100, Math.round(Number(percent) || 0)));
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = pct + '%';
  if (title && titleEl) titleEl.textContent = title;
  if (text && textEl) textEl.textContent = text;
}

function startActionLockProgress(startAt) {
  const seq = ++actionLockSeq;
  let pct = Math.max(8, Math.min(80, Number(startAt) || 8));
  setActionLockProgress(pct);
  if (actionLockTimer) clearInterval(actionLockTimer);
  actionLockTimer = setInterval(() => {
    if (seq !== actionLockSeq) return clearInterval(actionLockTimer);
    pct = Math.min(92, pct + Math.max(1, Math.round((92 - pct) * 0.16)));
    setActionLockProgress(pct);
  }, 280);
}

function stopActionLockProgress() {
  actionLockSeq++;
  if (actionLockTimer) clearInterval(actionLockTimer);
  actionLockTimer = null;
}

function showActionLock(title, text) {
  const lock = document.getElementById('action-lock');
  const titleEl = document.getElementById('action-lock-title');
  const textEl = document.getElementById('action-lock-text');
  if (!lock) return;
  if (titleEl) titleEl.textContent = title || '處理中';
  if (textEl) textEl.textContent = text || '請稍候，正在更新資料。';
  startActionLockProgress(8);
  lock.classList.add('on');
  document.body.style.overflow = 'hidden';
}

function hideActionLock() {
  stopActionLockProgress();
  const lock = document.getElementById('action-lock');
  if (lock) lock.classList.remove('on');
  document.body.style.overflow = '';
}

function openTextDialog(options) {
  options = options || {};
  return new Promise(resolve => {
    const backdrop = document.getElementById('dialog-backdrop');
    if (!backdrop) return resolve(null);

    backdrop.innerHTML = `
      <div class="dialog-panel" role="dialog" aria-modal="true" aria-labelledby="dialog-title" onclick="event.stopPropagation()">
        <div id="dialog-title" class="dialog-title">${esc(options.title || 'CYP135 票務系統')}</div>
        <div class="dialog-text">${esc(options.message || '請輸入原因')}</div>
        <textarea id="dialog-input" placeholder="${esc(options.placeholder || '請輸入原因')}"></textarea>
        <div id="dialog-error" class="dialog-error">請輸入原因</div>
        <div class="dialog-actions">
          <button type="button" class="btn btn-sub" id="dialog-cancel">取消</button>
          <button type="button" class="btn btn-main" id="dialog-ok">確定</button>
        </div>
      </div>
    `;
    backdrop.classList.add('on');
    document.body.style.overflow = 'hidden';

    const input = document.getElementById('dialog-input');
    const error = document.getElementById('dialog-error');
    const cleanup = value => {
      backdrop.classList.remove('on');
      backdrop.innerHTML = '';
      document.body.style.overflow = '';
      resolve(value);
    };
    const submit = () => {
      const value = (input && input.value ? input.value : '').trim();
      if (options.required !== false && !value) {
        if (error) error.classList.add('on');
        if (input) input.focus();
        return;
      }
      cleanup(value);
    };

    document.getElementById('dialog-cancel').onclick = () => cleanup(null);
    document.getElementById('dialog-ok').onclick = submit;
    backdrop.onclick = () => cleanup(null);
    backdrop.onkeydown = event => {
      if (event.key === 'Escape') cleanup(null);
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') submit();
    };
    setTimeout(() => { if (input) input.focus(); }, 30);
  });
}

function requestCancelReason() {
  return openTextDialog({
    title: 'CYP135 票務系統',
    message: '請輸入原因',
    placeholder: '請輸入取消原因',
    required: true
  });
}

function openConfirmDialog(options) {
  options = options || {};
  return new Promise(resolve => {
    const backdrop = document.getElementById('dialog-backdrop');
    if (!backdrop) return resolve(false);

    backdrop.innerHTML = `
      <div class="dialog-panel confirm-panel" role="dialog" aria-modal="true" aria-labelledby="confirm-title" onclick="event.stopPropagation()">
        <div id="confirm-title" class="dialog-title">${esc(options.title || 'CYP135課程管理')}</div>
        <div class="dialog-text">${esc(options.message || '確認執行這個操作？')}</div>
        <div class="dialog-actions">
          <button type="button" class="btn btn-sub" id="confirm-cancel">${esc(options.cancelText || '取消')}</button>
          <button type="button" class="btn btn-main" id="confirm-ok">${esc(options.okText || '確定')}</button>
        </div>
      </div>
    `;
    backdrop.classList.add('on');
    document.body.style.overflow = 'hidden';

    const cleanup = value => {
      backdrop.classList.remove('on');
      backdrop.innerHTML = '';
      document.body.style.overflow = '';
      resolve(value);
    };

    document.getElementById('confirm-cancel').onclick = () => cleanup(false);
    document.getElementById('confirm-ok').onclick = () => cleanup(true);
    backdrop.onclick = () => cleanup(false);
    backdrop.onkeydown = event => {
      if (event.key === 'Escape') cleanup(false);
      if (event.key === 'Enter') cleanup(true);
    };
    setTimeout(() => {
      const ok = document.getElementById('confirm-ok');
      if (ok) ok.focus();
    }, 30);
  });
}

function inlineLoadingHtml() {
  return '<div class="inline-loading" aria-label="載入中"></div>';
}

function showBoxLoading(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'msg on';
  el.innerHTML = inlineLoadingHtml();
}

function setAdminData(data, fromCache) {
  if (!data || data.status !== 'ok') return data;
  initData = data || {};
  isAdminUser = !!data.allowed;
  canViewRoster = !!(canViewRoster || isAdminUser || data.rosterAllowed);
  adminCourseData = (data && data.courses) || [];
  if (adminCourseData.length) adminCourseData.forEach(mergeCourseToState);
  renderMenu();

  if (!fromCache && data.allowed) {
    try {
      localStorage.setItem(ADMIN_CACHE_KEY, JSON.stringify({
        savedAt: Date.now(),
        status: 'ok',
        allowed: !!data.allowed,
        role: data.role || '',
        courses: data.courses || [],
        options: data.options || {},
        flocks: data.flocks || [],
        platinumNames: data.platinumNames || [],
        leaders: data.leaders || []
      }));
    } catch (e) {}
  }
  return initData;
}

function loadAdminCache() {
  try {
    const text = localStorage.getItem(ADMIN_CACHE_KEY);
    if (!text) return null;
    const cached = JSON.parse(text);
    if (!cached || cached.status !== 'ok' || !cached.allowed || !Array.isArray(cached.courses)) return null;
    return setAdminData(cached, true);
  } catch (e) {
    return null;
  }
}

function getRosterCacheKey(courseCode) {
  return ROSTER_CACHE_PREFIX + normalizeCode(courseCode);
}

function saveRosterCache(courseCode, data) {
  if (!courseCode || !data || data.status !== 'ok') return;
  try {
    localStorage.setItem(getRosterCacheKey(courseCode), JSON.stringify({
      savedAt: Date.now(),
      status: 'ok',
      allowed: !!data.allowed,
      canManage: !!data.canManage,
      course: data.course || null,
      rows: data.rows || [],
      groups: data.groups || [],
      stats: data.stats || {},
      classDetails: data.classDetails || [],
      leaders: data.leaders || [],
      rosterScopeText: data.rosterScopeText || '',
      rosterScopeFlocks: data.rosterScopeFlocks || []
    }));
  } catch (e) {}
}

function loadRosterCache(courseCode) {
  try {
    const text = localStorage.getItem(getRosterCacheKey(courseCode));
    if (!text) return null;
    const cached = JSON.parse(text);
    if (!cached || cached.status !== 'ok' || !cached.course) return null;
    return cached;
  } catch (e) {
    return null;
  }
}

function saveCurrentRosterCache() {
  if (!rosterState.course) return;
  saveRosterCache(rosterState.course.eventCode, {
    status: 'ok',
    allowed: true,
    canManage: rosterState.canManage,
    course: rosterState.course,
    rows: rosterState.rows || [],
    groups: rosterState.groups || [],
    stats: rosterState.stats || {},
    classDetails: rosterState.classDetails || [],
    leaders: rosterState.leaders || [],
    rosterScopeText: rosterState.scopeText || '',
    rosterScopeFlocks: rosterState.scopeFlocks || []
  });
}

function getCourseFromState(courseCode) {
  return appState.courseMap[normalizeCode(courseCode)] || null;
}

function isCoursePublished(c) {
  const status = String((c && (c.publishStatus || c.frontendStatus)) || '').trim();
  return status !== '下架';
}

function isCourseHidden(c) {
  return !isCoursePublished(c);
}

function visibleCoursesOnly(courses) {
  return (courses || []).filter(isCoursePublished);
}

function reconcileCourseStatus(c) {
  if (!c) return c;
  const max = Number(c.maxCount || 0);
  const hasCurrent = c.currentCount !== undefined && c.currentCount !== null && c.currentCount !== '';
  const hasRemaining = c.remainingCount !== undefined && c.remainingCount !== null && c.remainingCount !== '';
  const current = hasCurrent ? Number(c.currentCount || 0) : null;
  const remaining = hasRemaining ? Number(c.remainingCount || 0) : null;
  if (max > 0 && hasCurrent && current >= max) {
    c.statusBadge = '已額滿';
  } else if (c.statusBadge === '已額滿' && ((hasRemaining && remaining > 0) || (hasCurrent && current < max))) {
    c.statusBadge = '報名中';
  }
  return c;
}

function mergeCourseToState(course) {
  if (!course || !course.eventCode) return;
  course = reconcileCourseStatus(Object.assign({}, course));
  const code = normalizeCode(course.eventCode);
  const existsIndex = (appState.courses || []).findIndex(c => normalizeCode(c.eventCode) === code);
  if (existsIndex >= 0) appState.courses[existsIndex] = Object.assign({}, appState.courses[existsIndex], course);
  else appState.courses.unshift(course);
  rebuildCourseMap();
}

function clearCourseClientCache(courseCode) {
  try { localStorage.removeItem(PUBLIC_CACHE_KEY); } catch (e) {}
  try { localStorage.removeItem(ADMIN_CACHE_KEY); } catch (e) {}
  const code = normalizeCode(courseCode);
  if (code) delete appState.registrationInitByCode[code];
  appState.publicLoaded = false;
  appState.lastPublicRefresh = 0;
}

function clearAllCourseClientCaches() {
  try {
    Object.keys(localStorage).forEach(key => {
      if (
        key.indexOf('cyp135_public_courses_') === 0 ||
        key.indexOf('cyp135_admin_init_') === 0 ||
        key.indexOf('cyp135_course_roster_') === 0
      ) {
        localStorage.removeItem(key);
      }
    });
  } catch (e) {}
  appState.courses = [];
  appState.courseMap = {};
  appState.publicLoaded = false;
  appState.publicLoading = null;
  appState.registrationInitByCode = {};
  appState.lastPublicRefresh = 0;
  publicData = null;
  adminCourseData = [];
  rosterState = { course: null, rows: [], groups: [], stats: null, view: 'grouped', query: '', classDetails: [], leaders: [], canManage: false, scopeText: '', scopeFlocks: [], add: null, loading: false, openAdd: false };
}

function upsertAdminCourse(course) {
  if (!course || !course.eventCode) return;
  const code = normalizeCode(course.eventCode);
  const idx = (adminCourseData || []).findIndex(c => normalizeCode(c.eventCode) === code);
  if (idx >= 0) adminCourseData[idx] = Object.assign({}, adminCourseData[idx], course);
  else adminCourseData.unshift(course);
}

function removeCourseFromPublicState(courseCode) {
  const code = normalizeCode(courseCode);
  appState.courses = (appState.courses || []).filter(c => normalizeCode(c.eventCode) !== code);
  if (publicData && Array.isArray(publicData.courses)) {
    publicData.courses = publicData.courses.filter(c => normalizeCode(c.eventCode) !== code);
  }
  rebuildCourseMap();
}

function upsertPublicCourse(course) {
  if (!course || !course.eventCode) return;
  const code = normalizeCode(course.eventCode);
  if (!publicData) publicData = { status: 'ok', courses: [] };
  if (!Array.isArray(publicData.courses)) publicData.courses = [];
  const idx = publicData.courses.findIndex(c => normalizeCode(c.eventCode) === code);
  if (idx >= 0) publicData.courses[idx] = Object.assign({}, publicData.courses[idx], course);
  else publicData.courses.unshift(course);
}

function applyCoursePublishChange(course) {
  if (!course || !course.eventCode) return;
  upsertAdminCourse(course);
  if (isCourseHidden(course)) removeCourseFromPublicState(course.eventCode);
  else {
    mergeCourseToState(course);
    upsertPublicCourse(course);
  }
  clearCourseClientCache(course.eventCode);
  renderMenu();
}

function ensurePublicData(force) {
  if (!force && appState.courses.length) return Promise.resolve(publicData || { status:'ok', courses: appState.courses, isAdmin: isAdminUser });
  if (appState.publicLoading) return appState.publicLoading;

  appState.publicLoading = post('getPublicInitFast', { userId }, 9000)
    .then(data => {
      appState.publicLoading = null;
      if (data && data.status === 'ok') setPublicData(data, false);
      return data;
    })
    .catch(err => {
      appState.publicLoading = null;
      throw err;
    });

  return appState.publicLoading;
}

function refreshPublicInBackground() {
  // 避免短時間內切來切去一直打 GAS。
  if (Date.now() - (appState.lastPublicRefresh || 0) < 30000 && appState.courses.length) return;
  ensurePublicData(true).then(() => {
    if (currentView === 'home') renderHomePage({ skipRefresh: true, keepScroll: true });
  }).catch(() => {});
}

function ensureRegistrationData(courseCode, force) {
  const code = normalizeCode(courseCode);
  if (!force && appState.registrationInitByCode[code]) {
    initData = appState.registrationInitByCode[code];
    currentCourse = initData.course;
    return Promise.resolve(initData);
  }

  return post('getRegistrationInit', { eventCode: code, userId }, 12000).then(data => {
    if (data && data.status === 'ok') {
      appState.registrationInitByCode[code] = data;
      initData = data;
      currentCourse = data.course;
      mergeCourseToState(data.course);
      if (typeof data.isAdmin !== 'undefined') isAdminUser = !!data.isAdmin;
      canViewRoster = !!(canViewRoster || isAdminUser || data.rosterAllowed);
      renderMenu();
    }
    return data;
  });
}

function getParam(name) {
  const qs = new URLSearchParams(location.search);
  if (qs.get(name)) return qs.get(name);

  const state = qs.get('liff.state');
  if (state) {
    const decoded = decodeURIComponent(state);
    const q = decoded.indexOf('?') >= 0 ? decoded.split('?')[1] : decoded;
    const sp = new URLSearchParams(q);
    if (sp.get(name)) return sp.get(name);
  }

  return '';
}

function setTitle(text) {
  document.getElementById('page-title').textContent = text;
}

function goHomeFromHeader() {
  toggleMenu(false);
  const clock = document.getElementById('clock-backdrop');
  if (clock) clock.classList.remove('on');
  if (isSharedEntry) {
    if (currentCourse) {
      renderCourseDetailContent(currentCourse);
    } else if (sharedCourseToken) {
      renderSharedCourseDetail(sharedCourseToken);
    }
    return;
  }
  renderHomePage({ skipRefresh: true });
}

function handleHeaderHomeKey(event) {
  if (!event || (event.key !== 'Enter' && event.key !== ' ')) return;
  event.preventDefault();
  goHomeFromHeader();
}

function setWideLayout(wide) {
  const wrap = document.querySelector('.wrap');
  if (wrap) wrap.classList.toggle('wide', !!wide);
}

function updateMenuButtonVisibility() {
  const btn = document.querySelector('.menu-btn');
  if (!btn) return;
  btn.style.display = isAdminUser ? '' : 'none';
}

function renderMenu() {
  const menu = document.getElementById('side-menu');
  if (!menu) return;
  updateMenuButtonVisibility();

  if (isSharedEntry) {
    const registerItem = currentCourse && canCourseRegister(currentCourse)
      ? '<button class="menu-item" onclick="toggleMenu(false);renderRegisterForm()">我要報名</button>'
      : '';
    menu.innerHTML = `
      <div class="menu-head">CYP135 課程系統</div>
      <div class="menu-list">
        <button class="menu-item" onclick="toggleMenu(false);goHomeFromHeader()">活動詳情</button>
        ${registerItem}
        <button class="menu-item" onclick="toggleMenu(false)">關閉選單</button>
      </div>
    `;
    return;
  }

  const adminBtns = isAdminUser
    ? `
      <button class="menu-item" onclick="toggleMenu(false);renderCreateCoursePage()">建立課程</button>
      <button class="menu-item" onclick="toggleMenu(false);renderPastCoursesPage()">以往課程</button>
      <button class="menu-item" onclick="toggleMenu(false);renderExternalImportPage()">外部名單匯入</button>
      <button class="menu-item" onclick="toggleMenu(false);renderTicketGeneratorPage()">票券產生</button>
      <button class="menu-item" onclick="toggleMenu(false);clearFrontendCourseCache()">清除前台快取</button>
    `
    : '';

  menu.innerHTML = `
    <div class="menu-head">CYP135 課程系統</div>
    <div class="menu-list">
      <button class="menu-item" onclick="toggleMenu(false);renderHomePage({skipRefresh:true})">報名課程</button>
      ${adminBtns}
      <button class="menu-item" onclick="toggleMenu(false)">關閉選單</button>
    </div>
    <div class="menu-note">首頁顯示所有課程；會長可直接從課程卡片編輯。</div>
  `;
}

function toggleMenu(open) {
  renderMenu();
  const backdrop = document.getElementById('menu-backdrop');
  const menu = document.getElementById('side-menu');
  if (!backdrop || !menu) return;
  backdrop.classList.toggle('on', !!open);
  menu.classList.toggle('on', !!open);
}

async function clearFrontendCourseCache() {
  if (!isAdminUser) return;
  showActionLock('正在清除快取', '請稍候，正在清除前台課程快取。');
  try {
    clearAllCourseClientCaches();
    const res = await post('clearFrontendCourseCache', { userId }, 12000);
    if (!res || res.status !== 'ok') {
      showMsg(esc((res && res.message) || '清除快取失敗'), 'err');
      return;
    }
    setActionLockProgress(70, '正在重新載入課程', '快取已清除，正在讀取最新課程資料。');
    const data = await ensurePublicData(true);
    setActionLockProgress(100, '快取已清除', '已重新載入最新課程。');
    await sleep(180);
    if (data && data.status === 'ok') renderHomePage({ skipRefresh: true });
    showMsg('前台快取已清除，課程首頁已更新。', 'ok');
  } catch (err) {
    showMsg(esc(err.message || err), 'err');
  } finally {
    hideActionLock();
  }
}

async function initLiff(options) {
  options = options || {};
  const allowGuest = !!options.allowGuest;
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      if (allowGuest) return 'guest';
      liff.login();
      return 'login';
    }

    const profile = await liff.getProfile();
    userId = profile.userId || '';
    displayName = profile.displayName || '';
    return 'ok';

  } catch(e) {
    console.error('LIFF 初始化失敗：', e);
    if (allowGuest) {
      userId = '';
      displayName = '';
      return 'guest';
    }
    document.getElementById('app').innerHTML =
      '<div class="card"><h2>LIFF 初始化失敗</h2>' +
      '<p class="meta">請確認 LIFF_ID、LINE Developers Endpoint URL，以及是否從 LINE LIFF 連結開啟。<br><br>錯誤訊息：' + esc(e.message || e) + '</p></div>';
    return 'error';
  }
}

window.addEventListener('DOMContentLoaded', async function() {
  const shareToken = getParam('share') || getParam('s');
  setSharedEntryMode(!!shareToken, shareToken);
  const liffStatus = await initLiff({ allowGuest: !!shareToken });
  if (liffStatus === 'login' || liffStatus === 'error') return;

  loadPublicCache();
  loadAdminCache();
  renderMenu();

  const mode = getParam('mode');
  const courseCode = getParam('course');

  if (shareToken) {
    renderSharedCourseDetail(shareToken);
  } else if ((mode === 'detail' || mode === 'register') && courseCode) {
    renderCourseDetailPage(courseCode, mode === 'register');
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'admin' || mode === 'settings' || mode === 'create') {
    renderCreateCoursePage();
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'courses' || mode === 'manage') {
    renderHomePage();
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'past') {
    renderPastCoursesPage();
    ensurePublicData(true).catch(() => {});
  } else if (mode === 'import') {
    renderExternalImportPage(courseCode);
    ensurePublicData(true).catch(() => {});
  } else {
    renderHomePage();
  }
});

// ─────────────────────────────
// 首頁：報名課程列表
// ─────────────────────────────
function renderHomePage(options) {
  options = options || {};
  const token = beginPage('home', '課程報名', true);
  const app = document.getElementById('app');

  const courses = visibleCoursesOnly((publicData && publicData.courses) || appState.courses || []);
  if (courses.length) {
    renderHomeShell(courses);
    if (!options.skipRefresh) refreshPublicInBackground();
    return;
  }

  showLoading('載入課程中');
  ensurePublicData(true)
    .then(data => {
      if (!isPageActive(token, 'home')) return;
      stopLoading();
      if (!data || data.status !== 'ok') {
        app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc((data && data.message) || '') + '</p></div>';
        return;
      }
      renderHomeShell(data.courses || []);
    })
    .catch(err => {
      if (!isPageActive(token, 'home')) return;
      stopLoading();
      app.innerHTML = '<div class="card"><h2>載入失敗</h2><p class="meta">' + esc(err.message || err) + '</p></div>';
    });
}

function renderHomeShell(courses) {
  const app = document.getElementById('app');
  const adminTools = isAdminUser
    ? `<div class="top-actions single">
        <button class="btn btn-sub" onclick="renderCreateCoursePage()">建立課程</button>
        <button class="btn btn-sub" onclick="renderPastCoursesPage()">以往課程</button>
      </div>`
    : '';

  app.innerHTML = `
    ${adminTools}
    <div class="searchbar">
      <input id="course-search" placeholder="搜尋活動名稱 / 日期 / 場次" oninput="filterPublicCourses()">
    </div>
    <div id="course-list"></div>
  `;

  renderPublicCourseList(visibleCoursesOnly(courses || []));
}

function filterPublicCourses() {
  const q = val('course-search').toLowerCase();
  const courses = visibleCoursesOnly(((publicData && publicData.courses && publicData.courses.length) ? publicData.courses : appState.courses) || []);
  if (!q) return renderPublicCourseList(courses);
  renderPublicCourseList(courses.filter(c => {
    return [c.eventName, c.eventCode, c.dateTime, c.session, c.ticketType, c.statusBadge]
      .join(' ').toLowerCase().includes(q);
  }));
}

function renderPublicCourseList(courses) {
  const el = document.getElementById('course-list');
  courses = visibleCoursesOnly(courses || []).map(c => reconcileCourseStatus(Object.assign({}, c)));

  if (!courses.length) {
    el.innerHTML = '<div class="card"><h2>目前沒有活動</h2><p class="meta">有新課程開放時會顯示在這裡。</p></div>';
    return;
  }

  el.innerHTML = '<div class="course-grid">' + courses.map(courseCardHtml).join('') + '</div>';
}

function shareIconSvg() {
  return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="5" r="3"></circle><circle cx="18" cy="19" r="3"></circle><path d="M8.7 10.6 15.3 6.4"></path><path d="M8.7 13.4 15.3 17.6"></path></svg>';
}

function courseCardHtml(c) {
  c = reconcileCourseStatus(Object.assign({}, c));
  const full = c.statusBadge === '已額滿';
  const closed = c.statusBadge === '尚未開放';
  const canRegister = canCourseRegister(c);
  const canManageAdd = userCanManageRoster() && !canRegister;
  const badgeClass = full ? 'red' : (closed || !canRegister ? 'gray' : '');
  const registerButton = canRegister
    ? `<button class="btn btn-main" onclick="renderCourseDetailPage('${esc(c.eventCode)}', true)">立即報名</button>`
    : '<button class="btn btn-warn" disabled>目前無法報名</button>';
  const addButton = canManageAdd
    ? `<button class="btn btn-main" onclick="openCourseAddRegistration('${esc(c.eventCode)}')">加報</button>`
    : '';
  const rosterButton = (canViewRoster || isAdminUser)
    ? `<button class="btn btn-ghost" onclick="renderCourseRosterPage('${esc(c.eventCode)}')">名單</button>`
    : '';
  const publishButton = isAdminUser
    ? `<button class="btn btn-warn" onclick="toggleCoursePublishStatus(event, '${esc(c.eventCode)}', '下架')">下架</button>`
    : '';
  const img = c.dmUrl
    ? `<img class="course-img" loading="lazy" src="${esc(c.dmUrl)}" onerror="this.style.display='none'">`
    : `<div class="course-img placeholder"></div>`;

  return `
    <div class="course-card">
      ${img}
      <div class="course-body">
        <div class="course-head">
          <div class="course-title">${esc(c.eventName || '未命名活動')}</div>
          <button class="share-btn" onclick="shareCourseLink('${esc(c.eventCode)}', event)" title="分享課程" aria-label="分享課程">${shareIconSvg()}</button>
        </div>
        <div class="badges">
          <span class="badge ${badgeClass}">${esc(c.statusBadge || c.statusText || '活動')}</span>
          <span class="badge">${esc(c.session || '場次未設定')}</span>
        </div>
        <div class="meta">
          日期時間：<b>${esc(c.dateTime || '尚未設定')}</b><br>
          票種：${esc(c.ticketType || '—')}<br>
          金額：${esc(c.priceSummary || '—')}
        </div>
        <div class="course-actions ${isAdminUser ? 'admin' : ''}">
          <button class="btn btn-sub" onclick="renderCourseDetailPage('${esc(c.eventCode)}')">查看詳情</button>
          ${addButton}
          ${registerButton}
          ${rosterButton}
          ${isAdminUser ? `<button class="btn btn-ghost" onclick="renderEditCoursePageByCode('${esc(c.eventCode)}')">編輯</button>` : ''}
          ${publishButton}
        </div>
      </div>
    </div>
  `;
}

function openCourseAddRegistration(courseCode) {
  renderCourseAddRegistrationPage(courseCode);
}

async function toggleCoursePublishStatus(event, courseCode, publishStatus) {
  if (event) event.stopPropagation();
  const code = normalizeCode(courseCode);
  const nextStatus = publishStatus === '下架' ? '下架' : '上架';
  const course = (adminCourseData || []).find(c => normalizeCode(c.eventCode) === code) || getCourseFromState(code) || {};

  if (nextStatus === '下架') {
    const ok = await openConfirmDialog({
      title: 'CYP135課程管理',
      message: '下架後前台與分享入口不會顯示這堂課，但後台資料與名單都會保留。確認下架？',
      okText: '確認下架',
      cancelText: '取消'
    });
    if (!ok) return;
  }

  showActionLock(nextStatus === '下架' ? '正在下架課程' : '正在上架課程', '請稍候，正在更新前台顯示狀態。');
  try {
    const res = await post('setCoursePublishStatus', {
      userId,
      eventCode: code,
      publishStatus: nextStatus
    }, 16000);

    if (!res || res.status !== 'ok') {
      showMsg(esc((res && res.message) || '更新失敗'), 'err');
      return;
    }

    const updated = Object.assign({}, course, res.course || {}, {
      eventCode: res.eventCode || code,
      publishStatus: res.publishStatus || nextStatus
    });
    applyCoursePublishChange(updated);
    setActionLockProgress(100, nextStatus === '下架' ? '課程已下架' : '課程已上架', '正在更新畫面。');
    await sleep(180);

    if (currentView === 'pastCourses') renderPastCoursesShell(adminCourseData);
    else renderHomePage({ skipRefresh: true });
    showMsg(nextStatus === '下架' ? '課程已下架，已移到以往課程。' : '課程已上架，已回到課程首頁。', 'ok');
  } catch (err) {
    showMsg(esc(err.message || err), 'err');
  } finally {
    hideActionLock();
  }
}

function getSharePageBaseUrl() {
  const url = new URL(location.href);
  url.search = '';
  url.hash = '';
  return url.toString();
}

function formatShareExpiryText(text) {
  const raw = String(text || '').trim();
  if (!raw) return '約 7 天';
  return raw.replace(/^\d{4}\//, '');
}

function buildCourseShareText(title, url, expiresAtText) {
  return `【${title || '課程'}】快速報名\n期限｜${formatShareExpiryText(expiresAtText)}\n報名連結\n${url}`;
}

function showShareLinkFallback(url, expiresAtText, title) {
  const shareText = buildCourseShareText(title || '課程', url, expiresAtText);
  const encodedText = encodeURIComponent(shareText);
  showMsg(
    '<b>' + esc(title || '課程') + '｜快速報名</b><br>' +
    '分享連結已建立。若沒有自動開啟分享視窗，可以直接複製分享文字。' +
    '<a class="share-link-box" href="' + esc(url) + '" target="_blank" rel="noopener">' + esc(url) + '</a>' +
    '<div class="share-copy-row"><button class="btn btn-sub" onclick="copyShareText(decodeURIComponent(\'' + encodedText + '\'))">複製分享文字</button></div>' +
    '<span class="muted">期限｜' + esc(formatShareExpiryText(expiresAtText)) + '</span>',
    'ok'
  );
}

async function copyShareText(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      showMsg('分享文字已複製，可貼到 LINE 傳給朋友。', 'ok');
      return;
    }
  } catch (e) {}

  prompt('請複製這段分享文字', text);
}

async function shareCourseLink(courseCode, event) {
  if (event) event.stopPropagation();
  const code = normalizeCode(courseCode);
  const course = getCourseFromState(code) || {};
  const btn = event && event.currentTarget;
  if (btn) btn.disabled = true;
  showActionLock('正在產生分享連結', '請稍候，正在建立 7 天有效的分享連結。');

  try {
    const data = await post('createCourseShareLink', {
      userId,
      displayName,
      eventCode: code,
      pageUrl: getSharePageBaseUrl()
    }, 12000);

    if (!data || data.status !== 'ok' || !data.url) {
      showMsg(esc((data && data.message) || '分享連結建立失敗'), 'err');
      return;
    }

    setActionLockProgress(100, '分享連結已產生', '正在開啟分享視窗。');
    const title = course.eventName || data.eventName || '課程報名';
    const text = buildCourseShareText(title, data.url, data.expiresAtText);
    let shared = false;
    await sleep(180);
    hideActionLock();

    try {
      if (window.liff && liff.isInClient && liff.isInClient() && liff.shareTargetPicker) {
        const result = await liff.shareTargetPicker([{ type: 'text', text }]);
        shared = !!result;
      }
    } catch (e) {}

    if (!shared && navigator.share) {
      try {
        await navigator.share({ title, text, url: data.url });
        shared = true;
      } catch (e) {}
    }

    if (!shared && navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(text);
        showMsg('分享文字已複製，可貼到 LINE 傳給朋友。<br><span class="muted">期限｜' + esc(formatShareExpiryText(data.expiresAtText)) + '</span>', 'ok');
        return;
      } catch (e) {
        showShareLinkFallback(data.url, data.expiresAtText, title);
        return;
      }
    }

    if (shared) {
      showMsg('已開啟分享視窗。<br><span class="muted">期限｜' + esc(formatShareExpiryText(data.expiresAtText)) + '</span>', 'ok');
    } else {
      showShareLinkFallback(data.url, data.expiresAtText, title);
    }
  } catch (err) {
    showMsg(esc(err.message || err), 'err');
  } finally {
    hideActionLock();
    if (btn) btn.disabled = false;
  }
}

async function renderSharedCourseDetail(shareToken) {
  setSharedEntryMode(true, shareToken);
  const token = beginPage('share', '活動詳情', false);
  const app = document.getElementById('app');
  showLoading('開啟分享活動中');

  try {
    const data = await post('validateCourseShareLink', { token: shareToken, userId }, 12000);
    if (!isPageActive(token, 'share')) return;
    stopLoading();

    if (!data || data.status !== 'ok' || !data.course) {
      app.innerHTML = `
        <div class="card compact-card">
          <h2>分享連結無法使用</h2>
          <p class="meta">${esc((data && data.message) || '此連結已失效或不存在。')}</p>
          <button class="btn btn-sub" onclick="history.back()">返回上一頁</button>
        </div>
      `;
      return;
    }

    currentCourse = data.course;
    mergeCourseToState(data.course);
    renderCourseDetailContent(data.course);
  } catch (err) {
    if (!isPageActive(token, 'share')) return;
    stopLoading();
    app.innerHTML = `
      <div class="card compact-card">
        <h2>分享連結載入失敗</h2>
        <p class="meta">${esc(err.message || err)}</p>
        <button class="btn btn-sub" onclick="history.back()">返回上一頁</button>
      </div>
    `;
  }
}
